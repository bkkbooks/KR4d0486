body:
  text: 中庵集卷十六元劉敏中撰碑三敇賜資德大夫中書右丞商議福建等處行中書省事贈榮祿大夫司空景義公布哈爾神道碑銘有元大德三年冬十月某日資德大夫中書右丞商議福建等處行中書省事布哈爾薨于京師詔賜中統寶鈔二萬餘千緡以驛傳負其櫬歸葬泉州命有司議贈諡撰墓碑而其文以命臣敏中臣謹按禮部事狀公本名薩題世西域人西域有城曰哈喇哈逹其先世所居也逺祖徙西洋西洋地負海饒貨因世為賈販以居父布哈爾得幸西洋主使與諸弟齒弟有五人布哈爾稱六弟俄總領諸部益貴富侍妾至三百人象床黃金飾稱是布哈爾殁公克紹其業王益寵凡召命惟以父名故其名不行而但以父名稱焉聖朝之平宋也公聞之喜曰中國大聖人混一區宇天下太平矣盍往歸之獨遣使以方物入貢極諸瓌異自是終嵗不絶復通好親王阿布哈斯二邸凡朝廷二邸之使涉海道恆預為具舟筏必濟乃已世祖熟其誠欵至元二十八年賜璽書命某部尚書阿爾班侍郎拜特穆爾列名往諭且召之公益感激乃盡捐其妻孥宗戚故業獨以百人自隨偕使入覲既見世祖加慰諭賜以錦衣及妻廪之公館所以恩遇良渥聖上嗣位特授資德大夫中書右丞商議福建等處行中書省事纍賜以巨萬計而寵數益隆矣至是年來朝遂以病薨享年四十有九賜妻蔡氏先公卒再配某氏子男一人女二人公薨之始上未知問左右布哈爾疾愈否左右以對上惻然久之曰彼逺人今若是良可嗟悼於是有葬贈諡碑之命有司議贈榮祿大夫司空諡景義公其賜妻曰靖惠夫人制可勑江浙等處行中書省給其所賜寶鈔且董其葬事仍别降綸旨護其家無敢陵犯上且曰使彼俗聞之寧亦喜耶蓋上之所以重逺人而公之所以獲上意者如此臣竊欽惟我國家列聖相承以至仁遇九有以至誠待羣下自甸服要荒至矜寡孤獨無所遺自大材殊勳至寸長微勞無不録龎乎如天地之成萬物而其發育斡旋之妙莫知所以然浩乎如江海之下衆流而其渟蓄涵泳之大莫究其所極人生於其間油油熙熙無有小大外內罔不得其所欲故智者罄其慮勇者畢其力能者竭其才而賢者成其功是以治效之盛巋巍煒煥直與三五比隆而版圖之區聲教所暨者過於漢唐逺甚仁之洽誠之格也嗚呼山海遼絶之俗木石﨑嶇之人得一觀國光霑聖化以識夫乾坤日月之大全誠千載一時也而公輒能慨然感固陋之習審去就之義抗剛忠之節會休明之期用能荷恩兩朝登庸二相沒則有諡葬則有碑生有餘榮死為不朽矣彼有取舍不明以險自欺甘于僻左幽昧泯泯待盡者視公為何如哉臣既述其行乃作銘曰皇元聖德叶卑髙風霆作威雨露膏善良子惠惡苗薅分此薰蕕辨松蒿四門廓達登夔臯暨百執事皆英髦干戈載戢弓矢櫜氛祲不作絶兵鏖龎恩汪濊逮不毛丈夫犂鋤婦蠶繅王風熙熙物囂囂異方詭俗多繹騷睚眥戈戟聲哮謈天狹地窘不可逃安得大化歸甄陶偉景義公乃人豪起望白日心滔滔先一介貢連飛艘越裳之雉西旅獒珠具象犀雜金刀九重使者旋麾旄從以百夫躡風濤忠心陛見聖所褒萬里慕化卿其勞賜以女妻宫錦袍又為築館加餼牢二相繼命恩非叨千載一時公實遭隙隂不駐難持操一昔朝宿聞號咷豐碑顯諡示爾曹慕此何畏鯤鯨鼇大德四年二月日撰勑賜推忠保德佐運功臣太傅開府儀同三司上柱國韓國公諡忠獻李公神道碑銘皇慶元年十一月二十九日集賢大學士榮祿大夫臣陳皓奉聖旨李道復父母既葬碑石未立其令翰林承旨劉敏中撰文集賢大學士劉賡書翰林侍講學士郭貫篆額臣敏巾承詔謹托鮑思義所為狀序而銘之嘗謂物惟藴則大陽藴於闔大於化隂藴於闢大於成山林藴而雲雨草木藴而華實大矣人之藴其大為事業大不究藴將必有待而所謂待者非惟其子孫耶公既沒之五年其子孟益貴於是公之藴始大以顯古人有言仁者必有後公足以徵之公諱唐字仲卿姓李氏後唐雁門之裔世為潞著姓仕終略陽縣尹贈榮祿大夫上柱國潞國公加贈推忠保德佐運功臣太傅開府儀同三司上柱國韓國公諡忠獻曽祖考諱禋金進義校尉曽祖妣夫人門氏祖考諱執字長卿以資雄嘗事科第弗利輒棄去獨以節義名其急人之急若火券若代租若助婚聘給喪葬嵗必滿三百六十人以為常贈上黨侯加贈濟美功臣光祿大夫平章政事柱國公諡康惠祖妣郭氏劉氏並封韓國太夫人三子皆劉出昌遇昌期失于兵亂昌祚公之父也字天錫七嵗能詩十嵗舉經童長同監潞州稅國初佩銀符潞州招撫使有惠政及人贈上黨郡公加贈保順守正功臣金紫光祿大夫司徒上柱國韓國公諡文靖母夫人鄭氏封韓國太夫人公資端重寡言笑平居未始以聲色加人至其義之所在則毅然弗顧博學多藝能於國朝語尤習未冠從軍秦隴間嵗戊申瓜爾佳沔國公行興元西川省事以能補部吏未幾辟行省掾興元境與宋交動尋干戈兵機密務悉掌於公時沔國暨利帥圖爾哈皆英才宋人病之邏騎或得宋制司遺檄以獻云圖爾哈先令納欵莽哈岱後遣申情公曰斯儳言行間耳遽焚之莽哈岱沔國小字也辛亥四月宋四川帥余玠瀆我南鄙據中梁山衆號十萬雉堞樓櫓一夕皆具我城中兵不滿五千皆愕睨以為神公獨曰是特以竹木障席箔而塗之堊耳逮夜火舉中梁旋視四山皆然沔國登樓色動顧左右曰果大敵也公乂言是特添竈之比人執數炬如約而舉耳且大兵逺來當乘鋭速戰顧乃棲薄髙險鋭於何有其計不過虛為聲勢猥利驅掠而已可堅壁以老之伺其退遣驍騎控于厄剪之必矣有悍卒數十號巴圖者願出斫營自效沔國將遣之公聞馳告曰此輩無賴苟知徼幸萬一脫有不利則我之虛實即為彼知誨盜之道也沔國矍然曰微子言幾殆數日宋人果宵遁追及松樹平大敗之盡棄其俘獲而去沔國使覆其迹一如公言由是器重之擢刑部主事有詔沔國得以軍法便宜從事公全宥者甚衆壬子沔國改軍民萬戶公為知事甲寅太傅邁珠行省興元公復入掾仍領前職戊午用採訪薦授興元轉運司知事中統二年改安撫司知事四年升轉運經厯官至元二年遷軍儲所經厯六年以職官選補四川行中書省掾聲譽益出八年復還軍儲幕不就雅愛漢中山水乃結廬教子孫樹藝以居里有訟久弗決者往往就質於公徐以理開諭皆愧服罷去有及門自平而退者夫有以信于人也二十三年授從仕郎夔州路總管府經厯辭不允乃就間攝府事凡六年始夔無蠶織公教以樹桑民知利焉作廟學築墻植杏率師生奠祀講習土俗為變聞人疾輒割俸金濟醫藥常若不及所居衡茅蕭然邦人請葺之則曰無為勞爾也竟弗葺及去民攀留不可競遮道鳴簫鼓書綵旗為餞有六載恩波夔國滿一船明月漢川歸之句元貞二年以徵事郎除略陽不就嗣子孟遊京師以徽仁裕聖皇后命侍講今上潛邸久之請歸侍不許公聞遣書戒勿請而孟請益切大德四年有命迎致就養公至廪遇優異嵗時賜謁上夀成禮而退日杜門端居獨以經史自遣遇所得輒細字書之因輯而成編命之曰客窗敗衲其髙曠有如此九年孟有扈從覃懷之行公及家人長幼皆從明年丙午從幸搕簝山道賜藥餌費錢三千緡次冀寧五月十二日以疾終于玄都觀之松風堂春秋八十有一是冬南下旅殯覃懷皇慶改元三月十一日葬于潞城東十里上黨慶雲山集家原之新塋嗚呼以公平生觀之所藴可知已夫人王氏靜淑慈正克相厥家婦道母儀中表以為法卒殯興元夀年五十有五至是祔焉贈潞國夫人加贈韓國太夫人四子長即孟次槃次森次添孟字道復業儒器宏偉有經世略至大三年庚戍以佐命功授榮祿大夫集賢大學士同知徽政院事逾年聖天子龍飛拜光祿大夫中書平章政事特封秦國公兼翰林院學士承旨知制誥兼修國史娶劉氏卒贈韓國夫人繼賜宫人納哈塔氏封潞國夫人改封韓國夫人槃承直郎興元路洋州知州娶孫氏森奉訓大夫晉寧路潞州知州娶劉氏添幼庶出女四人長適馬忠次適王德明次適陳天錫次適馮闕孫五人曽孫四人公之葬也奉命遣其姪朝列大夫祕書少監信馳驛于覃懷于興元奉公之柩與韓國太夫人之柩會于路長子孟賜告賻有加特勑中奉大夫昭文館大學士祕書監卿溫德榮偕傳以往實相之也承武郎中書舍人曹由張遵義輔行既至賓親畢集襄事如禮觀者榮之嗚呼生不足而沒有餘其亦可以慰矣銘曰萬斛之航底于濫觴九霄之翮止乎榆枋天道茫茫識者慨傷蓋嘗致其用于百中之一固已脫穎而殊常有子以大其家晚節乃昌榮養優遊既夀且康松風夢長邈仙遊兮歸故鄉眷兹雲山之原玄宅允藏伐石勒銘載是寵章孰知夫生平客窗之敗衲而易此身後大國之衮裳是之謂固有必有雖亡不亡以一時之遜抑為萬世之耿光也耶贈奉政大夫驍騎尉大同縣子蕭公神道碑銘中順大夫參議徽政院事蕭君塔布台持趙元溥所狀先大夫行實請曰不肖孤生遇明時濫階通顯洪惟聖天子道隆孝治禮遇臣下先考妣與霑大恩光荷封爵思所以侈寵榮慰窀穸宜有旌紀傳信不朽余嘉其誠為次第之蕭本契丹貴族舒穆嚕氏公諱君弼復改蒙古岱贈奉政大夫驍騎尉大同縣子先世西京桓州人後徙應州大父而上譜牒不存考阿拉克巴圖爾當金籙之訖太祖皇帝奮起朔方疆理中夏在邉諸郡桓當其衝帝駐驆近郊遣兵圍之守者懼以君素勇略服人且習蒙古語遂署為倅以自輔時旁郡皆降桓獨拒守有詔城破當屠之諜者以告君私謂食盡援絶不可復支吾徒死自其分如生靈無辜何遂效國俗翦髮為鬌著巾夜縋而出邏騎以見帝責爾曷敢拒我君即脫巾露其髮自明辭色無變帝壯之輒遣入城開諭乃降民死而再生君之力也自是日承眷遇凡天戈所指君皆為前導若取雲中收鳳翔至撫有西域其勞居多嵗庚寅太宗皇帝大舉伐汴選才堪近侍者君為選首汴平凱旋君所俘戶幾四百抵相州時兵荒之餘所至艱食復慮北方地寒衆必難保獨取壯健者五十戶以北至應州擇沃土居之今名蕭家寨云是徙居應者乙未詔呼圖克籍在所户口君遂以俘户獻呼圖克命君收及百户方入籍有方士布濟克號神人勑賜戶奉其廪稍乃以是戶畀焉仍錫君璽書金符世為宣差以長之今三世矣君以丁酉春秋六十卒君為人剛正尚義凡攻下城邑取其有藝術者出之所全活甚衆桓之降也太祖特以城中所獻金手推與之俾袺以衣裾滿乃已其眷愛如此配許氏郭氏欽察氏許有操行君沒十餘年間攝官事綜家務井井有緒郭即大同公之母出許昌著姓資溫性慧嘗翦髮易香火祝慶夫子內助可知已後君十五年卒三子長仲嘉努次蒙古岱大同公也次多揚二女翠哥蘭哥適名族仲嘉努襲職宣差配王氏生子三女二男孫七女孫三多揚早卒配劉氏子一女一男孫二大同公天性孝友生六年而孤哀毁如成人既長有立志事諸母接昆季備愛敬之實初襲父官讓其兄去而就學大同治當諸王朝會往來之衝有司以供億被譴責是患乃辟公為館伴公素練國典且間譯語而又應對辨敏故譴責弗及而公私賴之後從事宣撫司補克哷穆爾齊譯云通事尋以是職遷河東山西道提刑按察司以其能也至元丁亥中書平章政事札實御史中丞色埓默使甘肅還經大同見公一與語大加賞異歸薦於御史大夫太師伊嚕公擢內臺克哷穆爾齊謹密諳大體風憲屬望太師甚重之庚寅奏拜行臺監察御史命且下感疾而卒搢紳惜焉實大德元年正月五日春秋六十又五某月某日葬于應州蕭家寨之先塋公再娶子男六人女一人孫男女二十有七人先夫人王氏內範純備生四子長曰珠爾噶岱攝宣差卒娶安氏子一女五男孫二曰宣堅州酒稅使娶韓氏子三女二男孫二曰阿雅噶齊應州副酒稅使今為管領大同等路民匠克埓口提領娶石氏子一曰特穆爾早世娶李氏子一女缺繼夫人察罕塔塔爾氏封大同縣君仁恕恭儉撫先夫人之子如已子母儀家法中表為式生二子一女女曰香童適同郡李氏子曰與章管領宣德隆興等處諸色民匠齊哩克昆副長官英爽工騎射好獵每獲鮮肥必進上興聖宫用錫寶書護其家娶常氏子四女一女孫一曰塔布台即中順也娶張氏封大同縣君子三刷格爾伊埓女一精吉木皆幼中順君始宿衛懷寧邸用大官薦給事興聖宫大德丁未扈從今上皇太后歸自覃懷與平內難奉命馳和林勸進武宗繼統録功授奉訓大夫平江路財賦提舉司達嚕噶齊未赴以皇太后旨改甄用監丞至大巳酉升奉政大夫參議徽政院事皇慶改元進階中順於是有追封之命嗚呼天人之相與昭昭也舒穆嚕氏自宣差君遘時經綸奮身戎行間釋難濟危計所全活不啻千萬宜其享有為善之福而位不及通貴年僅登下夀夫以公負倜儻有用之才使得遭逢盡展所能必有大過人者竟以數奇邅廽弗遂而沒天道其難知耶夫窒久者達必逺積厚者發必大故未幾何而賢嗣以翌戴之勤攀龍附鳳立登華要優恩渥命光昭前美太君年踰八秩安享榮養子孫滿前蘭玉輝映一門福慶罕見倫比由此觀之天道何難知耶銘曰天髙聽卑福生有基善惡之應影響其隨惟公奕葉素勤積纍諸慶流芳貽厥孫子侃侃中順策名熙朝翔扶跋涉盡瘁孔昭班賞第功疊承恩奬鵬程九萬扶搖直上皇慶孝治隆養璇宫從容徽府幕畫生風茅土疏榮追念先志龍篆鳳書松楸增賁過庭之訓燾後之仁昔晦今顯忠孝一門載辭貞珉美匪我溢以諗其嗣人繼繼母替勑賜贈榮祿大夫司徒柱國梁國文惠公王公神道碑銘公既殁之十又五年其子約仕益貴聖天子眷益重公以三代恩典贈榮祿大夫司徒柱國追封梁國公諡文惠夫人成氏追封梁國夫人詔臣敏中撰文碑其墓道且詔臣賡書臣貫篆額臣謹按事狀公諱松年字堅甫姓王氏上世汴梁人大父諱因贈翰林侍讀學士中奉大夫護軍追封汴梁郡公諡敬懿祖妣張氏追封梁郡夫人父諱通字慶祥贈資善大夫中書右丞上護軍追封汴梁郡公諡莊穆毋陳氏追封汴梁郡夫人勤儉多內助莊穆卒蔬食終身叔父諱顒志大命奇竟弗遂終叔妣閭氏莊穆公為人溫謹博愛好施天兵圍汴民飢日持糗糒食孤弱全活者衆遇婦人詬其夫於途問之泣曰家貧里胥責夫爾賦已代輸爾亟貸子錢為償夫往遲至使妾迓夫則誤遺所貸子錢為將奈何乃大哭莊穆曰勿哭其償幾何曰若干探囊畀之不問其姓名夜有盜家人弗知旦緝得其迹將捕之莊穆曰所喪能幾忍彼一家終被惡名竟寢里中稱為長者三子公其仲也甫三嵗汴潰父母挈以北徙寓真定未冠父卒兄夭弟幼能力貧養其母中統癸亥輦母家京師數嵗遣子約如真定舉其父之櫬殯于燕至元丙子十二月二十二日母卒合葬京師南之烽臺鄉公嘗職金榖户曺侍郎乃其同學生往謁弗見公怒出謂其所偕曰衒貴勢而忘故舊淺矣吾惟一子教之學安知他日不若彼之所至邪歸語約曰奮汝志無忘吾辱乃不復仕叔父有髙識約垂髫時每指示公曰是兒風格不凡異日必興吾宗至是公益勉之壬午約由國史編修官辟掾中書知差除選人欲預知所得密以屬公公謝曰選事嚴掾奚敢泄是後約洊厯華要公未嘗恃子顯以自矜常以小心謙抑朂其子之不逮大德三年己亥得疾尋稍瘳辛丑約以翰林直學士奉旨賑飢畿縣公疾復作衆議將召約公聞之曰飢民待哺使者兒來如彼何竟弗召其所以期其子者逺矣眀年壬寅六月疾革十三日卒于正寢享年七十有三以是年八月二十三日葬于京西岡之原之新塋梁國夫人成氏祔而考妣暨其叔考妣之葬胥遷焉以烽臺湫隘故也公天質孝友慈祥篤實世之囊槖機穽不知有之人百欺不一校絶口不訾人之短無一毫負人嘗謂約曰凡家奴有子勿復奴彼亦人耳可奴及再世乎約嘗欲市一僮劵曰假子公曰名子而實奴之若何乃止家無餘産課諸僮貿遷以仰給而尤樂施豫喜賓客時乘小車與里社耆舊遊裕如也其平生可知已梁國夫人秦中望族父旭為國尚監家真定以生資聰悟儼恪御內治寬而法接姻戚和而誠婦道母儀中表矜式約始學至仕資給進誘循循焉惟以輔成文惠公之志也及疾謂約曰我疾非藥能起醫來竟不餌其藥夷然而逝至元三十一年八月十九日也春秋五十有九子約以文行器略官厯禮刑二曹尚書太子詹事河南河北行中書省右丞徵拜集賢大學士官榮祿大夫婦某氏梁國夫人孫男一思誠女二在室易曰積善之家必有餘慶又曰謙尊而光卑而不可踰言天道也公始襁抱罹播蕩之厄結髮振厲舍危圖寧以孝弟勤恕理家而家以立以恭慎遜抑教子而子以顯卒之門閥地望鬱然為一時名臣其于向也戶曹郎為何如耶惟公志明德一故其取應如響本乎天道也所以封大國加顯號錫銘載美流耀于無窮豈非天乎嗚呼公其可以慰矣銘曰行有萬殊善莫與競變有萬幾謙不可勝得是二者惟公其人以天合天靡屈非伸身為世賢子為國器端委立朝輔弼之貴其原有歸曰惟公休褒恤是崇命秩孔優寵銘茲石萬世餘侈識者所嗟是父是子故昭文館大學士大司農郭公神道碑銘中統至元之治人材坌出大率儒以通達任吏事而不以冗劇病吏以廉正資儒術而不以迂濶害濟濟乎盛矣若夫備儒吏之用盡才猷之美淳忱雅曠襟度叵測敻然為一時標凖則昭文公其人也公諱筠字伯川姓郭氏曾大父諱謙配陳氏大父諱祐金尚書省令史配夏氏父諱義字信之金懷州同知始配劉氏早卒生女適張氏再娶靳氏公初生懷州君以金季亂自汴徙邳又徙青今遂為青州人公生九年失母十一年失父輒能警省自持從師讀書嶷嶷有起家之志踰冠推擇為吏凡五轉至中書掾能譽益出秩滿乞外補相臣以見上顧問優渥授承直郎彰德路總管府判官實至元八年辛未嵗也始視事更民所不便者民大悅未幾以樞密院都事召俄升經厯加奉訓大夫儀矩言論朝著瞻聳丙子以中順大夫同知泰州路總管府事時江淮甫定有謀不軌者獲之辭連富民何姓兄弟皆掠服具獄公至當覆按二人號泣自明知其寃乃更開誘窮詰首惡者窘始言嘗有貸於彼弗得故誣之彼實不與也二人以得釋不死而乃恤孤賑乏揭條約通逵示以好惡於是闔境肅然大治改同知嘉興路法制清明庭無留訟日以興學勵生徒為事民俗為變夏旱甚民困公潔齋與衆致禱雨隨降嵗以有成士民誦之知其于政治精誠素積也用憲府薦除江南浙西道提刑按察副使常以正已正人􅎁其屬咸畏憚之吳郡有兄弟以財訟久弗解公諭之曰兄弟同氣財外物奈何以外物之嗇而忘同氣之愛乎若是天倫喪矣今以三日假汝往歸與汝所親耆德者共議以來吾為汝決及期二人與所親拜堂下泣涕慚悔言曰小人不識義理為貪墨吏所誤微公教幾墮禽獸願自新由今日始公慰遣之二人旦夕炷香祝公于庭卒相睦為賢昆仲裕皇在儲闈聞公名命以遽召擢樞密院判官時征伐久息而軍職頗冗公奏為更定一皆稱旨乙酉遷兵部侍郎蓋公官泰州至是凡五遷而階猶其舊同列者皆更超顯未始幾微見于辭色逾年授太中大夫浙東海右道提刑按察使會權姦擅政奏遣使諸道理逋負覆欺隱實假威福以鉗制天下所遣多清流欲幸其不職中之而公在遣中諸道往往畏威希旨網羅無清濁虛實曲搜旁延掠治百至有弗堪赴水火鴆縊以死公獨不然凡訟劾無迹者皆置勿省虐不及衆而事亦無殆改按察江東建康道盜發績溪橫甚公親督兵下之戮其渠魁辛卯權姦敗誅希旨者皆相繼殄黜而人益賢公矣朝廷更化以嘉議大夫僉江淮行尚書省事尋改行中書十二月僉江浙中書省事江浙金榖嵗入倍于他省公為已任井井皆辦大農以最聞而有賜帛之命癸巳以年請屏居錢塘念其先府君嘗搆堂于邳名愛菊乃植菊舍下復扁是名曰先志不敢忘也幅巾野服相羊山水間蓋十年大德癸卯成宗思任舊人召至闕授昭文館大學士中奉大夫商議中書省事而河南陳緱山天祥東平張寓軒孔孫實偕召共事時望顒然有三大老之目首言左丞相逹爾罕清忠正大有經世具必専任俾無沮格患天下可大治俄而逹爾罕拜中書右丞相眷倚日重中外蒙澤公之力也先是河東地大震詔羣臣議公以為隂逼陽伏鬱不得發天地中和之理失故有是變具陳所以致中和者凡八事得失了然奏聞詔中書議施行焉一日嘆曰吾年八十尚可戀榮寵邪即請歸屢奏乃允省寺皆輟務具酒饌都門為餞觀者榮之尋以昭文館大學士加資善大夫大司農其見優禮如此還錢塘候者日滿門語未嘗及他時獨引觴嘯詠自若其興寄有在焉也俄遘疾以至大己酉十二月四日薨于正寢春秋八十四子友直奉其柩葬于青之臨朐仁夀鄉瀰河西源先人之兆次娶凌氏早世無子繼耿氏淑德令儀克相厥家年七十有六以大德元年丁酉三月二十六日卒子男一友直也女三適李氏喬氏張氏男孫二友直博學有通才纍官奉訓大夫紹興路總管府判官以公行實請銘嗚呼公早以邁倫之姿厄于孤弱卒能鯤化豹變奮揚明時貴冠五等年躋上夀完璧無璺類之指作室有堂構之託始始終終可謂無遺憾者矣敬為之銘銘曰世有善人乃國之紀百年自昔如公者幾在童煢煢四顧無倚心格神會孰興孰啓寸木百圍勺水千里磅礴功名出入赫煒蒲車晚節雍容園綺儀鳳景星有目所企忠言剴切人猶在耳康寧夀考嘯詠燕喜公生匪天奚具斯美爰念公德九原莫起載之貞珉其永曷已綿綿餘慶貽爾孫子皇慶二年癸丑正月日撰故肅政亷訪司經厯趙君神道碑銘漢儒董仲舒兒寬公孫𢎞之徒皆能以儒術緣飾吏事號通才竊嘗偉之蓋儒以經術専而吏以文法行言之於學則經術本也文法其末也専其本而遺其末則其弊也或失於牽泥而不通迂濶而難用行其末而遺其本則其弊也或失於削刻而少仁巧幸而不貞二者之弊不同而其失一也故必儒焉而達乎吏吏焉而又進乎儒則本末相資而後可以無二者之弊自豫官京師殆三十年凡以儒獲顯名踐清途者可識而數焉若君者吏而進乎儒者也君諱昌字夀卿世為濱之渤海人君幼慧敏不好戲弄稍長從吏學始為濱司候吏乃更折節讀儒書求義理以自淑尋補州吏轉濟南總府掾至元戊寅用監察御史薦入臺為察院吏會御史奏雲朔等州吏職不虔錢粟盜匿狼藉詔近侍與御史就治而君以推擇從君知其弊久為之悉心力窮晝夜掩簿劵以控其根穴資耳目以抉其脈縷如燭照龜卜無所逃遁為姦者具服詔使以為能還言之臺遂以將仕佐郎除江東建康道提刑按察使知事實壬午三月也已而以贊畫稱明年選充行御史臺掾又再嵗入為內臺掾方大姦據相位假威福橫甚奏遣使諸道覆核姦贓撿括逋懸敲搒遍於郡縣實示脅制拑天下之口所遣使有異已者因中傷之治書侍御史河南陳公剛正敢言大姦忌故亦在遣中得湖南道河南知其意擇臺掾可與偕者獨以君行湖南行省有位平章者根柢連大姦肆虐熖熖河南至首劾其顯惡數十以聞其人懼則架空媒孽數事誣河南馳移大姦大姦奏遣使先知之於是君與河南并繫湖南省河南雖困辱自直不挫而君力助之時大姦風指所在莫不股栗草靡以附君於是時苟一語之異則榮利立可得而河南危矣卒確然不渝以死生與河南同憂苦至大姦敗誅相扶而還議者謂河南有知人之明而得其所舉謂君有國士之義而不負所知也尋以承事郎除西蜀四川道提刑按察司經厯居再嵗本道例改肅政廉訪司官職更授如故而衆譽藉藉謂其才謀得風憲之體癸巳四月自以病歸明年六月一日終於家得年五十有七葬於州南二十五里天王堂之原先塋之兆次禮也後十一年其子去私以君之善狀請豫文碑其墓道以申罔極之報君父子曩與豫遊皆甚欵故不可辭君為人溫醇一言笑無所苟平居衎衎儼然一儒者及其接政事履繁劇則厲然如鷙鳥之作而其守凛然如氷霜不可干以私要其為心一主於誠期必至於是焉而後已得儒教時中剛克之義故凡識君者無有貴賤疏密皆曰趙君無吏氣其為人所敬信如此嗚呼君之才量氣節見于行事者僅百之一耳使盡得肆其所藴則其所到蓋未可量而遂止於是其命矣夫父諱善方慈祥樂施豫好釋氏書家素饒諸所稱貸嵗遇不登則焚其劵不責鄉里德之卒年八十二母孫氏諱守信夀六十三先卒二姊長贅張氏次適齊氏君配夫人李氏諱守榮備諸婦道無恙子男一人去私也女四人長適吳氏次郭氏次薛氏次劉氏去私業儒好學有文由中書掾出為章丘尹轉饒州路總管府判官皆有惠政今以奉訓大夫知嵩州觀去私則可以知君故併及之銘曰儒而偽惟吏之弊吏而誠惟儒之能儒有不能子能服膺衎衎接物之和蹇蹇幹事之貞衆騖以名子獨安行衆以利爭子獨廉稱出入風霜肅殺之地亦厥有聲胡位不滿德而祿不永齡惟肯構肯穫之有託尚永慰夫爽靈松楸冥冥豐碑我銘彼猜祻矯虔者過而拜之庶幾可徵故少中大夫同知南京路總管府事趙公神道碑銘公諱圭字君寶世家𢎞州後徙燕遂為燕人焉公資開敏剛正未冠失父與兄璧侍母避亂遷魏又遷長安益長辭母東遊過真定寓神霄宫掌教識其先世憐之留使從學遂至于有立始以真定課稅所辟翰靖海場鹽官市帛當送輸京衆憚之公獨請行既輸從領省溫都爾哈爾滿覲和林一日太宗方宴縛領省出錮直廬中莫測所以罪從者皆散匿獨公在側領省勉使去竟弗動翌日內出酒一器敇領省飲酒墨色知賜死領省伏飲公從旁亦取飲既移晷靜無所覺􅎁使視之問曰嚮酒汝所進果何酒也領省悟對曰臣所進白金新製藥淬未久涉逺故酒敗色渝斯誠臣罪當死帝悉其誠釋之領省義公異常人奏授領中書郎中以歸中統建元改上都開平路總管府經厯官有捍難安衆之策世皇韙之賜名實喇薩哈勒圖賜金符授開平路課稅使三年擢領中書左右部參議規畫日聞愈為上知嘗入見賜食如忘上問之對曰臣母老寄長安方食而感故然詔有司致其母于京以便養時姦臣擅柄傾內外以公獨不附忌之公輒去至元七年駕幸上都道雲州州織局廢敕中書擇人姦臣以公應詔除雲州織局提舉雖以能選而官左責難實擠之也公勉力就職未幾匠亡而復課失而倍又積棼絲織錦衾以進能譽益彰秩滿奉命佩金符城興松二州安輯其人姦臣復嫉公雲州之能以洺磁鐵冶都提舉治效如雲州姦臣卒不能害而公亦終不一下也十四年楮幣法滯以中順大夫行戶部侍郎大名分治之十六年詔撿核金穀山東尋除少中大夫同知益都路總管府事以未復命不赴明年改同知南京路總管府事遘疾卒于官實十八年辛巳八月十日也夀年六十有三權厝汴之隆德宫逺祖仕遼有以國戚官節者曾祖諱昭祖諱雄飛父諱儒金河平軍節度使治汲郡金亡以節死母夫人傅氏公先配夫人舒穆嚕氏二女長適定襄李從益今嘉議大夫治書侍御史銓其甥也次適李天祥再配夫人李氏一子曰思益二女適李氏馮氏思益為人英毅貞峻嶷嶷有父風以廕授冠州判官改大司農照磨遷承務郎河間蓚縣尹在官六年多異政民勒石頌德進奉訓大夫霸州尹婦李氏男孫二永章存章曽孫一奉訓君以翰林修撰王士熙所為公善狀謁於繡江言思益卜以年月日舉先人之柩歸葬燕之先塋墓道當有銘欲得公之辭以信不朽敢再拜以請奉訓與余舊無以拒序而銘之嘗觀古記節義之士精誠所發蹈死生弗顧窮達弗論也使人嘆息景慕以為不可復得嗚呼今以公言之獨非古人歟銘曰軼倫之才見於有為曲不直容莫究所期吾盡吾職憂懼非我而沉而浮往無不可禍當叵測國士與歸洪流方增底柱靡移衆人固不識惟天子知我銘于阡尚慰九泉凛然其風奚千萬年故趙千戶神道碑銘公諱信姓趙氏濟南厯城人世居章丘之固均鄉曽祖諱保義祖諱元祖妣王氏父諱忠母孫氏四子公其長也次儼次儀公為人靜敏亮直而剛毅有氣早嵗代其父為濟南張侯麾下彈壓至元六年天戈南指駐襄陽募兵公在選中使者識其可用俾長百夫以行既至給祿同上百戶總兵千人于安陽于方臺于曲阿于滚河于青冢築保障通轉運以才略聞厥後攻房方造舟公力戰盡焚其材而還圍樊奮擊先登爇其浮梁尋破之襄陽陷以功益髙唐兵四百行總把事十一年大將右丞相忠武王擁兵卧郢了當上流堅壁以拒王舍郢蕩西港入漢水順流而下取沙陽秋城二堡下涪州公皆有功陽邏枕江北壖直南北之衝宋人堡以自安王與副將左丞相阿珠搗虛據南岸大兵徑渡公舟與宋將夏貴遇大戰敵手炮犯公背公弗痛翼健卒呼躍蹴其舟殺數十人衆潰貴走過江分命四討若鄂若漢陽若蘄黃若江池若安慶若泰興攻擊降取一以死力自效迄宋平其勞為多尋奉勑以總把授忠顯校尉戍通擒戢反側嘯凶草間者前後以十數賜金符制擢授千戶官武略將軍在戍又十年請老有司以聞俄降制以其子世德嗣職公授其金符歸鄉里出則與宗戚故舊相羊言笑盡平生之歡入則以孝悌謹生理教諸子侃侃忘倦又十餘年一日思其子世德復之通居踰年卒延祐三年丙辰九月一日也春秋八十有六明年某月某日歸葬於所居北原先塋兆次子男六人女七人先配夫人李氏生女五三皆適王氏二適時氏崔氏再配夫人髙氏生男一世德也字從政又谷氏生女一適崔氏又潘氏生女一適張氏又金氏生男二曰世懋世傑又陳氏生男一曰世昌又張氏生男二曰世英世強孫男四人初公之應募也父母戒之曰人生莫大為善汝從役非戰勿妄殺人公拜受銘心無忘嘗遇行伍執一宋遺卒將殺之遽起遮曰殺此何益盍丐我負裝其愈乎許焉既得問卒言家揚州王姓公謂卒汝惟吾從無逋逃可全否則汝死矣維揚下縱之再嵗公入維揚有男子迎拜馬前言公所活奴王也至館與其父母妻子宗黨羅酒脯謝戀戀不能去平江隂叛俘一婦人言夫死兵二幼子不可知公曰吾家有老母汝能承侍無怠後當歸汝婦至果適母意俄母以八十終公使訪求婦家而二子在其長至公所公益哀之乃給婦劵悉以母遺物資裝畀之從其子歸又大帥總兵討叛寇文梅其帳下兵命公統之他師遇敵戰不利沒其衆百夫長三人得不死大帥怒下令戮三人徇左右無敢言公徐前以數語釋其怒三人以免其素行類如此嗚呼忠武王以間世大賢逢時稟命平江左一聖統功冠萬古而其一時驅馳後先虎貔熊羆之士誠與有力也然紛拏之際取舍不同悍者以多殺逞貪者以攫利進由是以崩裂泯滅無聞者曷可勝紀獨公挺然以一甲抗萬險致死而功益倍力善而行益著卒之身榮親顯貽貴子孫耄期之年完璧以逝可謂決起特立忠孝兩全始終無憾者矣世德以公善狀懇余銘墓道余里人雅知公又知世德世德平居讀書好禮溫然一儒者至其有事則激昻奮厲雄武傑出始嗣職聞虎害躍馬彀弓馳殺猛虎三勇震江淮有射虎將軍之聲噫是父有子而可辭銘曰士生懸弧志在四方伸屈有時變化靡常始以荷戈勉勉卒行雷震風馳劃然軒昻氣以義盈勇孰與亢混一之隆厥績孔揚錫恩酬勞金紫煒煌攸好惟德終此夀康付託有子既構既堂載辭貞珉萬世耿光贈奉議大夫驍騎尉聊城縣子陳公神道碑銘公諱旺字天祿上世睢陽人譜逸莫詳後徙東平居汶上遂占籍焉父諱興幼孤母張嘆曰陳氏之託惟此兒以苦節自誓鞠育教誨之既益長讀書有立志天兵平汴負其母北渡始居汶闡小學為甘旨奉以孝聞嘗為征商官配母王氏三子公其仲也兄曰伸蚤世弟曰用字天祐里中稱善人婦吕氏姪男一德新頴悟通星厯學姪孫男四公潛德不試以子用晦貴贈奉議大夫驍騎尉追封聊城縣子為人淳一恭恕力儉勤養親出入懋遷馴致殷阜凡富室無與亢然未嘗一非義取亦未嘗一見義弗勇也若濟厄窮活餓飢赴急難日常與家事並諸子錢或陷乏莫償輒燬其劵不復言至於洽宗黨接賓友侃然一本於誠東平人物都會髙其行咸敬重之里有閧公為一言皆慚悔謝去其德義可知矣及寢疾戒其諸子曰謹身承家人所當然貴義賤利人所希有汝曹第視吾平日所能行弗違逺大可期也生於丁未十二月某日卒於丁未十一月某日葬於汶之孝義鄉之原配商氏靜謹多內助追封聊城縣君子男三長曰用晦次君諒授侍儀司通事舍人次用中女一適張誠女孫二用晦字子明既冠遊京師達官貴人見者無不賞異謂當為偉器由是交遊日廣皆信厚知名之士始從事省闥厯官甄用利用二監轉通事舍人升奉議大夫崇祥院規運提點所在以才廉稱婦張氏封聊城縣君用晦以翰林撿閲官張深集賢修撰狀元張起巖為聊城公善狀因余子壻今利用監經厯官魏誼請曰先人棄養奄忽踰十閲嵗而墓道寂寥未有旌紀不孝孰甚先生辱惠以文載諸石則先人為不朽用晦亦可以瞑目矣余昔在京聞用晦之名已久頃嵗再赴召始識用晦壻誼家通擴詳敏信其為偉器也知用晦自銘於心資産嵗入施散必十之七遇冬出紵絮給賜窮者以為常凡才傑之在困婚葬之弗供與夫水火之不幸苟見聞必周之可謂克迪先訓志于逺大者也嗚呼聊城公始以孝勤致富而富不有家益盛終以貴義教子而子有立親益顯傳稱積善必餘慶茲非效歟漢樊重以君子之富昌子孫名後世以公觀之重不得専美矣為之銘曰人有貧富匪人乃天正以處之天乃可全惟聊城公善富不有動必天合確爾其守彼富不仁鷙忍且驕厚積深閉其心滔滔窶􅀢弗容柙櫝自圮傑哉聊城比屋萬里身為尚德子述義方堂構益崇列爵有光孝思惟永樹此銘刻一門之榮萬世之則奉訓大夫淮東淮西都轉運副使潘公神道碑銘公諱琚字君玉姓潘氏其先本姬姓畢公髙之子季孫食采於潘子孫以邑氏在唐有制策高第者嘗為宿遷令卒葬宿遷遂家焉七世從伯祖竒由宿遷縣教授徙邳逮髙祖世居邳為大姓繼有潛德而祖尤重厚長者兄弟割産獨不分一錢曰吾不忍有是已而致産復益饒將終聚諸負劵盡焚之而歿二子曰撫同監邳州醋以卒曰擇公之父也循直有儉德年甫十四而孤當金季戈兵擾攘之際輒能自立持其家無削弱之患嵗癸巳天兵收河南奉其母吳氏挈家北渡翔集濟南遂定居焉於是為濟南人其配郭氏公之母太夫人也克謹內治慈訓有法生公及其弟息州同知瑾公始就學警穎異凡兒識者知其有起家之慶十八推選為吏會轉運使田侯闢府山東喜收延人物聞人宿士多萃幕下公時以秀發居羣公間侯獨嗜公才論親倚尤密自始辟轉運知事歷濵萊兩鹽司判副至轉運經歷在山東凡八轉至元九年遷河間轉運經歷十一年以最升承事郎同知寧海州事俄改河南宣慰司都事尋加承務郎時江南始平河南直南北襟喉之衝文檄叢擾出入利害公隨宜裁剸肯綮盤錯以次而辦同僚賴其能十七年以勞得五品服轉奉訓大夫淮東淮西都轉運副使始公在山東在河間轉運之政稔其利病故始下車力以興除為已任前政因習窳敗之弊一切剗去人以不擾而課入大增兩淮安之及代歸更折節里巷以間適自樂不復仕二十九年二月二十八日春秋六十有五以疾終于興仁里第之正寢以其年五月六日葬于新塋先人之兆次公配夫人李氏同郡盛族慈孝婉淑周於婦道次富察氏東明總帥之女先公卒子男六人長曰麟趾行中書省宣慰使次曰昻霄承務郎行御史臺監察御史曰思敬淮東宣慰司譯史曰思義淮安崔鎮巡檢皆夫人李氏出也思明思順皆幼富察氏出也女三人長適劉瑜戶部尚書兩淮轉運使中子餘未行孫男三人女一人公識度超逺才力敻出不滯一能故所厯無難事而能小心廉恪不以所長自足故動必有立而名亦隨之至於敦睦孝友又其天性初父以其父侯之殯在邳謀遷之濟南未果而卒乃與弟瑾營卜厯城天陽山之原為新塋卒遷其祖櫬及奉其伯父撫以衣冠之禮胥其父葬焉成先志也至四方有珍異雖千里必致其母如在膝下有姑寡無以自存有姨及其夫流離他邦皆遞養以老其諸子訓以義皆讀書有成達于進取自餘族姻里閈困乏者必委曲周恤之公於生也始終之道庶幾無少愧矣故其殁也聞者無不驚悼嗟惜而弔者與赴者無不盡其哀焉嗚呼使公當大任操大柄得以盡展其才則其成就又未可量也位不滿德而止於是惜哉將葬其諸孤纍然衰絰持廣平陳錫所為公行狀泣血再拜請曰先人之葬金華王龍澤志其墓矣麗石未有銘敢請某於其次君昻霄為同學友而公則父執也其何辭遂銘之銘曰潘實姬姓其厯惟逺在邳始基有德弗顯惟其弗顯日積日崇奕世之慶啓而生公公始就學識者所嘆三語辟掾玉雪未冠翺翔山東八遷其官鶚薦既勝乃佐河間河南之幕南北攸控事則孔多豫處于中爰陟兩淮漕政允釐悉其利病淮人之思公才有餘德則誠美進不貪位君子之履公既逝矣悲孰可忘有子嗣之公乃不亡有隆者封載碑其石曰惟公之藏俾永是式中庵集卷十六
