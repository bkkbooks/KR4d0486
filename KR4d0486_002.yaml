body:
  text: 中庵集卷二元劉敏中撰七言古詩送選軍使者至元太平之六年野蠶吐絲米三錢萬方同入富夀域無為殿裏薰風弦百官奉職亦多暇雨露但急恩澤宣精神堂堂折衝萬里外天青日白無烽煙坐令亘古不臣國稽顙入貢争相先蕞爾東南隅固醜不自憐委命一帶水陸梁跨橋邊盡翻四溟波不洗從前愆帝曰可徂征此舉功必全用卒當用勁蒐閲無頗偏使君奉命来電影飛鳴鞭山東少年勇且健心欲報國知無縁一朝被選入行伍感慨踴躍皆忻然山林列戈㦸雲霞蔽旗旜弓刀角彊利鎧胄争華鮮鐵馬屯原頭植立如羣􅀢當前視其氣已壓江淮壖咄嗟辦此一能事使君忠幹孰齊肩雍容車騎今言還當有一言聞於天但云士庶樂為用摧枯拉朽之勢已在臣目前長蛇封豕不足慮露布竚見來甘泉車書混一兵亦偃應有辭臣載筆来上平淮篇原注是年大發兵圍宋㐮陽送親衛軍劉副都萬户南征勾陳天仗環紫宫羽林猛士如羆熊将軍超越世無比帝遣督領専其雄腰金佩玉動光彩大冠長劒何穹窿門前列㦸秋水寒馬上錦鼙朝日紅長安少年氣欲盡有如燕雀慚㝠鴻檢身精慤不自足委節報國銘丹衷包茅不入楚不共天意乆欲驚頑聾一夕秋風動江漢殺氣已滿秦淮東王師桓桓順時舉要浮一葦収竒功我君陛辭即戎事宻奉聖㫖餘難同霓旌導前錦帕首攬轡顧盼光生風沈㡬逺畧不可識請纓未足言終童眼中了了見囚虜指揮封守如旋蓬行當一掃氛瘴静南北混一車書通歸来獻凱奏闕下䇿勲定見超羣公圖形麟閣表恩寵平生事業能始終應笑為儒例無用長年螢雪悲途窮送潘景梁之官常州斷虹閣雨山雲濕岸草離離墜濃碧返照猶瞻苑樹秋回頭忽作江南客毗陵山水更清雄季札祠傍泰伯宫髙節已經千載後試從衰俗問遺風送王伯儀之官危山冶迢迢西北風吹起東南客離觴未盡山南歌征鞍已逐歸鴻發人生出處不可度古来聚散多哀樂君将緑鬂犯紅塵我坐滄洲搔白髪搔白髪苦憶君逺樹漠漠危山雲萬金良璞君自重大璧𤣥圭他日用王彦功為鄒平尹以卷索詩君今為梁鄒梁鄒乃是伏生鄉城頭青山號長白上有范公讀書堂伏生誠古儒口以堕典傳虞唐范公為大賢左右文治生輝光想當二公時梁鄒之人感戴興起孰可㤀二公去已逺梁鄒之俗日荒凉問君胡為治化導乃其方柔剛相濟治始平慎勿姑息梗與强芟夷蕰崇之懲一勸百理最長風行草自偃實著聲洋洋願君作邑止如此可與二公之徳千載流餘芳送北人韓飛卿先生昔踏少年塲寳劒三尺書一囊風雲才氣不自揜憑髙望逺心茫茫遨逰四海求知己白日青天誓生死解装呼酒洛城中擊筑長歌燕市裏功名未成嵗月深蕭蕭兩鬢黄塵侵喜君如此益自壮關河迢逓愁人心人生百嵗何處好兒女團圓奉翁媪單衣蹇驢歸務早秋風已滿長安道騘馬行送李徳隆赴行臺監察御史李御史百鳥鶚千人英用如快劍新發硎亦若古鏡無逃形三賔外臺幕河北山東俱有聲一辟烏府掾何公崔公相歎驚朝廷重邊重選賢才力亦著甘凉城今騎騘馬趍金陵慷慨為歌騘馬行原注時臺事在建康丈夫出處貴節義義與死生誰重輕君不見張綱埋輪肝膽傾孟博攬轡思澄清朝陽一有孤鳳鳴一鳴足成千載名不然從事故紙末正可解印還農耕李御史鐡石腸冰雪顔平生志願今始得勲業入手知無難過江騘馬人莫測北風霜早狐狸泣三山堂為張子京題原注張號西泉監郡建昌得三山以歸西泉愛山有山癖行盡江南與江北胷中磊落千萬山獨恨眼前留不得最後乃與三山逢平生所厯一洗空三山可買况可載歸帆併借旴江風徑来却掃西泉上忽見三山屹相向一重一掩皆肺腑萬壑千嵓在㝷丈崢嶸太古勢倚天混沌意出太古先崆峒盤礴含衆籟呼吸元氣来其間烟霏不散花如霧寒翠空濛濕冠履更容何物著此間我醉欲眠卿可去竒章東第不復㝷平泉别墅秋草深千年得失存去取可以耳目遺其心願君乆敬如益友不負聖門仁者夀原注太古崆峒混沌即三山之名王澤歌東平民王澤以米千餘石布五百端賑鄉閭貧者李野齋學士為作序諸公為作詩蕭仲禮持是卷徴予言勉為書此一斗粟積乃倉一尺布盈乃箱箱盈倉積心愈長願春不雨秋早霜細民失所嵗且荒我粟我布價始翔十出百入稱所望深扄宻鐍夜壑蔵下抵四壁上屋梁䑕衘窭籔不自量動以一毫謂不祥一朝大盗窺爾墻渾舎性命懸劒鋩坐視其有瞬息亡前日之積今日殃愚哉若人庸可傷君不見散盡千石與千匹髙枕無憂説王澤王澤王澤豈無取人得汝恩天報汝春晚山行路中見桃花顧山道中春已歸東風作惡黄塵飛長紅短白零落盡雜花狼藉争芳菲山迴路轉頗幽絶兩樹野桃留春輝嫣然一笑荆棘裏便有清香襲客衣恨君何苦輕妍姿惜君不及春風時鶯鶯燕燕時與期西園蜂蝶渾不知明妃逺嫁沙漠外深溪空谷愁西施行人往来不知貴一生芳意終依依我行於此偶相值脉脉似欲道所思碧雲望極青鳥逺獨遶百匝空嗟咨𤣥都觀裏舊時見腸斷去年今日詩徘徊良乆不忍去下馬為君簪一枝歸時携酒重相過祗應片片飛胭脂野亭野夫夲自野乃以累此亭此亭豈有知汝惟未忘形手持一盃酒中有山影青青山亦不言相與起吾酲半晴不晴天氣濕欲落未落日脚赤山容林彩不得藏一杯送我亭中凉醉中聼智仲敬誦詩喜而有作眉龎齒白歡頬紅足盤脅聳肩角隆兩手捉膝氣吐虹目睨屋梁頂摩空􅑷如寒鶻望四野突若驚麕超絶峯湏臾開口水湧風瀾翻欲與長河東誰知乾坤萬古怪特氣泄此方寸飢寒胷初為漢祖大風起次擬荆卿别易水邈然古意動悲壯慘淡風雲酒罇裏忽吟結客少年塲吴鈎錦帶照座光恩讎生死一語頃凛髪直上鬚髯張復為廊廟賡歌曲上有明明下穆穆民無夭札物無疵四海一家均五福歛情却作行路難長鯨翻海虎滿山李白悲歌阮生哭弊車羸馬愁長安酒䦨日落風色黒寒燈耿耿月掛壁㣲吟轉入楚騷經切切門前山鬼泣客飲不醉慘不歡我獨起舞呌且讙文章大是冩心具如君氣象硉矹誰能攀古人已矣不可望一笑逢君千載上送滕嵓甫赴京九重金碧開雙闕日射五雲光曄曄㣲香浮動軟紅塵鳳凰麒麟踵相接丈夫分有七尺軀口亦能言足能趨誰令此地獨不往俛首蓬蓽甘聾愚濟南竒士滕夫子涵茹古今經與史厯艱渉險三十秋長才老氣今如此去年匹馬東南逰凄風短劔隨貂裘山川風土入感激歸来詩句餘清愁乃今别我京師去翩若驚鴻無反顧知君乆欝濟時心滿腹竒言思一吐春風旅亭花滿枝酌酒勸君君勿辭後日春雲隔千里相思無吝寄新詩送杜書史榮季北上憶初識君御史府赤鳳石麟照庭廡賞君英發與君逰不謂緱山乃其父緱山大老文章師平生恨不一見之阿戎風味有如此一昔頓致平生思後来見子齊西邑秋霜正凛分司筆剔姦抉蠧入纎毫狡兎不出妖狐泣去年我居北渚東退食杖屨還相從聽君緩頬論利害濤瀾浩瀉春江風丈夫宦學如琢玉我為子凡三刮目子今去我向京師京師大是賢豪窟一顧千金定有人即㸔勲業到斯文野夫但學西城栁只辦迎君與送君七月七日同潘君美智仲敬劉深甫泛舟飲華峯下醉歸中流遇雷雨大作衣盡濕明日呈三子雲頭黒風飛海沙風邉白雨如懸麻扁舟一葉落中浦眼前不到漁人家禽魚静息洲渚暗寒氣蕭蕭明草花忽乗敗傘展未暇已作横潰無容遮飛湍走浪乍開闔時見電影明金蛇疾雷捲水掠舟過雲暗不整舟横斜舟中狂客醉膽壮引手欲挽阿香車拊舷呌笑助聲勢物外寧有張騫槎天應知我涴塵土為濯葛衣洗烏紗和王詳議處士詩韻古人白骨秋草枯藐然節義猶蘧廬龍淵化作蛇虺窟乳稚童牙皆丈夫姓名聞説處士老口不敢詰心掖虚新詩老筆喜入眼輕財禦冦緩急趍乃知元氣本無間季末何甞殊厥初我期斯人如鳳雛百鳥失避竹與梧我期斯人似初月光熖已射羣星踈趙文甫持洺水儒者李誠甫思忠行卷求詩其事則輕財赴難之類姑掇其大概而賦之男兒結髪事姬孔豈甘沒世無聞終闒茸處心常在衆人先凡馬千與萬焉知渥注别有汗血種今也威州乃有豪傑士不待文王䇿髙踵財空鉅萬敦骨肉身起窮寃解紛冗馮煖甘辭火券名竇郎頓失投䋲勇一身都是仁義氣我始聞之驚且竦衰俗靡靡頽波逺著手誰能為障壅豈期今日有斯人便合巖廊佐垂拱更看盡展濟時具風采一新天下聳不應猶作處士詩大筆勒名有南董雙峯詩并序吾友韓雲卿得佳石髙廣纔尺許而兩峯崒然㧞起並秀翠潤可掬几研間尤物也雲卿題之曰雙峯甚寳之然世有好髙而賤卑誇大而忽小者皆不得其心不造其理者也作是詩以遺之以為雙峯他日之辨韓公飲酒不飲客眼中猶見蒼龍角劉子賦詩不賦物為渠鑿破造化窟君不見三峯挿雲海内絶正與崑山作丘垤君家此峯矗矗不盈尺吾謂三峯乃其匹太始而来有此質元氣崔嵬入吾室静畫無人照心碧乃知世間小大短長相勝無窮極何必圖南為得搶榆失萬里要須同一適西来三呌信筆題韓子不言頷其頤雙峯忽與霄漢齊清明後一日西遊諸公見和寒食游繡江韻亦復和云春山隠隠横春浦岸上桃花嬌欲語人家臨水籬落幽門外炊烟出青縷三三五五踏青来恰逢天氣霽風霾一笑使我心顔開落花隨入飛香埃㝷幽覧勝不忍去斷腸十歩九徘徊溪東督郵風味惡擊鼓吹笙竟寂寞溪南有酒濃于春留當金龜與君酌西望太白横峨岷醉膽輪囷半天落丈夫莫忘平生心氣義未幾江海深功名富貴果何物臨風一曲留春吟留春吟為君訴莫使韶華等閒暮歸時應過黄家溪更為繋馬垂楊渡有酒濃于春一本作從事良於人北城泛舟借用昌黎公山石韻北城日長煙景㣲落花蝴蝶作團飛青萍緑浪榜歸渡春深谷口溪魚肥江山佳處豈易得人生但恨行樂稀閑牎空腹五千卷一字不療寒與饑村肆喚酒為君飲正有山翁来啓扉欣然就酌鱠銀鯽水氣入腮雲霧霏鵲華相對兩竒絶南山一帶皆屏圍當檐幽鳥囀新哢何必更須金縷衣門前過我誰氏子青衫騘馬黄金鞿憑君且踏紅塵去滿船明月須吾歸謝趙子昻同知恵梅原注趙杭人時為濟南同知詩仙愛梅愛徹骨夣寐江南煙月窟歴下寒多梅事稀西園兩樹還驚目多情細揀春風枝把翫頓慰江南思數枝還許分送我鄭重要作梅花詩白梅嬌怯黄梅瘦沉水谷瓶春一竇暗香無柰惱殺人小窻酒醒寒蟾透起来琢句句不神問花不語花應嗔詩仙明日當更笑不識江南浩蕩春八年重陽後六日漕司陳知房輔之邀逰龍洞書於祠壁我昔與山未相識朝夕倚門望山碧乃今兩足踏山骨恨山不能言與我論此太初之胷臆但浮嵐積翠杳靄於前兮雲凄凄而風激激忽風回而雲開兮穹林峻嶺甕抱而雲合千尺懸岸削青壁黯黯兮龍潭隂窅窅兮神穴黒若将出光怪而轟霹靂衆賔相顧而無言兮覺森然其動魄主人乃展白雲之天屏掃蒼苔之石席酌以兕觥戒以鯨吸發豪興兮萬丈将一飲而千石俄而紛然解襟頺然岸幘不知酬為主而酢為客而山之與我忽然而為一兮豈有乎或今而或昔雖天地亦不知其何為兮况於世之悲歡與失得俄聨轡而歸来後之逰者尚或發一笑於狂生之醉墨次韻賦田澤卿假山幽人在山花滿庭琴聲度竹風泠泠目送去鳥凌青冥回巒曲岫往而復何處浮花水流出長安之中有盤谷我驚造物如畵工㳺戯長與我軰同故着㓜輿岩石中原注京師田澤卿賢而不仕家庭為假山有峯巒洞穴之勝瀑流激其中上為六小亭為三橋回互往来竹樹掩映芳菲之間甚自樂也諸公皆有贈篇賈待制彦載曽為徴言于子因用揚損齋學士韻書于後損齋詩附三峯上下五六亭三橋曲折一清泠松竹落落花冥冥山林長往恨不復朝廷一入嫌不出爭似君居槃澗谷想像賦詩雖未工山水之樂非苟同樂地在吾名教中觀拾麥行去嵗秋冬時雨雪不濕面今年春夏交二麥不滿眼各家仰饑寒愛重甚蘭畹盼盼秀欲齊蹙額庶可展復遭霜雨作半為風所偃餘者僅能熟狼藉踈穂短缺然田畆間似不忍芟剪老翁行腰䥥暴露背負炎稚兒推車力不足老婦隨行手自撏苟使饑腹饜辛苦未死誰能嫌傳聞縣吏下村去鞭扑但説催征嚴老翁傷心淚先泣稚弱相看空失色舉頭但聞人語喧荷畚負擔俱汲汲東隣有寡妻滯穂爭掇拾袒裼手附刃俛首不得息赫赫日馭亭瀝瀝汗雨滴黄埃滿面無人恤饑渴何曽飲與食近前為問何人家窮困年来如此極我竭我心力嵗嵗勤播植恒産未敢期官租不暇給今年天降饑重我憂戚戚汝亦何因縁受此饑餓厄荅言我本富庶民平生未省艱與辛一從搆得青州禍舉家計業隨煙塵三年流竄無地着斷蓬飄泊風中根憔悴歸来閭井改桑田滿目惟荆榛頽垣敗屋重修緝驚魂稍定尋比隣城中斛粟貴如玉載顧四壁無錢緡朝食南山橡暮探西河芹昨朝里胥急叩門逼促要輸絲與銀踰垣四走不敢出意緒恍惚憂紛紛潜来於此拾遺滯敢以口腹辭辛勤幸圖一飽免溝壑官長豈不哀我貧君不見朱門犬馬餘梁肉萬庾千倉飽童僕窮歡極樂錦綺筵日費千金猶不足何當買牛多種田盡力向天祈有年剰與官中充府庫我亦飽食鼓腹忻忻然𤣥鶴引贈琴客張晉卿樗隠原注晉卿京兆人鍾期知音伯牙鼓琴鍾期既仙伯牙絶弦琴亡人去三千年恍惚逢此子不記伯牙死淋淋元氣在其指正音再見天地始四旁無人孤月明𤣥鶴下来山鬼聴山鬼泣俗耳驚手譜四百操傳心不傳聲千年復一鍾期生始識有無張晉卿原注晉卿集琴阮譜凡四百餘首皆精妙題燕山許文仲餘歡堂原注取東坡先生治生不求富讀書不求官之詩也生不治而餒書不讀而愚此外富與官有命不在吾一堂俯仰吾願足不羡六印歸來全錢撑破屋中庵集卷二中菴集卷二考證第三頁後二行案漢書濟南郡縣十四二曰鄒平四曰梁鄒後漢書濟南郡縣十七曰梁鄒八曰鄒平則梁鄒與鄒平為二縣此詩葢借用
