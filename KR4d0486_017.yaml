body:
  text: 中庵集卷十七元劉敏中撰碑四濟南王氏先德碑銘千歲之木其柯葉摩穹蒼蔽巖壑人知其本根之深萬里之流其波濤驅雷風沃天日人知其源泉之浚百年之家其子孫大門閥昭聲名人知其世德之盛也以今言之其吾黨王氏乎按王氏本髙唐人七世祖徙濟南之章丘支蕃派衍蔚為巨族髙祖考諱京為人真淳孝友重義輕貨家園多橘鬻者預入其直率三之一屬隕霜遽以所入歸其人田家往往以農器質錢迫東作知無以為贖即召付之金泰和末歲饑民病發私廪以賑所全活甚衆以年髙普恩一官并賜杖嘗手植槐於庭迄今鬱然根盤幄偃人知為瑞云年垂九十無疾而逝妣封氏卒年九十二曽大父諱亨讀書通大義動循禮則充其所知妣鄭氏大父諱廷字君用博學善京垓術生罹兵荒幼孤比長瀕於死者非一而坦然無憂容居常寡言或犯非義弗校以信謹為縣主書聞警潛走避黌堂遇羣暴禦將食之識者曰斯善人害之不祥乃得釋且護送避所濟南張侯雅知其賢既歸國署敦武校尉行元帥府知事經始之際贊畫為多逮以老引年而侯亦謝事日燕逰相從盡平生之歡親族之殁於亂者皆收祔先塋其齒諱行第密記不忘手為五服圖以譜之每一感及則流涕不已知其孝義最隆也壽八十有五終妣安氏秉內治慈而法先二年卒春秋七十九一子是為父諱忱字信卿用子桂貴贈中義大夫上騎都尉太原郡伯二女長適李秀次適劉宸都尉公資慧敏無不讀之書辨博而有容裕和而能幹城府機械不知有之張侯子襲爵署為其屬嘗從述職和林或計事省廷辭令既優尤善應變儕輩無及焉升幕府提領青州逆臣璮有不軌之志時戍漣海得兼制濟南兵數千時世皇居潛總兵六盤侯遣赴訴兵不可以益晝夜馳未旬入見奏對稱㫖給傳而還撤其兵侯益器重焉中統壬戌逆璮冦濟南宗王擁兵南下侯命前迓遂陳擒縛之策冦平擢大都督府知事至元乙丑調官制行侯徙尹真定辟知事偕往以親老辭俄二親皆棄飬喪五年未嘗與人接庚午調東平提領案牘遷淄萊己卯授將仕郎主朝城縣簿改順德録事判官以疾去職甲申除河間臨邑主簿兼尉卒于官實丁亥四月十有八日也壽年六十公蒞官尤詳治獄所至以遺愛聞苟事隙輒以詩酒自娛人莫能窺其際嘗戒子孫專儒術刀筆吏不可為論者皆以為公有軼倫之才屈於小官未始幾微見於色浮沉優遊而職揚政舉其髙懷曠度固與古人為徒較之脅肩病畦折足覆餗而不耻者穹壤矣為時推重如此先配夫人張氏濟南權府之女清儉備婦道年三十一卒再配夫人馬氏翰林侍讀學士之女有懿行撫育前夫人之子如已子教子婦治家咸為矜式歲戊寅卒年四十九並贈太原郡太君子男五人女五人張出男曰杞曰鋭杞仕晚終監安丘酒稅鋭倜儻不凡始官歷江隂餘杭案牘官建言更楮幣法世皇召對特授尚書省左司都事升員外郎除諸路寶鈔提舉出知滑博興寧海三州皆有能聲皇慶癸丑十一月十八日以疾卒女三長適劉彥清次適張珙次適解義馬出男曰桂曰椿曰桓椿桓皆早世女二長幼卒次適馬說桂六歲知讀書日誦千言既冠以儒貢歷府寺掾除承事郎揚州路興化縣尹憲司薦能入掾中書滿以奉訓大夫拜監察御史劾擊權要內外震悚乃請加封孔子遂有大成頒示之號遷吏部員外郎官奉直大夫大德丁未奉命賑旱飢浙間從宜設施民甚賴焉及還武宗躬享太廟以與享進階中義大夫至大三年庚戌有追贈考妣之命是年分曹上都適留守官得譴選授上都副留守明年聖天子嗣服幸上都進嘉議大夫同知上都留守司事面奉玉音慰勉且賜貂裘旌其亷能皇慶改元之明年大駕再幸上都以大興尹缺詔除大都路總管兼大興府尹陛辭命進酒且命進階訓以毋怠於事賜幣五千緡趣其行留守賀開府奏乞留數四竟不允到官寬猛並施京輔大治再踰歲御史臺奏除山南道肅政亷訪使上以京尹難其人弗許孫男五人女六人杞娶房氏生男二曰遜兵部奏差曰惠未仕女二人適某氏某氏鋭先娶冒氏生男曰能次娶宋氏生男課兒女二幼桂娶李氏河南儒學提舉舟軒先生之女封太原郡君生男曰志國子生女二長適張思義次適兵部尚書張古男國子生重戡曽孫男二遵遂女一遜之息也京尹君命其姪能及子志持善狀抵繡江再拜請曰桂等以妄庸叨歷顯榮恩眷隆渥念非祖德庇庥先訓陶鎔其何能此顧松楸寂寥前美弗彰乃心如焚先生辱惠以文載諸石桂願畢矣某既嘉京尹之孝重感都尉府君與先人文靖公疇昔從遊之雅不可辭謹述而銘之銘曰善必裕後學必顯親顯孰孝充裕罕善聞王氏奕世種德惟邁槐瑞孔昭宜顯且大仕莫匪榮天府奏功恩莫匪霑玉音監衷惕非所堪官守是敬方來未艾必有之慶昊天永懷欲報罔期刻辭貞珉不朽庶幾牛氏先德碑銘頃余自都下歸陽丘邑長者奉順大夫知濠州事牛公潤之持善狀請曰益不佞賴祖宗庇廕幸免罪戾致官五品嘗痛譜牒散逸無以周知先世之美惟是先大父暨先人濟陽君之餘澤遺行欲吾子文諸石為不朽之傳為松楸之榮為昊天罔極之報敢再拜以請豫惟所請孝之大者也孝不可違勉為論次之而系以銘按牛氏世為濟南章丘人大父諱豫以醫術鳴資敏厚喜為善嵗饑民疫出入恆乘黑騾以囊米自附遇貧病者輒視而藥之且遺以米使得食以是所全活甚衆鄉人德焉配劉氏三子長曰山次泉次傑山傑皆早世泉濟陽君也為人魁傑有膽力金季之亂張濟南公擁衆保長白之黌堂嶺君以敢勇善騎射選置麾下濟南公既歸國以侯伯行省事得専除拜從親王略地河南署君百夫長實以爪牙任之河南平以勞授濟陽尉猶𨽻麾下也蓋君自弱冠起身事濟南公出入兵間始終殆三十年而未嘗有絲毫之失幾微之嫌濟南公亦愛之不使一日去左右故濟南公之麾下言質直篤厚無間者唯君為稱首其處己尤勤儉以故家益饒歲已酉大饑散窖粟五百餘石遠近賴焉行遇暴骼必收而掩之見遺物必訪而與之此義而能惠又其天性也君挽弓至一石五斗矢大異常射命中逾里在亂中嘗與弟傑輦母有所往遇羣賊迫至君曰賊敢怖吾母乎謂母萬無恐使傑守之獨束衣握弓矢前山立不動以伺賊意賊望見君識其勇者不敢近遙激衆矢嘗君君皆避之徐引滿發一矢落賊後數十步入地半笴賊拔取視之遽相驚而去中統壬戌李璮叛青州襲濟南濟南張侯度不可禦走京師時君已六十餘歎曰兒子輩既從張侯矣吾雖老寧能守此坐受賊汙即以私帑并其幼稚行將避之湖山剽者六七輩遮君于道君遽呼躍引五尺梃法擊之連擊連中仆其三人賊散走以免觀此其平生志趣才量可知已至元庚辰十二月十三日無疾而卒享年八十有四葬于邑東南十五里康氏莊之西原從祖塋也先是歲辛未十月君久疾有不起之憂夢神仙若丘真人者謂君汝是吾弟子汝壽當八十四覺而言之翌日疾果愈及卒人始驚異疑公亦仙去矣配張氏淑婉備婦道以甲申四月十七日終壽年如其夫及合葬濟陽君之容體衣衾皆不腐奄若卧寐見者益異之生男四人長曰廣潛德不仕次曰益濠州公也次􅡋危山巡檢蘄州路稅使多藝有幹局次璘蘄州雜造局使壽春稅副以通敏稱濠州少有俊才文采奕奕動人早以從事辟濟南張侯幕㑹丞相瑪爾美平章趙公右丞張公奉㫖檢括前省乙卯至己未凡五歲內外金穀出入之數仍選諸王府屬各二人共其事而濟南為親王哈坦分邑王以公應選祿秩視左右司郎中公既明辨又素練逹於是諸大人屬目一切仰之事不勞而辦省府既熟公才用凡事關難劇者必以遺公而名聲藉甚青冦之據濟南天兵討之平章趙公實董其師公從行一日遣公詣大帥計事猝遇冦圍公欲降之不屈以刀砍公首復不屈凡三砍竟不死亦不屈乃執公去㑹晚冦有追襲之恐公伺釁潛褁傷而還大帥躬加勞問給白金五十兩旌其忠且記其名尋為王府郎中歷事三王歲丙子用王府薦授承事郎知濟陽縣轉同知雄州事遷承直郎蘄州路總管府判官進知濠州其治以亷勤公恕去弊因利為主故所至多美政民皆思之濠政之代以年及有菟裘之思遂浩然歸鄉里而有是舉嗚呼人皆知積貨財廣田宅為子孫之計而不知清白篤厚之可以為垂裕之慶而無驕佚墜失之患也人皆知回邪曲屈徼取富貴為家門之榮而不知公忠亮直之可以為顯親之實而無憂辱顛覆之虞也故余既述牛氏先德之懿復著濠州公之出處大略欲知所謂垂裕之慶與夫顯親之實者果不在於彼而在於此云銘曰長白蟬聯繡水所環康莊有原是為牛氏之阡繄牛氏之世莫知其年顯允惟祖植本濬源溉方寸之田得同然之天以粒飢藥疾之端知見義勇為之賢顯考繼之遭世迍邅委命為知已用何蹇蹇兮桓桓至若掩暴骨而遺物必歸閔凶歲而積粟以捐一矢慰母心於畏途挺身鑠逆吻之垂涎天報罔愆鳯驥聯翩矯矯濠州逈擢孤騫發軔侯藩曳裾王門應青選於天庭動紫微之星躔實著聲馳乃處承宣隱然良吏之蹟渤海潁川五馬來歸皂蓋朱轓松楸之華賁于九泉蓋播之既精而穫也則然以創繼言之是謂兩全我作銘詩為牛氏永永之傳商氏世德碑銘余族弟宥介其戚商氏者見余繡江草堂再拜致其兄忠顯君之辭曰進戍江左兵校也始以眇焉之軀委置矢石之場出萬死一生食息自若重忝國家爵祿皆出望外非由祖先積德廕佑曷能致此言念丘壠旌紀寂寥報本之義大懼隕闕謹使弟慶以世次行實獻先生辱銘諸石存殁惟幸余感其請且以弟戚之故乃為之銘按商氏之先濟南鄒平人其後有徙居陽丘之錦川者故今為陽丘人焉世業農以勤儉嗣守髙曽而上失其字諱曽大父三子大父其季也諱清為人疏豁樂施豫意懇懇常恐負人而人之負已弗校也春秋六十四以丙辰歲三月十有六日病卒配祖妣王氏以至元三十年九月十六日卒享年九十有四子男二人長即君之父也次曰友女二人長適开氏次蘇氏父諱顯和夙成有父風而毅敏尚氣識者謂有起家之望既冠二歲而卒鄉里惜之實庚子歲十一月十有一日也配母吳氏二子長曰進忠顯君也次曰慶叔父天資信厚持家有法事親孝視其兄之子如己子嚴而愛配母王氏子男二人曰璿曰瑄女二人長適馬氏次趙氏忠顯君自其幼時嶷嶷如成人年十七𨽻名兵間時濟南孟公統本道兵見其魁傑喜之俾長五十人立麾下及從沂郯統軍逹春城正陽復入善射之選至元十一年天兵南渡江從攻常州先登尋略地福州賊阻髙王寨破之第功咸獲優賞十五年以行省檄署百夫長領汴兵從戍台州俄改戍漳州至衢賊有金姓者擁衆圍衢衢帥以請君先以所部擊賊於小南門始接戰手殪數十人賊自解去君以賊未逞旦且復來乃潛識賊出入所經要害白帥設伏待之明日賊果至城中兵拒戰賊却遇伏君呼躍奮擊與內兵應賊遂大潰尋追降其衆用是以謀勇聞是後破福建賊黃華於古田剗張治囝於湖頭翦詹福三於尤溪皆以致死力取竒效為諸將之最省府上其功朝廷嘉之元貞二年二月奉勑百夫長授忠顯校尉給之銅印緋服䘵廪以本兵戍松江君天性孝友質直而亷凡居家仕宦未始有毫髮私獨以武事自喜尤精槍法人罕及者蓋商氏之門君以節槩勇敢立聲名於外其叔父暨其諸弟以慈和敬讓厚基本於內由其大父至於諸孫凡五世上下數百指門風雍肅無有異食私蓄閲墻反目之隙故鄉人言孝義而能顯榮祖宗者必曰商氏焉易稱積善之家必有餘慶以今觀商氏之慶詎可量也哉君四娶子男三人女三人始娶王氏卒有子二人曰讓曰信早卒女一人適吳氏再娶翟氏有子一人曰說女二人一適开氏一幼又王氏李氏男孫一女孫二弟慶娶崔氏又丁氏卒子男三人曰諒曰誠曰咨女二人長適李氏次幼皆崔出也女孫一人從弟璿娶孫氏二子曰詢曰譓瑄娶蘇氏子男一人曰詡女一人銘曰惟古得氏氏有商統疏派衍遠莫詳陽丘之商藴世芳敦朴不漓孝義彰根本既固枝葉昌忠顯乃是白眉良早年置身卒與行一葦要濟浮海航鉛惟一割己自戕金至百鍊始益剛出入瀾濤踐榛荒鯨鯢盡戮蛟蛇藏薦書上列聲洋洋酬功以爵制有常甲胄一朝化簪裳坐覺桑梓生輝光祖考慰兮樂且康錦川平衍繡水長商氏之慶未可量伐石刻名先美揚朂哉後人毋或忘姚氏昭先碑銘姚氏始為濟南齊河人其上世屬金季兵亂失其譜系考諱成避地陽丘之南羅因而家焉成資厚重而志意宏濶以膽氣自任喜擊刺騎射勇力絶人濟南張侯部將馬公雄傑人也時有妹未嫁欲得壯士配一旦得公喜甚遂妻之且薦之張侯從侯征河南以驍勇聞俄以病免歸因慨然念曰吾祖宗惟力農敦朴勤儉家以殷厚一經喪亂蕩滅無幾然隂德之所以垂裕子孫者宜不可泯遂戒其子今忠顯君曰汝長矣庶可以試汝遂代吾役吾其教汝兄與汝弟務立基本以無替祖宗之緒于是敦率諸子以孝弟力作為事數歲益富饒而子孫循循有禮讓之節中統初青州李璮叛奄據濟南民竄避無所得食公自以窖粟五百斛出而賑之賴以全活者甚衆時田野蕭然無一夫把犁者公獨為栅自護潛種粟為他日計㑹親王督兵收璮適過其所公從數人舁酒脯迎拜馬前曰野人不知忌諱聞王來敢以巵酒獻王大喜為下馬坐見其所種禾謂公曰向所經未嘗見寸苗是安得有此無乃爾所種而懼為吾兵所殘乎公叩首謝曰惟王憐之王故為久憩令兵盡度乃去禾以不損冦甫平而熟田僅數十畝而所入粟二百餘斛鄉鄰復業者皆仰食于公如取已物逮春民耕復無種公又分給之鄉人德焉廣博尊重遂為里中長者以某年某月日春秋八十有九終于家五子長曰珍次曰玉早卒曰興即忠顯君曰圭曰信馬氏周于婦道先公卒年七十有九初忠顯君以未冠之年代其父荷戈行伍間已自奮拔不凡始戍下邳大帥一見識其可用輒以自隨㑹宋人入冦帥引兵赴之戰于淮安之巴泥蕩君呼躍奮擊立斃十餘人賊衆潰走因追殺其主將大捷而還帥壯君勇鋭假以弓矢勉之歲己未天兵臨鄂渚君以力戰獲賜白金錦綵異等及大軍再舉從擊潭州取江寧戰于沙市略廣西皆有殊績屢獲銀盂繒帛之賞江南平遂入為禁旅嘗遣戍和林益蘭以勞授敦武校尉親軍百夫長尋賜銀符加授忠顯校尉仍洊賜金帛楮幣之數甚渥君沉毅寡言自信無委曲意平居斷斷如常人至臨陳對敵躍馬顧盼勇若神人凡重危必死之地衆所憚者君常請行以故多竒功及受職益恪謹自勵士卒咸畏慕焉今年春以告省冡奠掃之際泫然流涕曰吾以一卒出萬死一生叨蒙恩遇分符佩印得備宿衛之末為榮甚矣是皆祖先蔭佑所致念所以揄揚前美者非文諸石莫可遂懇其鄉丈都君持善狀再拜乞銘於余義不得辭乃托其實而論次之嗚呼古人謂仁者必有後今以姚氏觀之信矣蓋農為生人之本而其為道專固勤動非有巧射幸得窳薄之弊矧能輟已利衆拯其阽危斯誠仁者矣故姚君經百戰之險無一撓之失卒能致身顯逹忠孝並著為祖先光榮夫豈偶然哉銘曰姚氏之先起於齊河亂離是遭爰徙南羅世業以農自食其力輟已濟衆德惟純一天有顯道曰與善人與善者何在忠顯君赳赳忠顯勇以為孝挺身百戰有進無撓羽林森嚴貔虎所環駢驅角立君超其間賜豫既多恩命凡再奮激厥中矢死罔愛佩符來南松梓有輝言念先德泫然沾衣琢石勒銘匪侈匪報以念其嗣人惟永是效至元二十九年十月日賈馴昭先碑銘積善埀統以裕後立身行道以顯親古今所重人之所同欲也雖然善不欲有心為有心則偷偷則薄後不可裕矣名不欲以幸得幸則辟辟則辱親不可顯矣故無心之善裕後之本也自得之名顯親之實也世亦有無心之善自得之名乎吾於賈氏見之矣賈氏世為濟南鄒平人祖諱福以敦儉自尚二子長諱珍次諱友尚書君父也為人淵淳慎靜不知稱量貿易不知飲酒不知入官府見鄉鄰鬪者輒閉户避里寡婦孫老矣以白金一罌見託而他適踰十年歸未有請遽付其所託罌封識宛然婦見之驚泣再拜曰此非敢望也願分其半為謝勉而去之竟弗受嘗遇醉人遺絲純道上去無同見者獨追及與之又嘗以生組若干絇送染人既染染人以歸他日視之則絇多以十數亟持往還其人愕然悟曰此某氏組也偶不知誤忘矣微子吾惟償之耳嗚呼為善而若此夫豈有心哉裕後之本也至元辛巳六月十日念其子馴久以非辜繫詔獄不解感焉一夕卒年六十四配王氏勤儉靜順克完婦道癸巳三月二十日年七十卒二子曰馴字致道尚書君也曰騏字顯道監濱州稅孝友有為四女長適王氏次李氏次假氏次王氏皆濟南盛族尚書君始由提刑吏升察院轉户部歷臺省掾為户曹主事進中書檢校官剖繁折劇能狀表表以是擢右司都事聲望益著遷兵部員外郎時附京諸驛煩弊狼藉君為一一設法使得輕重均一諸驛便之而君以歲秩當更驛夫數百户遮宰相號曰若賈員外去兵部吾屬困苦死矣㑹成宗獵城南宰相以君見即日進授郎中官奉直大夫旌其能也踰年改工部加奉政大夫君益精敏自勵毅然以一部失得為已任不以次列介意凡百工五材之用審曲面勢之宜多寡之殊久速之程皆心規目度靡不曲當吏弊無所措同僚仰成而已故太保右丞相深器重之京師始未有孔子廟至是詔有司建立并置國學丞相獨以委君君曰嘻此政化之本敢不敬成入理曹務出營廟事旦夕勤劬無風雨寒暑自其規模位置以及圬墁斫削皆躬為指授已而搆締宏麗廟學俱興首善之觀朝野瞻聳莫不咨嗟羡贊咸謂賈君為有功於斯文矣以朝請大夫進授侍郎聖天子嗣位拜工部尚書加少中大夫初至元間巨姦專政竊生殺柄脅制外內視臺憲善良如仇敵山東提刑副使李唐卿正人也巨姦奏請省臺雜治欲置李與數十人者於死君時為小吏以連證逮繫者視其風㫖一與所誣合而君獨以實對困辱百至不易姦臣使啖以利誘以官不易脅以死亦不易繫凡三歲執如前李竟以得免大獄以解時論翕然以古人期君矣迄今事業方赫赫日新本基之植實此焉始嗚呼有名而若君夫豈幸得哉顯親之實也君今暨其弟騏來再拜請曰馴等不佞徒賴先德庥蔭過荷國恩罔極之報悼恨無所茲欲刻一石為松楸光華惟得吾子銘可以卒志余雅知君者乃為備言之欲知裕後顯親之不可苟得也銘曰九淵之流源乎濫觴百圍之木萌於毫芒其蓄者深其發也長賈氏之善世藴弗彰積久彌著乃合天常孰綱孰維隂極而陽猗歟工部實膺餘慶巨浸稽天一葦所杭大本既立旁礴翺翔躋貴紫微協吉黃裳臣子之職曷不孔揚繹繹孝思先德不忘刻辭貞珉有永其光河南谷氏昭先碑銘武宗繼統之四年考制旌賢頒錫封爵今般陽路總管谷君果之祖贈中順大夫上騎都尉追封長安郡伯祖妣追封長安郡太君父贈少中大夫輕車都尉追封長安郡侯母封長安郡太夫人君來言曰果以踈繆之質遭逢聖時叨沐榮幸恩隆二代念非先德所庇其曷能此得先生之辭文諸石以彰不朽敢再拜以請按谷氏世為汴之鈞州密縣人髙祖而上譜逸不可詳嘗有官縣令者祖郡伯府君實其支系諱秀未冠值金季亂徙平陽河南平乃歸資剛果英邁不羈而善於治産以是富饒雄一邑乃更折節樂賑施以禮義自居里中右之有谷半川之號屬有事襄樊兵檄驛使絡繹駢接所過艱於供億大府知其才選署驛官以幹逹稱晚節治家教子益嚴以法一日以資産析諸子命之曰汝輩長矣其各立而家所以然者庶他日免䦧牆之忿而全其同體之愛也毋惰窳易吾言春秋七十又四以至元三十一年甲午六月二十有五日終於正寢先配司氏太君也壽六十二前卒越三日合祔於邑東南移山隂之原先塋兆次再配李氏三子長曰德即郡侯曰青曰欽皆司出一女李出適王氏郡侯府君為人溫讓侃侃有古君子之風世之囊槖鈎距機穽巧利無關於心至大已酉九月四日年七十二卒配呂氏太夫人也淑婉恭慎本諸天性其事舅姑接夫子洽宗戚一與禮合內外無間言康壽享祿飬宜己一子為總尹君字明之識遠器宏風裁峻整幼頴悟異常祖郡伯喜之曰是兒必興吾宗始入小學禮制節文目擊心㑹既長貫通羣籍學博而智益明志存濟物屈於施用喟曰古人以良醫比良相吾其為醫乎乃悉取方書讀之凡醫之技術皆精故其已疾若神名馳京師大德初近臣以醫薦入侍成宗大見知遇詳勤忠恪行在無舍旦夕賜金錢珍貝玉帶第宅以及衣服鞍馬歲月相踵纍官朝列大夫同簽太醫院事至大改元授朝散大夫廣平路總管下車以亷正惠和悉民利病噢咻戢遏得寬猛之宜又以儒學祀大成風化之源醫學祀三皇死生所繫其崇飾奬勵尤所致力也民歌詠之滿加中議大夫遷般陽其治如廣平而聲益大妻張氏安千户之女封長安郡夫人二子曰麟駒早卒次幼二女長適崔氏次在室夫善積則後必裕名立則親必顯天理之常人事之難者也谷氏上世雖不概見以郡伯郡侯觀之其堂構播穫之懿繼述遠矣故總尹君之生既學未施遽躋貴近出膺重寄再殿大邦前美殊榮焜輝金石郡伯興宗之言為有見矣天理人事之合如此乎吾知其門閥之盛方隆而未己也銘曰書載降祥易述餘慶天道𡨕𡨕厥顯龜鏡龜鏡者何谷氏可徴郡伯攸系邑宰是承善富不有好禮樂施才與用違訓子見志雍雍郡侯所履日新以天合天猗此吉人靈淑挺生起家之子懷寶不售醫以相擬鯤化鵬摶一昔九重有莘割烹亦惟其逢侯藩西東聲烈益大榮及祖禰忠孝斯在松楸鬱然穹碑屹然流澤騰芳以永斯年中菴集卷十七
