body:
  text: 中庵集卷二十元劉敏中撰墓銘贈奉訓大夫飛騎尉渤海縣男賀公墓道碑銘先皇帝至大三年庚戌封爵制行公以子復貴贈奉訓大夫飛騎尉渤海男又六年復來以公善狀泣涕言曰先府君之卒以忌弗克葬今敬卜以是年七月二十有七日癸酉舉其殯暨先太君之柩合祔於新塋兆次念墓道有銘公誠以鄉曲之故見惠惟幸敢再拜以請按公諱延夀姓賀氏濟南陽丘人其逺祖家恩州後遷濟陽縣北十五里立塋其旁髙祖之殁别葬於塋之南十里為新塋自始遷逮公蓋九世矣遇金季亂譜亡自髙祖而上字諱無所得五世祖登金進士第一子即髙祖有子五人其長為曾祖諱廣三子祖其季也諱寬一子是為父諱成母霍氏子男二女四男公為長次未名娶妻李氏早卒女適李氏杜氏馬氏呂氏公為人誠慤敦敏讀書通大義而於禮節獨謹故孝弟之懿稱于宗黨信義之實洽於友朋凡以智數為機術以侈靡相誇詡者公視之蔑如也逮晚嵗其子仕益達猶日諄諄焉以亷勤忠貞戒之如未仕時其務逺大蓋如此春秋八十有三以大德十年丙午十二月九日卒於家配崔氏賢淑惠慈克諧內治夀年七十六先卒實四年庚子四月七日也贈渤海縣太君子男三人女四人女長適劉氏次李氏次吳氏次髙氏男長曰祥頴悟好學尤工書補縣軍鄂囉吏卒年二十有三矣娶冀氏先卒無子次即復字亨甫沉毅有俊才其學以儒吏並濟南總府掾歷宣閫秋官宥府至中書左曹除承務郎禮部主事升奉訓大夫京畿都漕運判官時則有渤海恩贈之命滿轉徽政院都事加奉政大夫先娶侯氏卒再娶劉氏封渤海縣君次曰德髙安縣主簿娶張氏男孫四人長曰元泰復之子從仕郎果木市大使娶王氏次庫爾烏瑪喇圖古勒岱之子皆幼女孫四人長適王氏元泰母弟次適崔氏次稱心次金鞍皆未行科爾同出曽孫男餘慶女玧璄元泰子也夫力穡則有秋積善則餘慶事之正理之常也穡力矣而秋弗穫善積矣而慶弗至事之正理之變也君子不以變而易其正而其所謂常焉者固在也公生當九世而下屬多難之餘其所以持身接物奉先迪後者勤劬黽勉無適而非其當既其老也年躋上夀及其子之顯其沒也恩爵五等彰其祖之德孫息繩繩而門閥益髙理之常不在於此乎嗚呼公可謂不易其正矣銘曰賀本姜姓慶父之裔源逺派分顯晦罔世偉惟渤海身以善成義著德揚家用以興子訓克遵鴛鷺是簉榮養衎衎既康而夀恤典之華實賁九泉載銘麗石奚千萬年東臯王氏新塋碣銘王氏始居河南永州為大姓曽髙而上譜逸無所考祖諱存娶陳氏孟氏子男三人女二人男皆孟出曰瑋曰璋曰瓊存與陳氏繼以疾殁而葬於永嵗壬辰天兵下河南瑋兄弟三人奉孟氏踰河而北倣徉濟岱之間因止東臯而占籍焉孟氏內外夷險偹諸婦道年五十三卒瑋為人倜儻有幹局嘗為永城吏屬河南甫定分兵戍永主帥知瑋能權署永城丞行縣事既北遷用山東行省命為案牘官領東臯青城稅尋管濟南六處稅以卒夀五十有一初既居東臯而來集者益衆皆患乏葬地乃與二弟謀買南郭田從之葬逮今凡七十年葬無慮數百丘而地猶有餘其為氣義槩可見娶丁氏李氏四子長曰國用東臯稅使次國才鄂囉百夫長次國寧以純德自晦次國安東臯稅使女一人適李氏璋尤孝友既遭喪亂人剝齧草木以活璋左右奉其母百計未始乏粒食嘗他適聞兄瑋當從軍遽還謁軍帥曰我兄懦不堪役請以身代帥竒而許之從征淮西㑹糧絶士相顧欲亡璋謂衆曰今亡亦死矣姑待之乃獨仗刃向山中俄俘一人同負米而還衆賴以輯帥嘉其能署以帳下之職師還居數歲家益富饒及疾革召其諸子曰凡諸負劵盡焚之僮六人悉縱之言訖而逝不瞑衆曰豈以劵乎取而焚之乃瞑年六十有六娶樂氏曹氏李氏四子曰師立師獻師真師友女四人適孫氏張氏劉氏髙氏瓊善居室以恭儉自處在昆弟無間言性髙潔不屑豪貴其就義樂施豫猶饑渴然宗黨賢之卒年八十有三先贅劉氏鄉先生解元君之子也有女三人適陳氏張氏孫氏再娶鄭氏有男一人曰思哲生十有三年而孤今甫冠矣能表表自見好學有文章嘗從余逰來以先世狀見余京師請曰思哲家世永人祖先之葬于永者既不可遷矣頃與兄國寧輩協謀共力購地東臯之東南六里廣平之原為新塋敬舉祖考暨祖妣陳氏之衣冠及自祖妣孟氏伯考妣而下殁于東臯而未葬者咸以禮遷祔焉實大德甲辰夏五月九日也然而未有旌紀念無以昭先示後先生辱銘之石王氏存殁惟幸嗚呼創始者期可繼奉先者思不忘人倫之懿名教之大者也觀王氏伯叔雖未大顯皆能以才氣行義濟艱難成聲名為可繼者矣國寧思哲輩皆朂志立身修葬祭之禮擴追述之孝為不忘者矣是宜銘銘曰永巢既危三雛嗷嗷聨翩北征母氏劬勞載翔載集爰集東臯拮据卒瘏于茅于綯我室既完我廪既膏或塤或箎有美是韜開爾嗣人惟士之髦新阡乃闢慰彼焄蒿琢石刻辭過者所褒慶由善積門閥其髙故東陽陳公墓道銘公諱仲文字輔之姓陳氏其先滎澤人曽大父諱臯宋宰相堯叟六世孫大父諱德皆以善行重於鄉里父諱樞壬辰天兵取汴失所往公北徙至恩樂其風土遂占籍為恩人焉資博敏有為善於治産數歲家益饒雖巨室無出其右而常欿然不以富自有每一念及其父輒痛泣不已其事叔考一起居一飲食唯謹曰吾不得事吾父而可以怠吾叔嘗言人之有族屬猶木之有枝葉也其枝則異其本則同骨肉之愛而忍忘乎凡同宗窮乏無踈密必周之困甚者館於家若鄉閭若羈旅寒者必燠之衣餒者必飫之食至若引義推財援患難又所樂為者屬歲艱民饑發積廪以賑其子錢無以償皆燬其劵不責士有厄於進取必厚資之賴以成名者甚衆家儲書萬卷闢館延師儒教諸子學聞子孫有過輒對案不食需其悔懼自謝始假辭色喻以臣子忠孝之義朂其所立孫守諒除僉湖南按察事謁行戒之曰風憲之責在于别黑白振紀綱正已而正人者也而或私愛憎害公道咎必及身殃必及家如報國何勉之哉里中化之咸知敬畏以為矜式至元戊辰逰京師止春臺坊為寧夀堂以居所接皆天下士車騎日夕滿門若翰林承㫖王鹿菴學士李野齊閻靜軒諸名公尤其密者也髙德令聞一時人翕然傾之逾十年歸年八十一以疾終於正寢實二十七年庚寅六月六日也是嵗九月十五日葬於州西髙唐武城德化鄉之原配梁氏前卒至是祔焉梁氏汴之中牟宦族淑婉備婦道秉內政嚴而有法闔門幾二千指無敢違志生子五人履謙制授承務郎景監使好學亷于官守曰讓蚤世曰議從仕郎上都永盈倉監篤於孝悌以親老歸養不復仕曰天祥承務郎夀春府判官喜讀書以氣節頡頏公卿間名聲藉甚曰諶纍官奉議大夫陜西諸道行御史臺監察御史所歷以政績聞男孫十七人曰守政守信守敬守諒僉憲也今為茶陵知州守忠守禮守榮守智守約守誠守道守恭守理守中由得平尉擢河西隴北道肅政亷訪司照磨官守能守善守靜女孫八人長適馬氏次吳氏次趙氏次韓氏皆盛族餘未行曽孫男女三十七人守中階其友員子嘉來言曩歲先人御史諶將勒石先祖墓道既謁翰林編修陳觀狀其行實乃曰其文須得濟南劉先生辭㑹按事雲南不幸以殁守中痛心疾首無置寢食先生不惜一援筆勞見惠則先祖為不朽而先人之遺恨為可以釋矣豫嘗以朝命至恩時御史君為州判官悉其亷正因與交甚欵故請不可辭銘曰蚩蚩者氓生則罕遂猗歟德人五福乃備其德維何孝敬是基所怙不天慘孰此遺叔兮我哀致樂則一我宗孔邇胡忍勿恤教子事君善富若雲傾我槖囊急爾溺焚見餒而食遇寒而衣折劵發廪歲沴以濟才傑不伸假其翼飛名勝遝來中情與依英華外煥非玉為寶無愧無怍康樂夀考子孫承承餘慶有光載銘麗石百世不忘東臯超然子張君墓道銘延祐二年秋八月十有九日東臯張超然直卿將葬其子仲以君善狀屬邑士王思哲夏克已來以壙銘請辭曰知先人者莫若公孤仲等敢泣血俟命余既哭嘆曰古人有言白頭如新傾蓋如故道賞音之難也始者直卿與余邂逅於濟南氣一語合是後於京師于繡江㑹益數交益密逮兹幾三十年矣或以其密也曰是殆有以相資耳嗚呼余之心直卿知之直卿之心余知之吾兩人之交天知之或者之謂為知乎為不知乎君已矣可以不銘乎嗚呼余非斯人之銘而誰銘君諱真直卿其字也姓張氏自號超然子其先密人逮先考府君徙齊東家焉髙祖考諱善曽祖考諱青皆力穡自晦考諱志端以克嗣先業致饒金季亂能保衆攘難鄉曲賴之後嘗以燕臺行省辟為濟南濵棣益都東平等路諸色人匠總管一日正衣冠危坐召君戒曰我張氏世以勤儉聞汝毋驕吝隳爾家言已而逝妣王氏兄諱正字正卿早世君為人神宇明偉識度淵曠居常寡言若訥而黑白之辨於中銖髮不遺讀書取實用不溺章句尤習司馬氏通鑑皆手録成帙闢館延師儒教諸子學雅嗜鼓琴時獨以古意自娛今東臯弦誦之風形於里閭君實倡之也其居産一以先訓從事雖益完美未始有滿溢色至其樂施豫猶嗜欲然邑中營孔子廟君躍然起敬輟資為多兼喜繕修凡規制皆已出故其居第峻整麗雅而初無夸詡意有樓焉扁曰超然因自號之其趣向可知已及疾諸子以醫藥進皆却之曰人生修短有命吾之命己矣醫奚能為竟卒春秋六十以是嵗九月二十有五日葬於城東二十里伊氏莊之原先塋兆次配王氏李氏子五人皆學問有立長即仲次升尚服院宣使次俊次倜次儼孫男二皆幼女三在室余唯君平生正不茍合義不茍得挺然而特立無吝嗇侵凌之悔無佞諛汙敗之辱死生之際弗懼弗惑噫斯亦難能矣古之所謂富而好禮篤於信道其無所愧焉銘曰毅正剛明其得也天樂天不憂其歸也全世所羡怵胡不永年跖夀顔夭於誰取焉麗牲有石我銘是鐫匪我辭溢惟君之賢儒醫衛君墓道銘吾鄉章丘有良醫焉曰衛君諱瓊字唐卿唐卿之父曰真字顯道顯道之父曰琛琛之父曰安安之父曰大用由大用而上又再世皆以醫相承有聲梁宋間在宋世嘗為翰林醫官大用於君為髙祖屬宋靖康南遷避地來濟南居章丘之延安鎮曽祖樂周急金明昌間大疫煮藥以濟危篤褁飯以哺貧餓賴以生全者甚衆祖為人寬厚長者以儒醫稱父顯道資淳雅識慮通明尤邃於針刺且兼長諸家不專一能患家有以金銀首裝至者却而藥之著為後法四世皆享年耆耋髙祖妣裴氏曽祖妣李氏祖妣王氏妣髙氏皆附葬延安君孝友尚氣義警悟軼倫自未冠醫經儒籍往往成誦謹交游如故國子助教智納齊淳安縣尹潘君美輩皆一時才傑日與之往返故其識益明而其學益富也章丘為濟南王分邑君之兄瑨仕王邸以醫幸至元丙子瑨携君入見王悅之俾侍側二其兄醫君精一恭慎藥及疾已以是眷遇日隆王之戚屬傅相而下尤所加重既久悵然自咎曰我兄弟二人誠荷王德如母養何兄固不可辭責在我矣遂謝歸而母氏明慧嚴內治先意承㫖一無或違闢居第理園墅收羣書課諸子講肄慈愛熙熙然家道益盛俄遘疾卒實大德癸卯閏五月十有九日越三日殯於新塋之原夀年五十九先配馬氏次陳氏皆前卒後配吳氏子五人克柔克敬克直克剛克簡克柔克剛前卒餘並以儒世其業女二適同鄉盛族孫氏翟氏男孫十三女孫四君殁之十有二年克敬持里儒傅澄所為狀泣謂余曰今將舉先人及二母之殯合附塋域墓道當有銘敢再拜請惟衛氏以醫傳家逮君及其子蓋八世矣君之視疾切脉必詳投劑必審不求立捷駭俗苐務輔其氣俟其自復視不可為雖酬以厚利無妄發也平居接賔親懇毅疏達杯酒拳拳忘倦薦寵下輩開發學者無不殫其誠嗚呼異時潘智兩君皆余之信友而君於其間尤所致愛也蓋嘗謂君才氣之禀諸天者其所恢展輝赫不止於醫而竟不遂惜哉銘曰惟醫之能與相並傳茍曰活人其理一焉觀彼良相功利孔碩簮貂繩繩為羡為惜猗君之世世於業醫奕葉相承蓋惟善基善之孔昭繄後之俟逮兹八傳百世可至儲休侈美鍾美於君君不其顯天道奚云源之不遏顯不可必朂爾來者視此銘刻厭次郭氏碣銘郭氏之先世為淄川人後徙於棣州之厭次諱德祿者第金進士甲科更顯宦德祿生繼祖今朝列大夫濟南萊蕪等處鐡冶提舉田君用之之外祖也性冲淡邃于問學屬金季喪亂嘆曰我祖宗以來世以孝義安分為傳家之法矧罹茲艱難吾又何求耶乃韜戢聲耀以道自隱且老無子惟一女謂其妻賈氏曰吾世顧如此已矣吾誰託乃去而為浮屠居其邑之三學寺春秋七十有三卒葬寺塋實中統元年十二月十八日賈氏自始嫁至於終身甘苦緩急無失婦道以至元十四年三月一日終年九十九葬於厭次東四里守信鄉之原初繼祖與賈氏以其女賢淑欲為得佳壻故用之之父贅焉有甥五男子曰可實可德可宜可道可久皆有祿仕六女可宜朝列君也曩在省臺與余有一日之雅今來請曰吾母召可宜泣涕言曰每當歲時薦享獨我祖禰無有郭姓一男子執杯水奠者吾痛之欲無生今汝曹被青紫食祿蕃衍若是固汝田宗之慶實惟我郭氏出也而無寧思所報耶苐可刻一石置我母墓前使世知有郭氏者且使汝曹子孫得以不忘吾志願畢矣可宜恐懼奔走今礱石已具念所以大慰母心者吾子銘之實宜以是敢請余惟古人有言天道與善人仁者必有後不易之理也然四海之內百年之間察其家世陵替𦙍嗣泯絶者殆不可勝紀矣必以善惡論之有如蔡中郎揚雄鄧伯道之徒夫果不善歟由是言之蓋其有幸有不幸與夫理之不可盡者數存乎其間耳嗚呼郭氏之世其亦不幸者與余既悲郭氏之不幸又感用之之母之孝而用之克成其志也於是乎銘銘曰善人之世顧乃息耶天道悠悠於誰質耶孝女孔悲惟疾其首婉兮甥兮何以慰母我銘於石偕美無窮孰謂女子而不亢宗故山東轉運詳議魏公墓志銘公諱信字誠之姓魏氏世為章丘人父諱祥仕為山東行省員外郎六子公其長也少端慤有志略年未冠卓然以家事自任員外郎君一不顧問既長通羣書尤精吏事嵗癸丑濟南張侯聞其賢辟為濼鹽司判官尋改諸軍鄂囉府知事中統改元轉濟南路總管府知事三年李璮叛青州兵逼濟南張侯度不可禦率左右出迎王師有持兩端者止公勿行公叱之曰汝等將棄順從賊乎吾不忍為也獨舍其親族五百指不顧而去賊果據濟南三月天兵圍之時軍中迫須大帥盡倚張侯公為悉力營辦無一闕乏賊平遷濵濼兩鹽司提舉至元元年以才望為山東東路亷訪府詳議官明年八月十三日以疾終於家享年五十子男六人皆有文行女五人始娶夫人張氏貞靜婉淑婦道克周先公卒實壬子嵗八月三日也春秋三十有六有男五人長曰璧次曰圭曰璋曰雲翼曰有翼女二人再娶夫人王氏有男一人曰伯翼女三人伯翼生八日而公逝夫人鞠養幼孤勵節自守逮今垂三十年雖困苦益堅公平生持身有方治家以嚴接昆弟親友敦而能愛居官蒞事公而能忠于子道尤盡青冦之據濟南也近郊丘塜多所殘毁公泣謂張侯曰我父母殯實邇東郊得一速往視之公之賜也侯遣兵護公以往至則二殯果已發矣公號慟殞絶拾遺骸土中裹負徒跣夜走百餘里歸厝於祖塋而還初母夫人王氏瘍發乳間潰苦劇甚公每吮而䑛之晝夜侍側衣不解帶者數月母竟以是終公哀毁幾至滅性父先卒皆終喪三年其篤孝如此一日其仲子圭告其外弟劉敏中曰吾父母尚異殯今倍直購地以廣祖塋為石室塋之左方卜以今年十二月癸酉合葬吾聞葬必有銘子于吾父甥也子盍銘而舅乃泣而銘之銘曰昭乎其公龎乎其容移孝而忠無間始終何年之不遐而祿之不豐唯昌其子孫天理乃通有石斯穹有封斯崇兹唯公之宫祀以不窮齊河縣尹李公墓銘公諱忠姓李氏字直卿先世泰安長清人譜逸無所考公生警悟儀觀雄偉既長涉經史善騎射以義氣自尚屬金季板蕩挺身操戈佐東平侯嚴武惠公壁青崖以活遺民天兵下河朔從武惠率所部謁大帥軍門帥承制加拜武惠行尚書省事僚屬從所辟署公署百夫長攝千夫長事武惠四出攻取公必從所向有功壬辰以勞授武節將軍齊河縣尹時兵後民極困弊公撫摩教育咸盡規制己而境內富安大治縣有小十四鄉亂中陷於歷城公辨諸濟南遽歸之丁酉妖人李佛見扇黨來攻禦諸月河之西公一矢斃其號都統范姓者賊潰奔長清追及大敗之妖人以縛丙午改尹茌平尋又改武城治皆有聲他縣民有訟于行省者必檄公决之才用可知已武惠薨其子襲爵録舊人以公宜齊河民俾再尹之至元七年庚午六月十有一日卒於齊河私第之正寢享年八十有一比斂蠅不敢近咸謂公威嚴遏惡之應秋八月二十日葬於南一保和平鄉之新塋夫人張氏次王氏皆先卒至是祔焉一子曰智王出也孫男二人女一人曽孫男二人女二人公之疾革也召家人謂之曰始吾未有子養子信實襲百夫長今異産當與智均母俾我有私子之嫌又曰僮張輸力久其即民之言竟而逝子智才勇過人尤習國朝語中統二年代信為百夫長戍开明年平青冦第功居右尋攝千夫長從攻宋樊城渡江戰吕城焦山取常州所至先登凡擒將三人獲戰艦一宋平最功授忠顯校尉管軍總把戍平江至元十三年五月一日卒於軍春秋三十有九其年十二月十有二日歸葬於先公兆次娶周氏生男二曰榮祖顯祖女一以適劉洎榮祖有英概襲父官既而以養母遜其位於弟之子實娶朱氏一子曰秀二女顯祖娶胡氏一子實也周氏既寡雖免喪如初喪以為常鞠二子慈而嚴事其姑至九十承順無一日怠喪祭亦如之有司聞上命下以節婦旌其門一日戒二子曰吾益老獨念汝祖勳德日逺日忘亟宜勒石墓道汝父固當得附書使子孫繼繼有所依循我暝目無憾矣榮祖恐懼持濟南智文朂所為狀來謁文余觀齊河公以孤特乘時起家其事業既表表可紀其子復能以忠烈繼之矧婦以貞節顯而孫以孝讓稱嗚呼公之所以貽後者逺矣乃備書而為之銘銘曰行制於義義蓄其氣全性之天桓桓其武奮彼戎旅從時之權禍亂既息務惟寧謐百里是専鄙化頑革民樂公德載歌載弦爰及於嗣克繼其志聲烈蔚然惟節惟讓邑里之望源浚乃川刻辭表墓以永芳譽識者監旃中菴集卷二十
