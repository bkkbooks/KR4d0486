body:
  text: 中庵集卷八元劉敏中撰書啓察院與臺呈書承奉中書省劄付將內外官吏俸給住支切惟聖朝自改元以來更制法度審究治端首行選官頒俸之法著為成規內外有差小大有冝是以官不易方民不知擾迄今二十餘年卒成一家太平之功者良以此也今者一旦將官吏俸給遽爾住支若即别有定奪則無不善若遂因而勿與則未見其可蓋與之費易給而官易治勿與則費必重而民必困何者俸祿之法所以使人以責其亷也今天下之俸為數雖多然要必有定限官吏自俸之外一有所取即名為贓苟能亷者固自畏避不敢犯矣至若貪汚不法之人時或有之則有得以覆按而繩之以法盡取其所贓之物歸之於公然後黜罰之戮辱之如此貪汚者足以戒矣所謂費易給而官易治也今誠一切勿與則非徒無以使人將見向之亷者亦必困餓不能以自守而貪汚不法之人幸乘是隙必皆曰無俸矣其何以責我視其民譬若逸虎之得羣羊必且快意而噬之此其所取者寧復有限耶較之俸祿當不啻十百千萬也然則有司冝如何而繩之哉以此言之是去防而縱之貪也是惜目前有限之費而遺百姓無窮之患也是見其所得而不見其所失之多也而可乎哉所謂費必重而民必困也况今幅貟堂堂雄跨千古生財之道不一其源亦何嗇此區區之俸而重斯民之困者哉雖然誠亦有可議者蓋其分職太繁設員太多而仰食者太冗也傳曰省吏不如省官省官不如省事為今之計莫若停冗職削冗員也如此則事一而官不雜官不雜則冗食者去而用度自足矣俸祿不可不復也代上執政呈蓋聞設官務先使能序爵在乎首功功有大小能有優劣而官爵崇卑貴賤之差定矣官爵一定而上下無有覬覦廢隳之心則五帝三王之治又何難致哉伏見國家修飾治具網羅人材將以興太平之功業故天下之士于于峩峩雲集京師莫不願奏一技售一能以效其萬分之一某才力行能無過於人然生遇聖時輒不敢自棄幼而儒長而吏﨑嶇黽勉垂三十年竊嘗自謂亦可以用於世矣乃猥厠沂郯萬戶府幕今因承乏獲觀光之願輒不揆踈賤據所見聞敢為一言惟大人裁之方今京府州縣上下自有次第其官吏調選之制視此為定不可易也且萬戶府總管府其品敵耳然而總府掌民而萬戶掌兵兵民不同其於為國之功則無異也今掌民之屬無間小大久新率皆廷引薦舉調選入格以為常例而掌兵之屬處則修號令正簿帳董器械戒斥候虞度釁隙以究其一切之利害至其有警則舍文墨就矢石擐甲執戈以與士卒共及事稍已則士卒即得休息而此屬方且釋戈甲操文墨第功議罰數馘訊俘雖神乏力竭不敢言苦此其勞不減於掌民者明矣顧乃困頓邊境彌年纍月雖勤勞若此而其情不得上達思如掌民間調一官進一爵不可得矣且比來調補兵幕往往皆用掌民之員而此屬盻盻又如故遂使其徒自甘於廢隳無所望之地而朝廷亦遂委之踈逺不收録之夫掌民者如彼而掌兵者乃如此恐非所以公調選之制也且此屬豈皆固為軍伍之人哉蓋惟遷調官吏之前為本路差遣不敢辭謝以致夤緣滋久而朝廷乃一以視之若此良可悲也伏望開闢公道察其勤勞使內外之任同其恩榮兵民之功無所偏廢則某等幸甚與儲主事天章某頓首主事天章執事向來車從纍留歷下辱承盼飲酒晤言盡殷勤之歡蓋古人有一見如舊相識之義顧不肖不足以當之耳感愧感愧嵓甫滕君乃執事收拾舊物今以嵗貢赴召亦何待老夫云云也謹因奉狀申候起居兼謝相好之意秋晚寢餗加慎不宣與吏部劉主事漢卿某頓首主事漢卿伏審擢掌銓衡士大夫所在相慶曰劉君當路天下庶幾無淹滯之才矣而某以老懶廢故不克作尺書申賀左右負罪負罪滕君嵓甫濟南秀異執事所素知今以嵗貢赴召將行請書竊謂奬士之心當有所處故不敢喋喋也秋序尚慎眠食不宣與劉太醫舜臣某頓首太醫舜臣足下别益久思益深故舊之情自應爾也惟進見之暇沖融粹和動止迪吉想皆安樂某山野懶慢之癖君所素知加之衰白颯然無可為者然時有所感思欲如向時欵曲一言不可得也每臨風北望搔首而已嵓甫滕君鄉中老成秀俊今實充嵗貢以行足下推之挽之可也尊丈教授先生不敢作狀煩唾名致懇不宣序一送王紹明郎中序涸澤之汙有舟焉水不過半腹膠於泥莫能行也及乎秋水時至瀰谷蔽川而下汪洋泛濫倐焉莫測其舟則飄然即舉泛然而浮浩然而行矣今夫士之生不得其地進不得其道者亦必待大人君子有以感發振起之也夫水大可以載舟然水固非與於舟而舟自利於水也大人君子行為言動亦無與於士而士之興起者自有以得大人君子也燕山京師所在固大人君子之淵藪也而其尤赫赫者惟吾郎中王公焉蓋公之為人其持富以禮其處心以仁其接人遇物以誠故凡一惠一言之出則使屈者伸滯者通弱者強懦者立學者得以成其學仕者得以達其仕是以士無賢不肖翕然皆歸之而公初無與於其間也嗚呼由公而得以顯於世者天下不知其幾何人聞公之風願見而不可得者天下又不知其幾何人如敏中者亦願見而不可得者之一也幸而公自去嵗冬來濟南既就館賔客之造者車馬僮僕日夕滿門是以睥睨而不得進也既少間而欲進則又自以為固陋荒僻之人乃敢率然自薦於大人君子之門耶又復逡巡而不敢進也乃自咎曰汝平日所病者徒以願見而不可得耳今得見而不見是終莫得而見也汝苐往見之見則必有言焉有言則汝之固陋荒僻之疾冝有以去之也於是與嘗為友者四人共往拜之間於客席而坐公嘆而語客曰方今朝廷可謂得人矣我嘗觀其麟遊鳯集頭角之昻然如璋如圭德器之溫然躋躋蹌蹌衣冠之偉然朝廷可謂得人矣然詢其人所自出則曰東魯也曰鎮陽也曰大名也曰某所某處也若濟南則百無一二焉至於區區一隨國猶曰有季梁在今濟南之屬邑若隨國者不啻六七而乃反無人耶豈教育之有所未至耶抑士氣之不能自振耶公之言若是四人退而喜曰凡得於公者有三焉始見公容止之和雅為可觀也次聞朝廷之人材之衆多為可慕也終知濟南之無人為可懼也夫可觀則必有以取法可慕則必有以自修可懼則必不敢以自惰矣信乎大人君子之足以感發振起人也異時使濟南之人得必出涸澤之汙者繄公之力歟故于其歸也敬敘其始末為謝至元七年正月望日歷下晚進劉敏中再拜送霍巡檢彥深之無棣序梁鄒霍彥深性明敏有智略自其幼時嶷然巨人年十七襲父為梁鄒簿未幾去官就學養母孝謹家之內外肅整咸理人皆稱之以為興霍氏者必此人也今年春朝廷案視郡縣疏逺之境慮有盜生而為民害乃例置巡檢一人給之印綬祿廪使警督之仍命吏部選名已在籍而未嘗有過者任其職濟南所置凡數處而彥深得無棣焉將行諸君咸賦詩以贈之而命僕為序故因以言而告之曰理有至微而重至小而大者子嘗知之乎苟知其理則大者不以有餘而矜其大小者不以為不足而恥其小微者不以自輕而忽其微也天之形穹窿蒼莽仰之敻然而無極而其機緘之所以斡旋者特以生育長養為事若夫日月辰宿風雨雷霆霜露霰雪焕乎其昭回翕乎其鼓舞沾濡煦燠之恩震厲肅殺之威回互變化莫測其端倪此天之所以為髙大而不可及也然而生育長養之功不能獨成要必責成於處卑之地雖方寸之壤與有力焉苟以寸壤之微為不足恤一一而遺之則全功有所弗成而造化或幾乎息矣夫寸壤之於天其微固不容較然其相成相與之理即而求之不亦既重矣乎今夫巡檢之任固亦微且小矣而其至重至大者實係焉書曰亶聰明作元后元后作民父母故天子當寧百官奉命奔走不敢暇者蓋亦為民而已矣而其係民之最切者莫如宰相縣令之微固不敢望於宰相今所係而與之一者何哉蓋宰相上之極天子之至密者也縣令下之極民之至密者也故宰相一言一動之際天下或受其利病則所係既已重且大矣而縣令之所係殆有甚於此者凡下之寃苦愁恨纎悉委曲之情有望於上者宰相容有所不知而縣令皆知之然蔽而弗聞則在上者又安能加意而恤之哉凡上之教化恩澤所以逮於下者宰相既行之而縣令或不能承宣則在下者又安知恩澤之及我哉下之情既達於上而上知所恤矣上之澤既宣於下而下受其賜矣然而復害民之尤甚者曰盜則又縣令之所不暇及而巡檢實主之是其官雖微而係愈重任雖小而責愈大矣故孔子稱天子不敢遺小國之臣而栁下惠不辭小官要皆當於理而成其為民之功耳彥深而能守而官慎而任無忽於微無恥於小副朝廷所以為民之意則自下以升髙由近以至逺其孰禦之哉其孰禦之哉至元七年二月二十六日序送蔡知事序玉藴於山治玉者索之珠産於淵求珠者出之俊逸隱遁之士不求於有司而有司求之矣况乎名登十等之列行已聞於人才已效於用名實暴白可以紀録者有司其寧舍之耶天子坐明堂理萬民而其所以為務者不過得人於有司而責其得人也天子務得人於有司有司務得人於天下是則有司之責亦重矣故凡任是責者必良有司也其必知人材之所當必得又知人材之不可易得故常平允其心思精明其鑒識奬拔銓選無敢有忽汲汲焉惟恐失而負其得人之責也今以已聞之行已效之才以即於政唯恐失之有司是猶治玉求珠者之得玉於坦途而獲珠於平川也其不為喜且慶也寡矣何慮不增重其價乎濟南幕府知事蔡君資明而性敏力善好學古人得失之迹時務利病之原國朝新舊之典皆耿耿著于胸中刀筆案牘特其餘事爾事上接下敬而有禮望之溫淳如古良士至其臨事剖煩理劇敏捷如流然終不失大體由是公議翕然服其能小吏細民亦莫不敬愛曰我蔡君有恩德于我矣是非行已聞而才已效者乎今其秩滿矣且録其狀以請命於有司斯亦為有司坦途之玉而平川之珠也其必獻之天子以聽其爵賞將見韓思彥之夜加二階主父偃之嵗中四遷不獨専美矣某且俟而為蔡君後日之賀七年六月二十七日序送二舅知事還郯幕序郯古之子國也於列國為諸侯則其地亦已勝矣春秋郯子來朝論官名善孔子之道而學之則其主亦嘗有人矣乃者天子將問罪東南江淮之間由東而西上下數百千里分符列鎮以訓養士卒且以為疆境之固其最東而直其衝者惟郯焉故雄疆整飭常不敢後於他鎮城髙而堅隍浚而深旌旗擾雲電鎧胄輝日月鈜金震鼓虎哮龍怒其強弓徑弩則盡時力擇木之良引而射之往往出六百步之外洞胸達心不論也其劒戟之利則皆耶溪赤山之精陸剸象犀水截鯨鯢刜車斬甲不論也貔虎之士瞋目叱吒賈勇超乘仡仡焉憤憤焉皆以久生為恥其講事則偏伍行卒坐作進退無不如法超髙山越長澤雲回風轉不可測也不知郯之為子國也亦嘗有若是耶吾見其地之勝有加於前矣其主帥則天子之所擇任有文武長才頗牧吳白未可為讓而又虛已納士譽望赫然又不知郯子之善論官名而亦使能有若是耶吾見其主之賢有加於前矣地之勝如此主之賢又如此斯固功名竒崛之士注心翹首趨而競赴也而吾舅氏魏公首以幕賔遊其間其亦足以為快矣其亦足以有為矣雖然未足為吾舅氏得也舅氏才傑而學贍事練而慮周竊謂其冝恢張特達登金門上玉堂以為福於天下也久矣顧且從事於一鎮則固亦不足為已然幸因天子之將問罪東南也少加力焉夫事立則名必彰功集則身必榮不以區區纍其志則事必立不以洶洶易其節則功必集嘻若此者舅氏固能矣然則所謂恢張特達登金門上玉堂以為福於天下者雖佇立而待可也郯之諸君毋但以幕賔期我舅氏哉此某之平昔素所欲明者今因其來而歸也故以為言至元七年臘月日送曹君幹臣之陽丘序吾鄉陽丘天下之名邑也厥土曠衍原澤相錯有麻麥桑果稻魚之饒薪蔬材木冶石之美而長白女郎荆湖栁雉諸山峭拔峻秀掩互相屬繚其城如環然有水曰繡江出于其境之南山下清泠迅駛宛轉紆絡經其境且百里而東北入于海民往往泝涯為峽峽其流以運舂磑林落映帶山與水相吞吐令人蕭然有武陵桃源之想故其俗朴而不鄙簡而不野剛而友直而義油油熙熙有古之遺風傳所謂民之性剛柔緩急繫乎水土之風氣信矣曹君幹臣乃其邑人也幼就學濟南敬齋髙先生君植志堅固而才思贍捷先生愛之曰是子必異乃盡以其學而授之既卒學益復自勵以恣討經籍務為無所不貫其為文章雄深典雅無浮薄矯飾之態蓋其性然也頃者朝廷例置州縣學敬齋曰曹某吾門之髙弟也不可以不達乃書其才行薦之府而聞于朝以為陽丘邑學教官嗚呼以君之才之學正當元朝興建有為之秋翕忽變化固將有逺大者存也區區一邑學人烏足相溷哉雖然君之母且老而其子未壯故且歸其鄉以養其母以將其子以盡其孝慈之道焉耳此蓋君之志也而吾之所以期君之往者又不在於是聞之吾鄉自令長而下在官者皆賢自兩張先生而下為士者皆賢君之往吾知其在官者與夫為士者必欣然相謂曰曹君吾邑之人也幼而學於府長而範吾邑之人非惟曹君之榮乃惟吾邑之榮也則必倡率其民人敦朂其子弟以從學於君矣而為子弟者亦必相謂曰曹君之幼也其與我奚異哉今而若是者則亦為學而已耳必皆感激憤悱樂其事而馴其命矣倡率行於上感激興於下上下交孚而君於是焉以宏其道於其間則向之朴簡剛直之俗又一變而為禮樂君子矣吾他日至吾鄉見其揖讓法度之儀聽其文雅義理之言相與飲會談詠而答其山水風土之美寧不快哉寧不快哉吾所以期君之往者蓋如此君既行諸先生咸有詩以贈故書于末以遺吾鄉之親識故舊庶幾其不負吾之所期者云耳至元九年春二月朔序壬申嵗也送趙去非序凡能廣交遊使聲聞顯于四方雖不覿其實吾必信其為賢也廣交遊有道必其中有足取於人也苟其中無足取於人則雖日為酒食美言詞以求與人交而人亦安所取而與之遊乎哉求交且不可得而况能廣乎哉故曰雖不覿其實吾必信其為賢也東原趙君去非以宦遊寓濟南者三年矣其至之始余未之識也然於話談間往往聞有趙其姓去非其字者也甚熟徐而察之則四方之士過濟南者無非與去非善也車馬宴集以相從者無非與去非遊也乃嘆曰何其交遊之廣而聲聞之顯邪余固私識而賢之矣既與之面聽其言而覿其實和而恭信而通文雅而從容至其慷慨灑落赴人之急則又有俠士之風嗚呼斯固人之所樂取者宜其交遊之廣而聲聞之顯也謂之賢其信然哉今將釋此而遊京師京師之名公貴人常與去非遊而知去非之賢者不可勝數也夫知其賢而不與之立者君子不然也去非之往其果有與立者乎余以是嘉其往也歌以餞之歌曰倣徨送子兮河之梁子行亦何往兮思與鴻鵠飛翔鴻飛冥冥兮不可望太行西北兮是帝鄉明朝馬首忽千里兮目送孤雲欲斷腸歌既闋而别時至元庚午歲也送髙案牘序古之君子以仕宦論榮辱而貴賤不與焉九錫之寵萬鍾之養貴且榮矣然或處之而非其宜任之而乏其勞則君子以為辱抱關擊柝之役乘田委吏之事賤且辱矣然或用焉而稱其能考焉而舉其實則君子以為榮由此言之則貴不必榮而賤不必辱惟所行之何如耳故惟君子為能盡榮辱之正而亦當有君子之仕者乎今之官有曰案牘云者祿益薄而責益劇者也魏人髙敬之以既衰之年來濟南實為此官濟南大府也而事益繁矣夫年衰而事益繁祿薄而責益劇冝其有倦勞之傷有飢寒之憂以汨其衷以奪其公以怠其事而曠其責矣髙君則不然利害必明緩急必詳獄訟有辭必審錢榖有計必當期會約束有程必允操朱墨臨几案較得失情偽於急遽冗煩之間俋俋不自輟而其發砉如也然則髙君何為而能乎曰君有道君之道以誠蓋誠則一一則靜靜則神完而志専凡世之所以動心忍性者無所入其中惟吾職而已矣輪扁之斫輪庖丁之解牛用此道也夫烏知其年衰而祿薄事繁而責劇也哉乘一馬從一僮踈衣而糲食如是者三年不移此豈非所謂用焉而稱其能考焉而舉其實古之君子以為榮者乎嗚呼髙君之仕君子之仕也君今既代矣其行事必達於天官賢才之府而人物之龜鑑也必有如古之君子者識君為君子矣夫既以為君子矣其寧復以向之所謂祿薄而責劇者重勞君子耶必不然矣髙君其行矣哉君既行序以為别至元戊子冬至前三日歷下劉某題送張無咎序至元癸未余為兵曹主事一日曹掾劉之文介夏津張君無咎詣余於廨舍余謂之文觀張君不凡殆可以任事之文以為然明年以儒學教授滄州又四年遷濟南會余自御史都司謝病歸與無咎遊益狎遂得其為人益詳無咎學析而才通其為文辭肆而法資雅重寡言居常從容而事以畢舉其志意超然而無有挾能矜已之色此其器為可見已吾聞選例教授終再任轉職事官無咎既代矣其且去而為職事官乎雖然職有所分而才有所宜詳而處之有司之事也如無咎者宜將安所處耶吾知其楩楠杞梓之用固不及於欂櫨椳臬矣然則曩者任事之言其卒驗也歟解録事安卿代歸餞行序濟南介齊魯間左窮山海之境而右襲土壤之富時則有宣慰有提刑有轉運有勸農以參蒞其上而朝廷四方之使日旁午其中出入開闔自為一都會雖屬邑數十而吏民繁庶固足以集事至於承早夜之令奉咄嗟之責隨至隨應而勿敢失者則唯一録司焉故宦遊之士視濟南司録為劇任伈伈莫敢就而有司亦以是難其人以故或久缺或久任不得以常調節也渤海解君安卿以至元二十二年由近侍屬來為是職逮今凡六閲嵗上下無造次之失無絲毫之嫌大率君之為治以明察果毅抑強梗靖獄市以寬小民之力以嚴厲信必謹期會赴事功以遵大府之政以周密勤劬伺幾微審動靜以盡其事上之禮嘻解君可謂理劇之能者歟今來言曰某不佞既占仕籍亦思有以自奮然求其所以終免於戾者而不可得今且去夫子能無言乎僕告之曰子知鏡與劒乎夫鏡錬之精則明可以走魑魅然未嘗用其明而人謂之明夫劒淬之至則利可以斷象犀然未嘗用其利而人謂之利今吾子之鏡固已鍊而劒固已淬矣願吾子晦其明使明益增而無用明之名保其利使利益鋭而無用利之纍彼司照鑑事剸割者於子其寧舍之耶吾見子之明日以顯子之利日以售無傷缺之患無蠧蝕之虞廓乎有餘矣然則子之勳業如級而升髙其誰禦之哉二十七年庚寅重陽後三日劉某序陽丘尉髙君餞行序蠧生則木不遂螟生則禾不實盜之於民禾之螟木之蠧也故一縣之制令丞簿主賦政以遂民之生尉主禦盜以除民之螟與蠧者也螟蠧之不除如民生何尉之責亦重矣然不幸而非其人則怙威以肆暴飾巧以縱惡曲搆旁延抶痛攖痂資以自利者比比也翼健卒如鷹鸇然所至之鄉攖噬狼籍至雞犬不得寧民之患之蓋有甚於螟蠧者矣除螟蠧而甚焉尉之責奚望哉頃余來陽丘聞髙尉文本賢因與之遊而得其詳尉儒者家屢空不憂其奉職靜而斷有事則躍馬從數騎褁糧以行其捕繫計治一質諸理吏卒噤立不敢置一語指嗾進退惟尉之聽故民不知擾而事以集以是闔境帖然三年無螟蠧之患嘻髙尉可謂能塞其責者矣今將赴調有司民惜其去則皆咨嗟涕洟願留而不可得乃胥而祝曰夫善者以賞不善者以罰國制之常而有司之責也吾尉之往其果可得賞乎若爾則善者益勉而不善者可以化而改矣吾尉之賞吾人之幸也余於是益知髙尉之賢而士大夫之嘗與遊者皆樂為歌詩以美其行使余為之序贈安宣慰詩序至元丙戌某與廣平安君思承同為御史吾二人者仕同道同齒同而志意又同以是交甚欵又因思承得拜其兄今宣慰公于其家公即歡然相接傾倒如舊公時在京領漕運明年為刑曹尚書會夏暑以恩例決諸司囚某以御史公以秋官實同其事旦夕相從者彌月凡公之毅敏公恕盡於斯得之而情好益密矣又再嵗思承為四川副按察之成都某為御史都司嵗餘謝病歸濟南已而聞公由刑曹宣慰雲朔又聞思承還京為冬官侍郎今年癸已夏六月公復以宣慰來山東當治益都過濟南顧某於陋巷且致思承之問凡與思承别蓋五年而公則四年矣陳敘契濶甚相樂也明旦公已行矣乃知公近有充閭之慶則又喜焉而獨恨不得為一賀也十月公以行部復過濟南見公於皇華驛退以鄙懷作樂府一篇獻於公以發一笑其亦古人所謂情動於中而形於言言之不足而咏歌之義也賈灤州餞行詩序始豫掾秋官燕人賈君允年甫弱冠實同豫事異其精詳雅重愛焉訪諸其人謂君生四年而孤鞠於母氏七八嵗知讀書能事其母益嚴豫嘆曰是篤於自立者其必達乎後豫遷省臺或仕或已而君亦仕于上都于吏部于大農于太原于中書蓋嵗月不相從久矣然其聲之至乎豫耳者恆殷殷焉其在太原也實居幕賔有冒以民田獻言宣徽稅外可嵗辦米二萬石者宣徽以聞傳旨政府下太原實其田君曰民既勞弊可動搖乎朝廷惟弗知耳亟覆聞必免官長縮不敢聞君毅然曰即有責允身當之不以及公等也卒不敢君則徑疏聞之事果不行尋又以省檄北土民口十有二萬當分置其境官食之且置倉府中君曰若爾民轉輸出入祗益勞耳不若隨其所置之為便又皆弗敢則又徑聞之又從之於是太原之人願頂戴君矣入掾中書奉使諭思播思播從命贐以金幣帛五千餘緍辭之所偕曰聞此應受第受之歸自白之可也君曰吾為名耶竟不受而還豫每聞之輒為擊節慨嘆曰此人之所難者渠乃能之耶庸詎非向豫所謂達乎大德已亥冬豫自濟南入翰苑遇君于京師喜與語移日曩聞有加焉已而告豫曰允頃由提舉寶源出知灤州今當奉老母東矣辱先生舊願得一言而教之可乎豫曰嘻子豈豫待者然子又去我矣安得無言乎哉姑即子之所有者而告吾子人之得名當世而不朽者無他焉忠與孝而已矣吾子以襁抱之孤卒使慈闈無惟疾之憂而有榮養之樂不既孝矣乎如太原之剛明不回以一言而脫百姓之患思播之潔白自持使逺人聳然知朝廷之尊不既忠矣乎雖然孝無終始而忠有小大蓋所履益大則事益大事益大故忠益大忠益大則名亦隨之矣灤右挹甸畿左控海隅大州也所履大矣吾聞其土川陸相錯物饒而俗龎蓋恆有水旱冦攘之虞而重以徴發供億之煩事已大矣而皆専於子此豈一幕一使之所可擬哉子能使子之潔白者礪而恆之子之剛明者擴而宏之以施諸其事則為忠當益大而名亦益大矣名益大則他日之所履又將有大者焉然則吾子之忠與名猶自下而升髙未見已也子其勉之哉吾將觀焉以竟吾之所謂達者云君再拜曰謹如教於是搢紳先生聞之皆樂為歌詩以寵其行乃書而為之序中庵集卷八
