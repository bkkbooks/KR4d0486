body:
  text: 中庵集卷十八元劉敏中撰碑五敕賜保定郭氏先塋碑銘聖天子撫文明至隆之治旌德顯能康錫封爵集賢大學士郭貫光恩三代賜碑其塋詔臣某撰文臣劉賡書臣貫就篆額臣謹按國子助教于欽事狀郭氏世為保定清苑人髙祖而上譜逸莫詳曾大父諱翼有氣尚義以力穡為巨族贈通奉大夫司農少卿護軍追封趙郡公金季天兵南下在所震裂冦盜橫潰公密為窟室庇親黨間出以金帛易食竟遇害配王氏追封趙郡夫人大父諱實纍贈集賢學士資善大夫上護軍追封趙郡公為人剛介嘗墮兵難逃歸依蔡國武康公於滿城從徙保定官至管人匠總管以卒戊辰七月十二日葬于清苑小激里之北原祔樊氏梁氏並追封趙郡夫人二子父其長也諱希泰次希奕質直不仕一女適少府監局使劉振父字仲偉纍贈翰林學士承旨榮祿大夫柱國追封趙國公夙頴悟嶷嶷不凡受學於靜直處士郝先生之門經史百家靡不洞貫與處士子國信使贈大司徒昭文館大學士潞國文忠公陵川先生伯常諸友輩結文會日相從講習以為樂視俗塵邈如也中統初元陵川貴力薦之除大都行用庫使尋以病歸至元十三年丙子復起為淮東清河軍儲倉使改杭州平凖行用庫提領庚辰二月三日以疾終於杭春秋五十有八貫迎喪歸是嵗六月吉日葬於先塋兆次公生十有六年而孤輒能以起家自任養母盡孝遇弟盡愛嘗營樓居或謂君有弟樓可二楹異日易分也公謝曰兄弟天倫兄有即弟有也弟有亦然奚謂分苟如子言已則私矣天倫可容私乎或者慚焉愛其子貫教之學購書擇師恆若不及訓之曰士之生世當為有用之儒無讀無益之書當使人求已無已求人其所以期焉者逺矣至其洽賓友赴急難樂施豫殆嗜欲然保直四逹之衝人物所集屬河南平衣冠北渡多寓焉公無不欵曲延接或資以僕馬若監察御史嶽夔舜咨狀元王鶚百一遺山先生元好問裕之諸名公尤其密者也故陵川為作樓記有曰許與結納皆天下豪右魏青崖為其子作字説有曰仲偉尚氣好賢交遊半天下蓋實録云中統前青冦璮馳書幣招陵川陵川謀於公公曰世所重名與利耳若利先生學術道德傾一世奚利為若名名在朝廷山東奚取也陵川遂辭之嵗未幾璮叛其逺識如此公雅無宦情中年好善彌篤以明德命其齋當赴調而南也則曰吾聞江淮文物縟盛多異人竒書吾將觀焉在杭有詩云明年咫尺歸期近便買扁舟飽載書後沒囊篋枵然所遺惟圖書數萬卷觀此其平生可知已夫人何氏淑懿勤儉婦道母儀中表矜式以元貞元年八月二十五日卒享年七十有二如祔禮葬焉纍贈趙國夫人子男二長即貫也次中女二長適劉某次幼亡孫男四文鼒文鬲文鬵文甗曾孫男一貫字安道博學能文善篆𨽻纍官由參知政事進左丞登集賢階榮祿大夫上眷益重才猷德範歆仰一時嗚呼趙國之所以特立亢宗集賢之所以迪訓顯親夫豈偶然邪古有言仁者必有後信矣銘曰天道孔昭慶必善積王政至公顯惟在德趙國之世有源有基日峻日崇聲至響隨是生趙國前美克濟髙識邁倫至行厲世希古簡俗敻然清風氣義暢洽鳯麟朋從教子義方逺大是朂賢良器異有售匪鬻謀謨廟堂搢紳儀刑玉音曰咨無忝爾所生九原寵封五爵斯冠錫銘示渥幽顯並煥人事天理孰曰不然諗爾後之人尚其監旃濟南李氏先塋碑銘李氏其先遼海人歷遼金世為宦族譜亡不可詳父諱英登金進士第仕為穆昆千户守濰州令肅兵厲盜不敢闖其境官民賴之天兵平汴北徙尚書田侯行轉運山東治濟南收羅人材得公甚竒之即署公轉運經歷官遂占籍為歷城人焉公氣量宏邁言動不凡人望而畏之謂其有公輔器一幕之任辦於咄嗟衆胥傍觀縮手褫氣時楮幣未行凡貿易皆白金公傾囊槖延賓友相樂無虛日已而始有子年既踰耳順矣其夫人言公日揮金恣燕樂誠得獨不念為幼子地乎公喟然曰人生各有分使子賢固當自有不賢雖巨萬積祗益禍耳我縱不逮人胡能契契作老叨事癡計種禍子孫耶俄遘疾卒春秋六十有五才與命違時論惜之用子璋貴贈奉政大夫同知安豐路總管事驍騎尉封鄒平縣子夫人曹氏慈謹恭儉克相厥家後公卒追封鄒平縣君一子即璋至大二年己酉璋始卜地郡城南郛所居之城隅八里七星山之陽築塋合祔葬焉璋甫三嵗而孤稍長以問學自立由轉運使纍授將仕郎新附軍萬户府知事滿除平江路總管府知事調主江都簿入為京官左司同提舉遷同知泗州改泰州鹽倉監支納進奉訓大夫廣平鐵冶同提舉升知六安州官奉政大夫於是有恩贈之命延祐四年也以中順大夫同知嘉興路總管府事致仕妻傅氏封鄒平縣君三子曰六十八曰六安曰中兒皆襁抱中順君與余同里閈余知君早以才幹勝人故其歷仕所至有惠政有能聲有成績名馳搢紳間余頃欵繡水璋泣涕言以孤弱之迹繆涉宦途至忝國恩榮及考妣三息聨慶見於暮年念非先德庇廕其何能此昊天之報茫乎罔極惟得勒石松楸使前美永聞寵光日新其殆庶幾然非先生之辭莫可敢再拜以請余惟人之家世有善不善之殊而殃慶亦髏至天理在焉譬諸木其本根固則其支幹必茂譬諸水其源泉浚則其流派必逺否則反是李氏上世雖不概見信其善家也觀騎尉公可知已騎尉公有大用之才弗展以沒詳其胡能事癡計種禍子孫之言所藴可知已而所藴之發觀中順君可知已嗚呼兹非天理歟騎尉公既為賢父中順君足為賢嗣矣繼世以往所謂枝幹之茂流派之逺吾見其愈加而未已也銘曰天道𡨕𡨕若不可知揆彼人事白黑罔欺李氏之世其始莫悉觀騎尉公信惟善積鬱鬱騎尉才傑之竒晚節末途局不得施放逺遣懷清白遺後堂構以大鴛鷺是簉五爵顯親洽爾百祥天人不殊理則孔彰伐石勒辭載是徽美綿綿餘慶繼盛曷已宋氏先塋之記陽丘之南其鄉為錦川鄉之東南皆山山之下皆良疇林落逺近相屬有泉二發於田間相去僅里許清泠瀰漫流皆北逝在西曰西平流在東曰東平流在東平流之北涯其墻宇巋然因髙而居者宋氏也宋氏名珍善余族弟宥因來言曰珍之先世以資雄為漕挽居清先祖父亡其諱金末佩金虎符官萬户領漕卒船伍十綱從遷河南兵亂不知所終時先父獨與先叔祖留燕會聖朝親王領兵下叔祖歸之王喜賜之銀符署千夫長擊花帽賊於燕之水谷以戰死王以銀符授先父嗣其職花帽平從收青州王分邑在淄以父忠勤有勞績乃委以分邑之政官於淄嘗經濟南愛其山川風土有卜居之志既老占籍梁鄒居未定而殁後十年珍與先兄友來此鄉見其所謂東平流者與其田買而居焉成先志也居之西北百舉武得平原為新塋乃舉祖考妣之衣冠遷叔祖考先考妣先兄之柩咸以禮葬焉實至元二十八年辛卯十二月二十七日也然未有紀述前美不得耀願得先生之辭刻諸石庶託不朽乃為論次之而系以銘公諱德福春秋七十四以中統元年庚申十二月十日病卒四娶子男四人女三人始娶耿氏有女一人適李氏再娶李氏有男三人曰友曰謀俱早卒曰珍女二人一適張氏一竇氏陳氏有男一人曰貴珍之仲兄也蓋氏無子珍兄友以方直服人至元甲申二月七日卒享年六十有六娶李氏子男二人曰成曰咸女二人男孫三女孫五貴娶馬氏子男四人曰茂曰威曰儀曰戡女五人男孫六女孫八珍性坦白喜為善嘗給事梁鄒以幹敏稱初築都城營太廟皆以推擇監役有功然不樂仕其買田而居也泉之左有阜隆然而瘠始以為芻牧之所有攻石者過之識其下有石可砥礪春磑厚直將購之宋氏弗許斸而視之果然乃使其子孫自為攻石倍工而薄售其子孫皆能馴其教命勤劬質厚循循焉有孝悌之懿以是家益饒先民有言隂德者必有陽報今觀宋氏子孫繩繩而石出為資豈所謂陽報者歟則其祖宗而來隂德之所在可以見矣珍娶李氏子男二人曰斌曰義女四人男孫五女孫二其系派圖之石隂云銘曰宋惟顯侯始昌于清居室既完仕亦有聲徙汴留燕生死世隔各當其忠為節則一逮官于淄聿來錦川是經是營先志靡愆子孫衆多石乃發端隂德攸符天報孔敦平流之泉淵淵其源昭先有銘諗爾後昆案原本下接梁鄒黃氏先塋之記八字顯係錯誤今刪去陽丘崔氏先塋之記崔氏本薑姓太公之孫叔乙讓國居崔邑因以為氏其上世冀之棗強人當靖康中七世祖以水害徙陽丘遂占籍焉世賈販致饒名于鄉里髙曾祖忘其諱曾祖妣鄧氏子五人其第五子祖考也諱泉祖妣王氏子四人父為長諱聚天質博厚有才術在童幼遇金季亂生業蕩裂無遺既益壯挺然以承家幹蠱獨任其用本之以信義行之以權宜而終之以勤儉孜孜焉矻矻焉規無濟有寒暑晨夜弗懈屬江左平往來貿易湘湖間以是致資纍巨萬言富室無居其右家既成矣乃更詳謹和裕以謙德自牧凡子錢知而賢者弗劵貧無以償者折劵不責其飢乏者恤之如不及人知德焉有子五人且老一夕感焉旦以資産均析而畀之曰無墮而事乃從容杖屨洽親友耆舊盡東阡西陌之樂春秋八十終配趙氏耿氏五子皆趙出長名成字國遂卒嵗年七十娶李氏二子曰寧字安卿早世曰泰字祥卿原缺州務使第三子名榮字夀甫娶張氏施氏三子曰公綽曰公忠曰義第四子名顯字通甫娶郤氏唐氏二子曰公溥曰公逹第五子名璋字潤甫娶鄭氏房氏泥氏三子曰公勉曰公勤曰公歷榮雅與余善來以善狀請曰榮等賴祖先餘澤無所於報先生辱惠以文載諸石為楸松光華俾前美有聞後人有所循持榮等之願也為述而銘之余謂人之家世不同若其善則必隆不善則必替未始不同也洪範五福言富不言貴故家之隆莫如富而富之所止必於善焉傳稱富而無驕未若好禮滿而不溢富以長守衛公子荆於其始有曰苟合少有曰苟完富有曰苟美謂之善居室不眩於物也不膠於富也漢樊重子孫公侯奕世其原出於君子之富以是觀之富可以不善有乎崔氏扼於干戈擾攘之際曾不幾何而其先人逈拔孤起復其隆盛非夫以善繼善則豈能至於爾耶嗚呼矧其昆季孝友相維克迪先猷户庭華腴角立雄峙其孫息楚楚焉皆以問學克家繼踵樹立內外贏二千指鬱為大族名門乃復擴報本之誠盡追逺之孝斯又善之善也歟吾見其家慶之來繩繩無已也銘曰崔姓之得實惟薑出支衍𣲖分厥系莫述冀以溺遷止於陽丘勤力致饒世德孔優厄丁六葉玉石具燬剝極慶鍾起家有子其子維何信篤義專陶朱之能用莫我賢家既隆矣樹德逾懋優遊以終八十其夀五桂並榮孫息繩繩堂構益崇乃惟善徴伐石勒辭泉壤是賁恪矣後人繼善毋替黃氏先塋記黃氏之先世為泰安人髙曾而上譜系不可考祖諱寶以丹青自業娶左氏遇金季兵亂俱失所在考諱定夙頴悟善書而大書尤勝諸為扁署者多從求之後因避兵濟南水柵壻鄒平胡氏遂遷鄒平為賈販以居且占籍焉凡貿易必損已而益人有遺忘財物者雖逺必追與之餓者乞食必致鮮整賸餘不以也慕道教朔望必齋戒修香火瞻禮上下里中以長者稱以故聞人善士往往造焉至則欣然為餽具盡其所有而後已嵗壬寅二月十五日春秋五十有九以疾終于家公再娶胡氏徐氏胡氏癸卯四月二十七日卒享年四十有八子男二人女二人皆胡氏出也其子長曰安字安卿至元十二年九月二十五日夀四十九病卒安再娶張氏田氏皆卒其仲子曰晏字齊卿晏三娶曰張氏趙氏皆卒曰杜氏其女長適益都毛氏孫男五人女一人牛驢當住宜哥女玉兒安之子也始余弱冠時識其仲子晏倜儻尚氣節好讀書喜文辭且嫺吏事常為縣吏非其好也會東郡有巨盜出沒滋亂逺近患之朝廷命大官臨境積賞徴捕久不見獲晏密以方略誘其首惡二人手擒之以獻餘衆以次而敗大官以聞朝命嘉之特授山東樂鹽司吏目遷磁州都吏目官又三轉至濟南危山巡檢所歷皆有成績今狀其世次行實本末踵門再拜請曰晏無所以肖猥以薄官逺逰而蹭蹬不前獨念先壠寂寞大葬弗舉人子之職深懼隕缺頃卜兆鄒平黃山之南原為新塋奉祖考妣衣冠遷考妣兄嫂之柩以二十八年九月二十有七日咸以禮祔葬矣今誠得吾子文諸石庶幾不朽幸垂憫焉且出奠告之文五百餘言反復悲愴有足感人者嗚呼君誠孝矣哉乃樂為書之而系以銘銘曰不抑不揚不弛不張而福善禍淫者亦天道之常新塋孔臧祖考樂康曖曖先德逮兹而彰孝哉何人危山之光吾見其子孫益蕃而門閥益昌辭以表之是為梁鄒之黃東臯鄭氏新塋之記東臯邑小而民阜其俗以好義謹禮節相尚往往多懿族名門其來久矣有鄭氏汝文者介其鄉秀王思哲見余繡江之野言曰先兄汝霖宦京師既歸泫然流涕謂兄汝德等曰父母尚藁殯未祔盍亟圖之於是卜其所購東臯郭西少南里許聶氏原闢塋域請命禮部逮祔刻石記焉且曰刻文當得濟南劉君辭欲就緒而先兄奄逝今汝德等敬卜先考妣之殯暨先兄之喪以今年十一月十七日襄事于新塋而礲石已具先生辱銘之非惟二親之幸而先兄之志可以慰九泉矣敢再拜以請按鄭氏先世南陽鳴臯人自周厲王少子友封於鄭始以國氏春秋末子孫散處陳宋之間而居鳴臯者不知其幾昭穆矣祖源娶改氏卒葬鳴臯父和幼失怙恃遇金季亂播于永壬辰河南初下獨以一身冒百險轉徙而北己而有東臯之寓因贅馬氏遂占籍為東臯人焉和自未冠跅弛尚氣既涉艱危乃更折節謹詳異平時與人接意廓然懇欵明白人無不喜愛加敬性尤慧敏好問學于國語甚習由是志益以逹家益以饒旦夕以孝悌忠信勤儉教諸子無倦知所本矣嘗遇大暑皆疫窮簷為尤乃特設氷暨粥逺近競趣之逮秋始輟賴以全活者甚衆其周急樂施類如此年七十有九以疾終實至元二十八年辛卯二月十八日也配馬氏靜淑黽勉克勤內治大德改元丁酉八月十有三日卒年七十四子男六人長即汝霖蚤成有父風始為拱衛吏後以軍籍從軍江南有功用帥府薦署揚州行中書省斷事官知事滿除將仕佐郎提領真州平凖庫既至同僚隂移易囊橐為姦知不可止乃約割數分掌未幾為姦者敗皆逮繫獨汝霖無毫髮纍以選進將仕郎泉府富藏庫使秩京七品所掌盡內幣出入浣瀾有不謹易於獲罪汝霖獨耿耿洗手就職時近臣領泉府知其能給傳理逋負浙間得楮幣十萬緡以歸公私瑩然無一錢入身近臣喜出其廄馬好鞍畀之曰以是勞汝府中榮之會受代語人曰吾自結髮私念終必踔厲成功名效當世然命止此耳聞古人有四十挂冠者况年迫七十吾可以止矣遂歸西有先壠之議竟弗遂而殁至大元年後十一月十一日也年六十五配夫人張氏山東宣慰副使諱綱之女三男孫兒蚤卒六十胖兒皆幼二女次汝詳娶李氏皆先卒至是葬焉一子幼二女次汝德汝文汝信汝恭並以才行克家稱於鄉黨女二人皆適張氏孫男女三十人余觀鄭氏伯仲承完美之業無改前訓聿致殷盛而能內外整飭動與禮合以始終言之可謂父父子子兄兄弟弟者矣銘曰抑也必揚弛也必張圯彼南陽東臯以昌作之述之既構既堂子孫蟄蟄宜爾百祥卜兆允臧樹此刻章曰惟鄭氏之阡俾永不忘東臯田氏新塋記東臯田淑子儀謁余繡水再拜言曰淑上世本冀之棗強人後遷濟南居鄒平之齊東鄉遂占籍鄒平自始遷至曾祖考凡六世丘壠在焉皇慶二年癸丑淑卜地齊東邑郛西南僅一里别為塋兆以是冬十二月五日舉祖考妣之殯暨考妣之喪葬于新塋念不有旌紀其何以示逺先生儻見憫惠以文惟幸為述而銘之按王思哲所録事狀田氏春秋齊田敬仲之裔更金宋亂譜亡自曾祖考而上行實莫究祖考失其諱性真淳以力穡自業喜讀老莊昆弟三人公為季兄殁諸姪求異産凡田廬皆聼其所欲得獨取其下者宗黨賢之夀年六十三終至元乙酉五月七日也祖妣王氏大德壬寅十月五日卒年八十又一子二人長諱義字清甫淑之父也次諱信字誠甫信配某氏一子曰溶義資雅重夙有成人風東臯崔守玉以其女贅焉俄守玉卒其子元生甫晬義力為擁衛以家事任于己出入營理雖涉險艱冒寒暑弗懈不數嵗崔氏益饒元及冠悉以資産付之歸與弟信相友睦奉其親孝行彌著已而家道大盛雄一邑益以慈恕恭遜自持而不一易其度是年十一月二日年五十九以疾終于家妣崔氏備諸婦道多內助前三年卒實至大庚戌八月十三日也夀四十九二子長即淑子儀其字也次曰津字子方嘗讀漢史載樊重由善農稼資至巨萬以折契止訟推美鄉邑子孫奕世相踵述益顯以大其斯為君子之富余徐而思之洪範五福富居其一是知富固人所分有然必處之以德則其福乃厚厚必至於顯且大否則反是故餘慶餘殃之説見諸易繄其理然歟今觀田氏之世殆亦重比至若厚諸姪之産濟崔氏之孤其淳誠至慮初無外假豈特折契止訟而已乎矧淑與津也克迪世範任其堂構而皆妙齡英爽雅以好義樂施豫服人質諸理其至顯且大蓋無疑銘曰有分靡齊天命則然君子攸處以天合天繄田氏之世完美以厚其作其述德焉是懋如泉斯逹惟川之洪如木斯榮惟棟之隆新阡爰闢樹此銘刻先美孔昭孝思罔極中菴集卷十八
