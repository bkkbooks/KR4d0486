body:
  text: 中庵集卷十四元劉敏中撰碑一鄒平縣至大四年加封大成至聖文宣王碑天地生萬物人居其中而物皆役焉故人為萬物之靈人之中有謂之聖謂之賢者而人皆下焉則聖賢又人之靈也彼聖賢者其生也有神明仁哲之用其沒也有盛德大業之著是以歷代盛王莫不取古聖賢德業之所在祠祀之封崇之使一世之人有所景仰則效遷善逺罪胥化而底於治而聖賢之中其道與造化同混融與天地相始終者獨惟孔子焉故其子孫襲世爵祠祀遍天下而褒崇之典愈加也蓋自漢而下曰侯曰公唐開元間始王號文宣宋加至聖我朝加大成焉大成之義蓋取諸孟子其所以尊奉聖人者於是至矣鄒平廟學將勒制書於石監縣以其屬請曰願有述惟鄒平古名邑漢有伏勝嘗以尚書授朝錯今名其鄉曰伏生宋有范仲淹讀書長白山中今號其嶺曰黌堂而民皆祀之所謂景仰則效者可以槩見况乎大聖人之號揭至隆平之時民之視聽必為之一新不啻開霽之覩日月當春之聞雷雨也其秉彛之好油然於中感動興起有不期然而然者矣為之師帥者從而布宣朝廷所以尊奉聖人之意開導勸奬休養而培植之則一邑之治朞月之間可不勞而致夫若是當復有大儒如伏生大賢如范公者出而為他日治效之應嗚呼聖人之道帝王之制大矣哉蒲臺縣皇慶二年秋加封大成至聖文宣王碑昔夫子欲無言子貢曰子如不言則小子何述焉子曰天何言哉四時行焉百物生焉嗚呼天無言四時行百物生聖人不能無言言之而綱常定三極立萬世準是知聖人之言與天之無言其道一也聖人即天天之大不可名然猶曰蒼天曰昊天曰旻天曰上天曰皇天斯皆知其不可名從其所見而稱之耳聖人之大亦不可名然自魯曰尼父漢曰褒成曰褒尊曰先聖曰隆道其爵或公或侯至唐始王號文宣宋加元聖改至聖斯亦知其不可名極其所尊而尊之耳天開有元列聖相承以人文化天下武皇踐祚考制諏禮聖人為先取義孟子之書加號大成至聖文宣王致奠闕里誕告中外其所以尊聖人者於是至矣蒲臺古名邑自監邑而下兢兢翼翼議勒制書廟學謂當有述下方庸謹嵗月邑尹張某來以為請嗚呼國家之尊奉聖人者寧可不知其所由而然乎夫道在人心教存六經善政不如善教之得民心也故將範模陶鎔薰涵沾沃使民賢哲踵出屋可比封鬱然致唐虞三代之隆風行四方效觀一邑則凡有縣大夫之責者慎思而加勉焉可也延祐二年夏四月般陽路加封大成至聖文宣王碑般陽路總管谷杲過某繡水言杲之來無他頃月朔暨同列監郡僚佐謁廟學既奠相與顧瞻咨嗟同然言曰吾屬稟天子命榮冠裳飫祿廩以臨是邦而其為政之本盍亦深惟而熟計乎傳不曰觀乎人文以化成天下又曰經緯天地曰文又曰守成曰文於堯則曰欽明文思於舜則曰濬哲文明於禹則曰文命敷於四海又曰周監於二代郁郁乎文哉然則文者固政之本歟周衰大防崩詖亂極而孔子作孔子乃刪詩定書繫易作春秋於是三綱舉而五常立善惡判而取舍定二帝三王文明之教煥乎侔日月矣斯孔子之道也是道也由之則理否則亂然則孔子之道又文之本歟故歷代褒崇尊奉之典未有踰孔子焉蓋自漢氏而下有公侯之封至唐始王曰文宣宋加至聖皇元撫有方夏凡所設施一本是道歷中統至元迄於元貞大德文治蔚興跨越漢唐逮武宗皇帝制加孔子號大成至聖文宣王誕告中外大成云者取孟子集大成之義也尊之至矣今上始嗣位下明詔首以興學為天下勸繼又設科以經術取士其所以酌成憲崇政本昭昭如此若奉而行之勉而成之非吾屬長民者之責乎况聖號又崇文之本誕告之始固當大書深刻以新景仰而今猶闕然不亟圖如吾責何石既具衆欲得吾子辭庸謹嵗月杲敢以請敏中竦然曰聖人之道國家之治長民吏之責君言盡矣乃書而為之贊曰蒼姬之衰澤竭道熄斯文未喪聖人乃出刪定繫作三極以立一言之微萬世之則盛王師之乃以有國皇惟我元是奉是式治成本固榮今邁昔徽號爰加典禮斯赫大邦有般官守惟職刻石宣化來者其蹟鄒平監縣布延君去思碑國朝官制路府州縣皆置逹嚕噶齊一人位長吏上監其治也至大四年六月白霫布顔特穆爾以進義校尉為是官鄒平年二十有一矣其父兄並仕吳王邸為大官戒之曰鄒平號難治汝以弱年監難治之縣殆哉慎之勉之即有悔無相見也始下車有能聲一年民誦之三年代歸民挽之不可得而思之弗能已也於是邑士髙某趙某介國子先生張長白慎與來以耆老輿人之言告余曰吾儕野人生逢太平涵濡天恩服勤力穡以仰事俯畜不勝大幸間嵗宿蠧育縣中繁不可縷舉其甚者如方物和買之資官馬芻豆之直皆嵗給大農朝廷不以病民也而為蠧者乃以利己出入控持捩取無畔岸弗慊又如訟有不免也一朝投牒如墮穽擭兩造兼噬動連嵗時曲直未明而生業以索矣復有飾非遂姦訟非已得墜餌溪壑釀其機關使善良屈力而莫申單弱飲痛而受敝苟利成風蕩無禁訶又如賦役有貧富下上輕重之差常制也而乃反之變化恍惚如鬼神不可知故富益富貧益貧凡此吾屬之困也久矣吾進義君之至一日盡刮去脫然如沈疴之得良醫而更生焉蓋吾進義君始以父兄之約而能亷不可動矣亷能剛無所懼矣剛能公絶偏私矣公能明精視聽矣有是四者又能行之以嚴濟之以寬而成之以勤斷之以决凡所與民接者皆躬親之必當而後已故其僚佐相勗以和吏屬縮不敢毫髮欺疇昔持短長攫攘大嚼而快意者皆疊足斂手慹爾而遁斯吾屬之更生也君之惠厚矣大矣顧無以為報公不惜一言載諸石以傳之天下後世以畢吾野人之愚誠則又公之賜也以是敢請嗚呼民邦本也路府州縣之設皆以為民而親民莫若縣故縣之得人為恆難其得人與不得人而民之利病禍福皆立至如影響然縣之責重矣乎嘗觀古之人任是責以立功於民顯名不朽者無他道焉亷且能而已耳後人不然亷者不必能能者不必亷蓋亷非其廉而能非其能矣能必喜事以厲民謂彼之足欺也亷必不事事縱其吏以厲民謂已之無與也由是政令失而貪暴橫寃苦多而謗讟作幸免終更去必曰彼縣難治噫不職而誣其民可乎哉人之不得也如此今進義以監縣治效獨卓卓動人非惟向之所謂亷且能而然與噫自君觀之縣難治乎哉民之不能忘也宜矣乃為之書益都路總管李公去思碑益都禹貢九州青為齊封綿絡海岱民繁物夥代為雄藩聖朝更制以郡為上下路路置總管統攝宇縣而青為東方上路之冠膺是任者非有宏名巨望之素長才雅德之實則莫能宜其選亦莫能堪其責也大德三年嶺北湖南道肅政亷訪使李公諤以選實來三年代歸民攀援涕洟如去慈父母又三年民思之不已耆夀伏珍等相與謀曰與其徒思無益曷若刻石頌德乃件公之治行因余故人今本路經歷王文羽伯儀徴余文余得公之善政其大者曰去民疾重民本慎民罰謹民教清吏習凡五事焉初司鹽鐵者以青地多潟鹵鹽所易出乃比屋計口配鹽入其直以防民私謂之食鹽久則吏緣為姦口嵗至五十斤鹽賸而食弗盡誣之以私鬻直多而償不足罪之以缺課敲榜禁繫求索百端往往破産而後已或乃先責其直而竟掩其鹽民騷然無所控訴嵗已久矣公下車訪知其然歎曰斯弊不去吾何以為政適詔使問民所疾苦至青復有宣慰司公即抗言乞罷食鹽聽民買食便詔使宣慰是之聞諸朝俄而命下選官與公審定可否以聞遂議居實瀕海者食鹽如舊而遏其吏弊其益都臨朐莒臨沂四縣及青之録司益都縣之顔神凡六處可官局發鬻滕嶧二州鄒滕嶧三縣及沂水之新寨凡六處聽商販往來議上從之民喜如更生焉又兵籍之民强弱相懸有不堪彼者朝議將為更張遣使與公閲實之公家至户到口詢目視無風雨晨夜吏不得私而人服其平所謂去民疾者此也公曰民少紓矣民未知本於是勵勤勞禁游惰謹天時因地利牛羊無方苞之踐原隰有如坻之獲粒米狼戾溢于他州所謂重民本者此也公曰民務本矣民未知禁於是舉條章申好惡悉民辭詳公牘小大之獄必以情髙下之手無所容已而人人知懼而訟益簡所謂慎民罰者此也公曰民知禁矣民未知教於是飭學校明人倫子弟就學者復其役秀選可用者達乎上考比磨勵躬為倡率期月之間俗蓋彬彬矣所謂謹民教者此也公曰民知教矣吏習未清欲吏習之清莫如身喻故公田嵗入必以分惠寒士及細民之飢乏者佃有不給即免其輸以是家恆無餘資自奉蕭然晏如也吏屬化之有亷隅之風所謂清吏習者此也夫能去民之疾重民之本慎罰而謹其教終之以正已而正人牧民之能事畢矣嗚呼此民之所以為不忘也歟漢世良吏史稱所居民富所去民思然其所載僅不過數人余固知良吏之少也何以言之為吏欲果而果者多失之猛猛則刑必失中而無辜者多民罹其害矣若是者十有三欲惠而惠者多失之緩緩則號令有所不行而豪猾者肆民罹其害矣若是者十有三欲亷而亷者多失之苛苛則纎芥不容而猜釁作私忿交攻而公道廢民罹其害矣若是者十有三若夫果而不猛惠而不緩廉而不苛使民蒙其利而無所害乃所謂良吏者已若是者十有一焉然則民之害十恆有九而良吏才一焉耳嗟乎良吏之少也如此夫幸一遇之人又安得而忘之哉余既偉公能為良吏得民不忘之思又嘉青之人能不忘公德知遇公之為幸也為本其實而系之以詩公字德貞恩州人自號榖山風儀朗然意度沉雅博學能文而政事為尤長今翰林學士承㫖野齊先生其兄也人門德望景仰一世云詩曰天生我民付之大君大君有命曰吏汝親吏得其職我卵我翼職有不獲吾螟吾螣幸生盛時吏職孔修殿此大邦莫如李侯李侯巨公淵靜亮直匪亟匪徐允猷允則吾疾膏肓侯能愈之吾厄餒寒侯能禦之厲禁慎罰人以訟恥勸學明倫俗從是靡正已正人侯惠不訾侯惠不訾吾人之思思莫我宣曷維其已伐石刻辭傳之孫子大智全寺碑大智全寺儀天興聖慈仁昭懿夀元皇太后作也初皇太后命工畫觀世音菩薩像于都城西髙良河東南之亭設長明燈供報佛恩也厥後薦香曰我昔歸依佛䕃崇奉九子之母資福𦙍嗣有願未酬乃命即其地廣而為寺寺成皇帝詔翰林文諸石臣等竊惟佛之教由戒而定定而慧則佛矣語其究竟則法相皆空語其神通則功德罔極凡知歸嚮靡不如願其道蓋一本乎濟衆利物而已故歷代尊信之然必有聖人者出乃能取其濟衆利物之道推而及於世而佛以此時顯大威德厚聖人之福而成其志佛與聖人一也主上以天縱之聖纘承丕緒夙夜孜孜慮德化為未周民生為未遂是以湛恩汪濊涵煦無外期於動植之倫咸歸太和上之所以資其道於佛佛之所以厚其福於上者於此可見本而言之實我皇太后夙昔擁佑啓迪之功也惓惓焉翼翼焉光大佛宇思裕後昆其濟衆利物之念深矣寺之制正殿位三世佛前殿位觀世音菩薩右為九子母之殿左為大藏經之殿北有别殿以備臨幸前為三門設四天像而僧房齊堂庫廩庖湢甍連棟接絡繹周匝三門之外二亭西曰寶華東曰瑞慶中為池池有梁蓮花芬馥净供天出金碧丹雘焜煌交輝賜名大智全以慧言也命開府儀同三司圓明廣照三藏大師沙津愛護持天藏主之髙僧雲集法像莊嚴鐘鼓幢蓋暗藹宏亮梵唄之音洋洋朝夕觀者不覺企躍興善如入祗陀園升兜率天也資費皆出興聖宫官民無與焉命銀青榮祿大夫徽政院使章慶使殊祥院使甄用監卿大同親軍指揮使領羣牧監臣錫哩瑪勒銀青榮祿大夫平章政事同知徽政院事左都威衛使臣王恆董其事經始於皇慶元年三月一日落成於是年八月皇太后親視賞賚周悉嗚呼因果報施感應昭然皇太后敬祖裕後之誠聖天子承顔順志之孝佛如來知慧方便之教故當如響隨聲潛孚默應璿源日益浚金枝日益茂福祿千億賴及元元以篤我國家億萬載景命無疆之休皇乎盛哉乃作頌曰佛之道真實而奧佛之門虛寂而尊匪空匪有為智為慧神妙變化不可思議有求必獲有願不違三界無大一塵靡微於皇聖元是景是式八表從化萬彚懷德帝道昭融惟佛圓通國勢穹窿惟佛髙崇時之至和莫是為盛蠢動含靈咸遂而性愈愈聖母體仁以慈穆穆天子孝養日祗聖母有念有念惟大宗社惟重子孫是賴曰有福田即佛所居乃闢新宫新宫渠渠繄師圓明挈佛心印新宫爰處大法以振祝釐儲祥其來穰穰孚錫羣方邦家之光載揚佛輝勒此篆籕聖母天子嘉樂萬夀敕賜應昌府罔極寺碑皇慶改元冬十一月詔翰林應昌罔極寺碑識未建其以本末撰文俾刻之從皇姊大長公主之請也臣敏中既承命按聖元有國以來勳閥之家女為后妃男繼尚主世威之重寵絶常品者惟鴻吉哩氏而已始由昂吉諾延以佐命功顯於太祖之世成宗元貞元年追封濟寧王諡忠武子駙馬納沁尚主色徹罕太祖女孫生子駙馬特穆爾有功北征賜號曰阿勒逹爾圖尚主世皇第三女囊嘉特戩封皇姑魯國大長公主魯國三子長為烏敦巴拉駙馬大德十一年封魯王尚順皇女僧格喇實上初即位封皇姊大長公主子阿哩雅實哩襲爵魯王初至元辛未之嵗魯國自以內壼鍾愛出嬪于逺慨然永思圖所以致孝者乃相忠武營牧故地天都撫其坤維金山拱乎艮方大澤二泓渟浩瀚相距左右號東西海二海之間原膴膴宏爽乃乞綸命為城郭為宫室為府署為佛寺府賜名曰應昌寺曰罔極寺為正殿為周廡廡四維為樓為碑樓為垣為門為齊廬庖庫金碧上下輝映絢爛諸佛像設妙極莊嚴又為浮屠府城之西聘梵僧有德業者誦持祝釐祈年其間蓋當欲勒石而輒不果今四十年矣故皇姊因有是請臣竊惟佛法有四恩之說而父母居其首義與蓼莪詩合詩曰父兮生我母兮鞠我欲報之德昊天罔極寺之名出於此乎故知人之所以為人國之所以為國百行之所出萬化之所生小大終始必本於孝而後可故曰君子務本本立而道生孝之用大矣哉嗚呼世皇以孝治天下故九族以親四海以寧雍熙之和洽於其時魯國以是歸誠梵教滋殖福利申顧復之報而孝既隆於前聖上嗣服遵酌成憲故美化以行善俗以興孝治之懿復於今日皇姊以是繼志述事廣發願念濟前人之美而孝復宏於後其為功德詎可量哉且使忠武之勳烈家世輝赫蕃衍永庇國家景福無疆之休伊兹寺是始嗚呼孝果大矣乎罔極之義斯可以見矣銘曰佛以空傳儒以有教空有不同同者惟孝孝之為用萬善所根本根或遺善奚於存為孝無方惟心是屬一誠所及孝無不足魯國之孝顧復孔懷圖報梵宫介福允諧世皇喜之名以啓之皇姊述志稟命紀之帝命赫赫玉刻煥發魯國之舉忠武之烈忠武子孫生為帝姻遵是法門世以孝聞永報國恩中菴集卷十四
