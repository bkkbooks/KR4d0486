body:
  text: 中庵集卷六元劉敏中撰詩餘清平樂大德癸卯奉使宣撫山北遼東道五月赴懿州道中二首茸茸碧草點點金花小十里青山山下道地錦渾教蓋了天然膩軟平勻馬蹄穩送行人路斷不堪回首南風依舊黃塵原注平川細草上有黃花可愛山寒開晚開也無人管風裏欹紅顔色淺恨與天涯共逺多時立馬倣徨一枝為挽餘香欲説揚州舊譜怕渠分外淒涼原注山中五月芍藥始開有感而作九月回至隆興一首雲峯咫尺竹靜芭蕉碧鶴繞蒼苔行又立不見髙堂素壁簿書驛騎匆匆暫時留住衰翁一片歸心難盡野亭繡水秋風原注隆興聼事壁間作六鶴圖頗竒戲書及之西野內翰奉使寄示佳篇纍幅三韓山川風土之勝了然目中夫能以吟咏之樂而忘其跋涉之勞固君子之所尚也披賞之餘輒敢用清平樂韻少答雅貺且以奉旋斾一笑云雲忩月戶水秀山竒處畫裏二三千里路一步哦詩一住詩中却也思家寄來滿紙煙霞辦了黃華事業做成冷淡生涯次前韻經春閉戶人不思量處驀地花神通一路留得詩仙肯住相歡忘却無家對花細引流霞此日詩來腸斷望君東海西涯原注西野郭要道所寄清平樂専言余寓居賞牡丹之樂故余答云然阮郎歸奉使由平灤之惠州山行青山不盡一重重重重如畫中石根流水玉玲瓏高低處處通山向北路回東馬前三四峯峯頭更覺翠煙濃煙中無數松眼兒媚賦秋日海棠分韻得欄字春來應怪洗粧慳故作兩回看風流依舊檀心暈紫翠袖凝丹玉容寂寞闌干淚細雨豆花寒多情誰管今宵冷落淡月東欄菩薩蠻月夕對玉簪獨酌遙看疑是梅花雪近前不似梨花月秋入一簪涼滿庭風露香舉杯香露洗月在杯心裏醉眼月徘徊玉鸞花上飛南鄉子老病自戲老境日蹉跎無計逃他百病魔強打枝撑相伴住難呵也是先生沒奈何耳重眼花多行則欹危語則訛暗地自憐還自笑休麼智者能調五臟和蝶戀花雲卿寄長短句徴無名亭記戲用其韻答之忽得新詞深自愧欲記無名未見無名例自古求名今却避不知誰與君同議旦晝行為昏暮睡我是無心何物能吾纍若道無名名可棄無無名處曾留意曉至野亭臨水衰葵欹欲倒三兩幽花更比初開好何處飛來金鳳小碧筵開徹忘憂草月桂新栽枝葉少一朵妖紅點破江煙曉最愛牽牛隨意繞四欄青錦遮圍了鵲橋仙觀接牡丹栽時白露開時穀雨培飬工夫良苦間園消息阿誰傳算只是司花説與寒梢一拂芳心寸許點破凡根宿土不知魏紫是姚黃到來嵗春風看取黑漆奴村居遣興長巾濶領深村住不識我喚作傖父掩白沙翠竹柴門聽徹秋來夜雨間將得失思量往事水流東去便直教畫却凌煙甚是功名了處吾廬恰近江鷗住更幾箇好事農父對青山枕上詩成一陳沙頭風雨酒旗只隔橫塘自過小橋沽去儘疏狂不怕人嫌是我生平喜處木蘭花慢憶别渺雲間天淡離别意一銷魂憶金縷珠喉氷絃玉笋明月幽人風流舊家心事指南山松柏托殷勤煙草夕陽别浦梨花暮雨重門浪憑歸夢覔行雲腸斷幾黃昏甚百種淒涼一般寂寞兩地平分多情料應有語道卿卿不惜鎖窗春為謝晴桃風栁不禁鞍馬紅塵贈貴遊摘阮時得名妾故戲及之此聲何所似較琴語更琅然問太古遺音承平舊曲誰為君傳知音素娥好在只向人懷抱照人圓一笑青雲公子不應猶有塵緣松間玄鶴舞翩翩山鬼下蒼煙正閉户焚香捩商泛角非指非絃華堂靜無俗客算風流未減竹林賢何日西窗酒醒聽君細瀉幽泉適得醉經樂章讀未竟彥博尚書有兵厨之餉因用其韻書二本一呈醉經一謝彥博待搘撑暮境道比舊不爭多奈白日難留丹心易感緑髮全皤行樂處渾一夢憶黃公壚下幾回過振䇿千峯絶頂濯纓萬里長河紅塵世事費瑳磨人海駕洪波悵學古無成於今何補漫爾蹉跎間攬鏡還獨笑甚蒼顔一皺不曽酡忽報鳴鞭送酒開尊自洗空螺水龍吟王瓠山承旨以賞牡丹水龍吟見寄且云三花脈脈似怨中庵無一語者則知瓠山所居乃余向者所寓居也次韻答之牡丹何可無言廣平曽有梅花賦蹉跎老矣愁多歡少花開人去黃絹飛來分明却見舊家風度是東風喚取玉堂仙伯要長在花間住慙愧相思千里也看同去年崔護詩朋酒伴吟看醉繞應無重數寂寞江亭青山不斷碧雲將暮對夕陽老樹悠然北望誦天香句同張大經御史賦牡丹春風一尺紅雲粉蕤金粟重重起天香國色宜教占斷人間富貴最喜風流粧臺卯酒欲醒還醉算年年嵗嵗花開依舊問當日人何似休説花開花謝怕傷他老來情味依稀病眼故應猶識舊家姚魏無語相看一杯獨酌幽懷如水料多情笑我蒼顔白髮向風塵底又次韻曉來露濕仙裳盛開更比初開重春風也惜頩然薄怒不堪搖動天上人間我評惟有司花會種想年年京洛紅塵紫陌都占斷繁華夢醉裏依稀有語只清辭可為光寵有香萬斛從今準備公來迎送風雨難憑綵雲回首總成無用喚玉壺留取一枝春在作中庵供沁園春省右司秋日海棠和諸公韻花有花時何事兹花待開便開看嫣然一笑秋容也媚問之不語春意潛回靜想乾坤中間萬有元氣循環共一胎花如許儘風流竒異嘆了還猜三生月地雲階料曽被西風照鏡臺悵賞餘人靜黃蜂日晚夢回月落白鴈霜催兩度頻煩一畨遲暮爭似從他本分來青霄客有留連新句為寫芳埃韓雲卿右司邀賞牡丹且云芍藥有雙頭者以病不果赴呈諸公原注時余方為國子祭酒先自空踈幾載蹉跎厯繞湖江甚如今却遣官間責重茫然自愧學陋言厖鬢雪難消君恩莫報五鬼欺陵不可降如何奈強支撑病骨獨伴寒釭心如孤斾髙杠但猶想茅齋對石缸笑隨身惟有詩囊藥裹打門誰送酒榼羊羫夢裏笙歌無名亭上滿眼春風四面窗人如玉看牡丹第一芍藥成雙原注韓家有亭曰無名題戶部郎完顔正甫舒嘯圖仍用盧踈齋韻華屋髙軒富貴之心人皆有之甚伯倫挈榼惟知殢酒浩然踏雪只解吟詩一見令人利名都忘更有髙情元紫芝還知否蓋道分彼此事有參差看君緣髮雄姿況千載風雲正遇時便登臯舒嘯如今太早揚眉吐氣過此還遲愧我衰殘終然無補久矣寒灰枯樹枝雲山夢被畫圖喚起情見乎辭張君周卿將赴濟南提刑經厯出示樂府因其韻以餞之簿領埃塵鞍馬風沙逸才未舒但平生豪氣黃金易散髙懷灑落白璧難汙我問行藏掀髯一笑意外功名不用圖南遊興愛華峯北渚雲海方壺故園風景非殊恍六載别來一夢如想踈篁缺處多應得笋新松種後已漸成株歸去來兮東樓南浦爛醉何妨翠袖扶明年必記此時休厭折簡相呼原注時周卿猶為憲府掾云余既以太初命石且為記客曰雖命之不可無號號所以貴之也乃以已意號之曰蒼然余復援稼軒例作樂府沁園春一首改名曰蒼然吟附於記後石汝來前號汝蒼然名之太初問太初而上還能記否蒼然於此為復何如偃蹇難親昂藏不語無乃於豫太簡乎須臾便喚一庭風雨萬竅號呼依稀似道狂夫在一氣何分我與渠但君才見我竒形異狀我先知子冷淡清虛撑拄黃壚莊嚴繡水攘斥紅塵力有餘今何夕倚長風三呌對此魁梧古烏夜啼日長誰伴中庵太初巖靜掃間庭獨自看晴嵐嵐翠滴雲影濕雨聲酣欲借昌黎老筆賦終南最髙樓寄張古齋受益野芳亭名太初余家怪石巖也古齋受益所居當繡江之源江北流二十里其東壖有曰野亭者則余之别墅也頃嵗余與古齋同在京師而同有歸歟之思逮兹而同如其志同樂也作詞以道之同一笑云山家好河水淨漣漪茅舍緑隂圍兒童不解針垂釣老翁只會甕澆畦我思之君倦矣去來兮也問甚野芳亭上月也問甚太初巖下雪乘欵段載鴟夷興來便作尋花去醉時不記插花歸問沙鷗從此後可忘機既作此詞有懷張秀實公子幽居復用前韻幽居好煙靄翠生漪水繞更山圍錦幃四面花藏屋緑雲一望稻盈畦問誰歟君子者美人兮也不看李家堂裏月也不踏班生關外雪尋寂寞見希夷醉眠長被鶯呼起相看時有燕飛歸我憐君君似我本無機滿江紅病中次韻答暢泊然純甫北去南來凡幾度風沙行李離又合新歡舊恨古今何已風鑑俄瞻衡宇外月明照見寒江底問朱絲白雪尚依然知音幾無所作誰成毁非所望何悲喜謂人生失得卷舒天耳病骨支離羇思亂此情正要公料理但無言手捉玉連環東南指又和前韻我笑前人癡絶甚搔瓜鑽李天壤內神竒腐朽有何窮已才見凌風霄漢上忽看垂翅蓬蒿底試間將得失遍思量凡經幾無汝愧從渠毁非我有吾何喜但物來即應盡心焉耳一榻髙懸人事了一瓢樂飲家緣理也何曽直待馬千蹄童千指六州歌頭暢純甫與姚牧庵郢城會飲唱和樂章六州歌頭往返凡數首余次其韻二篇答純甫江城會飲東壁照奎星肝膽露乾坤祕盡披零勢分庭筆下風雷發何為爾聊相慰供一笑悠悠者總流萍虎擲龍跳幾過依然對髙壘深扃覩殷盤科斗不説換鵝經老眼塵醒認聲形中州月旦千載後猶灑落有歆寧人不見搔首立望餘馨海邊亭寂寞鍾期逺髙山曲幾人聽何必要椿與菌校年齡萬事元無定在此心得到處仙靈愛爛遊南北快馬接飛舲萬里丹青原注純甫自京師入長安厯巴蜀轉江淮入廉山東皆極顯貴故末章及之窺天以管認得幾多星嗟擾擾矜完美校竒零蟻緣庭物化無窮已石生火火生壤壤生濕濕生木木生萍夢裏髙車駟馬蘧然覺甕牖柴扃記達人有語痛飲讀騷經非醉非醒妙難形曽經灔澦夷險地人上栗此心寧更誰問桃李冶蕙蘭馨水東亭一曲滄浪詠都分付野鷗聽還漸喜鄉社飲近髙齡但愧霜臺舊友平生念鐵石通靈辦林間一笑酒醒便揚舲飯白芻青原注時純甫將事東州歸欲過余繡江中庵集卷六
