body:
  text: 中庵集卷十五元劉敏中撰碑二忠武王廟碑天開聖人福斯世必有任重傑異宏偉之器出於其間聖人得之然後莫大之計可勿疑而舉非常之功可不勞而成堯得禹洚水行地中其利為萬世賴湯得阿衡武王得師尚父皆拯民於水火屹然成長治之業聖賢之合果非偶然矣世祖聖德神功文武皇帝以唐虞湯武之聖紹膺景命恢崇丕緒一時腹心爪牙之寄宣勞戮力皆極其選至於出入將相動協聖謨趠長江掇全宋致有元之盛跨越百代焜耀萬祀者曰惟忠武王耳上之居儲闈也韙王功烈賜幣行中書省俾廟于杭始嗣位勑濟以公帑十萬緡成之且勒碑焉而其辭以命臣敏中謹按王諱巴延朔方人其族為巴琳氏曽祖默爾根圖太祖起兵為巴琳部左千户祖阿拉克襲父官平呼展有功從憲宗西巡卒于軍父尼固爾岱以世爵從宗王實喇開西域以卒王長於西域至元初年甫三十以宗王命入奏世皇一與語異之輒留置左右弗遣未幾拜光祿大夫中書左丞相姿凝峻整諸曹白事尤難决者辭往復稠疊王夷然如無聞白已舉目一語而破其歸要事以決省中始帖帖讋服識其為真宰輔也七年同知樞密院事十一年再為左丞相廷議以宋恃險拘我信使資我叛臣以汨我東土矧威福下移人且罹害興師問罪茲惟其時皇帝詔王昔曹彬以不殺平江南今以六師畀汝汝為吾曹彬可也王拜命起行不至其家是年十二月渡江眀年五月被召入見且陳始終規畫七月拜中書右丞相八月還南眀年正月宋降五月以宋主與其母后致闕下而聖統一矣嗚呼天生王以助國家而世皇能識之世皇以大任付王而王亦自任之混一之隆人皆見於王之凱旋之日而不知世皇獨見於王之始至之時宋平之期人皆見於大兵渡江之後而不知王獨見於拜命啓行之始也蓋世皇以至誠奉天以至仁濟天下王以盡忠報國以盡力效所職上下交孚天人協應故能收此駿功若是其速也夫大江之險昔人有天限南北之嘆有土囊欲塞之哂險固足恃也然而我師一臨南北不得限土囊不必塞何邪彼之君臣其道不足故也彼不足而我有餘險復何有哉傳曰在德不在險信矣蓋王之勳蹟大者有四初我師及郢王欲勿攻諸將以為郢據上流過弗取必有腹背患皆力請王曰我奉命伐罪不擊一城且兵行有機得失在吾非汝曹所憂也卒舍郢由别港濟舟順流而下廓如無人陽邏控大江北壖宋人堡以自蔽攻之堅不可拔王密謂副將左丞相阿珠彼所恃惟此耳可用搗虛之計掩其不意南岸可得也得即報我阿珠夜以徑卒三千人背陽邏飛艘突據南岸黎眀報至王即以大兵徑渡宋人褫氣而武昌金陵沿江諸州盡為我有及赴召而還也乃分三道掎角以進王以中軍直抵餘杭布宣聖天子問罪弔民之意宋乃出降其取敵有如此左丞相阿珠才勇善戰而士頗不附王患之乃獨禮敬加異由是衆視王益敬以和諸文武將佐皆密悉其才用臨事遣授各盡其當故能所向無前動必有成其駕馭有如此王用兵紀律外嚴而中寬以聖訓不殺為主威憺德懷欵附日至或請入視降城府藏簿帳以知金榖户口多寡王笑曰是欲夤緣噬吾民耳乃下令諸將士敢有肆暴掠及入城者以軍法論故所至犬雞不驚四民晏然獲來蘇之望其注措有如此江左地繁阜滋久金玉錦綺珍異竒古之玩在所充溢王一不挂目宋降將有以趙氏二宗女獻者立叱去之逮宋降幼主與母后請見辭曰但俟拜天子卒弗與面既歸帝慰諭嘉其功再拜謝曰惟陛下神聖阿珠勤勞所致臣何功其禮節有如此嗚呼非天之所命能至爾邪是後拜金紫光祿大夫知樞密院事進開府儀同三司太傅録軍國重事乃若靖東藩之亂勤北征之役世皇升遐成宗未立伊霍之重朝廷賴焉其詳有太史在茲不復著春秋五十有九以疾薨于京師甘棠里第實三十一年十二月也大德八年正月制贈宣忠佐命開濟功臣太師開府儀同三司追封淮安王諡曰忠武王云銘曰天惟德輔眷我有元聖祖勃興植本浚源世皇大之道濟無外孰有宋迷獨險是賴皇赫斯怒命我相臣往致而罰以蘇爾人相臣維何惟王忠武王之始隮邈自西土夢卜之遇千載一時大任在身逮茲見之王既奉命弗矜弗惕匪徐匪亟而行吾職謀士落落惟王之承虎旅嘽嘽惟王之令大江凌空航以一葦雄城峻壁不戰而靡法去彼苛政樂我寬我樂我迎漿壷食簞青蓋爰出北闕以貢地闢天通遂大一統彬之不殺王則為優渾濬之訟惟王所羞杭廟崔嵬像設儼若英風萬古雲臺麟閣丞相順德忠獻王碑故太傅右丞相贈推誠履正佐運功臣太師開府儀同三司上柱國順德忠獻王達爾罕既薨之五年皇慶改元之秋上詔中書故丞相達爾罕弼亮三朝功多不可以不顯其相地盧溝通逵旁勒碑焉且詔臣敏中撰文臣竊惟有國致治難得賢為尤難是以古之聖王得一賢則信任之尊顯之使得以盡其能又必褒崇之表異之示不可忘其勞若太常之紀盟府之藏鼎彛之勒麟閣雲臺之像不一而足重得賢之難也我元聖聖相承天祐生賢相臣將臣炳烈相望人才之得於斯為盛若夫懷逺圖而略近功先大綱而後小數藴江海之量負山嶽之重不威而令行不言而人服處難而無所惑履變而不可奪端委雍容而朝廷尊安天下受其賜則忠獻王其人乎上之所以眷眷焉不忘而王之所以荷此表異之渥也宜矣嗚呼聖人言君使臣以禮臣事君以忠于兹焉見之臣謹按王諱哈喇哈斯朔方人其族為威喇諾爾氏襲號達爾罕曾祖考諱竒爾實勒贈推忠佐命宣力功臣太師開府儀同三司上柱國追封順德王諡忠武祖考諱巴哩察贈協忠翊亮定逺功臣太師開府儀同三司上柱國追封順德王諡忠毅考諱囊嘉特贈宣忠效節保大功臣太師開府儀同三司上柱國追封順德王諡忠愍曾祖妣哈喇沁氏祖妣諤勒哲依氏妣多爾噶納氏並封順德王夫人忠武重厚有英才遇太祖皇帝於飛龍見躍之際知汗將欲襲之趣告帝為備果至我兵縱擊大破之尋并其衆以功擢千户錫號達爾罕時官制惟左右萬户次千户非勳戚不與達爾罕譯言一國之長帝謂侍臣彼家不識天意故來相害是人告我殆天所使我許為自在達爾罕矣因賜御帳什器及宴飲樂節如宗王儀是後所下郡國由奉聖大同至陜西西域土畨雲南遼東未嘗不從摧堅蹂強以死力自效壬辰太宗皇帝略地河南忠武間出太行反擊燕有功㑹病薨子十二人其三忠毅也以勇鋭服衆從睿宗皇帝取汴蔡滅金丙申錫分邑順德病薨二子次為忠愍果毅有謀以近侍時從憲皇帝伐蜀多勞績戊午薨于軍於是王甫及歲而識悟異凡兒目不視戲稍長善騎射尤習國書聞儒者談輒喜至元壬申世祖皇帝録勳臣後一見異之命襲號達爾罕長宿衛百人夙夜共職惟謹嘗從獵馬躓傷面上直如常帝命醫視眷益重眀年秋九月帝御萬壽山王侍賜金縀諭曰汝先世勳大朕且大用汝又眀年春丁母夫人憂哀毁踰禮是冬十月帝獵賽音布拉歸語皇太子曰達爾罕非常人比可善遇之乙亥江左平賜廉欽二州益其邑乙酉拜大宗正賜珠衣一襲時郡縣囚盜詐者上宗正决屬當遣使决死囚諸道王重按獄詞小不具悉令覆勘奏决者僅六十人耳尋赦下所活數百人大同民羣鬭毆鷹房三人死近臣以變聞帝怒亟遣王治止坐其首鬬者京師有以僞造楮幣連富民百餘家王盡釋之保定諸郡旱民當輸米京師多以輕資就糴有司托為姦欲沒其産賞告者王得其情皆縱去曰舍貴就賤民便事集又何罪為柄臣擅威福益橫知惡已忌之數曲為邀致竟不一往其家僮冒禁殺牛有司莫敢詰王致以法益忌謀撓王以多事奏請江南囚亦𨽻大宗正蒞决王曰彼問民教令未孚若一切繩之恐生亂帝是之而止辛卯帝念湖廣失治欲遣近臣往莫宜王臺奏達爾罕在宗正决獄平即去恐難其人帝曰彼地朕嘗駐蹕治非斯人不可王遂行隨賜以玊帶授榮祿大夫湖廣省平章政事湖廣南瞰交趾占城西掖蜀西南接南詔東連吳㑹境壤且萬里而八畨兩江蠻獠布溪峒間虺蛇起伏跳踉小戾則相讎殺攻剽無時故治視他省劇甚王至審利病度先後簡僚佐撫兵民威行德流善遂頑革錢粟刑獄井井有條自宋時有巨盜嘯黨出沒湖湘殆二十年不可制王選士付以方略悉擒誅之江州𨽻江西省有猾民餌官府恣雪凡剽船江中羣盜皆與為根穴交通王知狀徑縛以來百救莫施卒置於死逺近震悚俄置行樞密院兵民政分勢不相容姦寇伺發溪峒以閧壬辰王入覲列其不便罷之帝問王人言廉訪官反撓吏治朕已令視之卿謂若何王曰憲司職紏姦弊貪吏所疾妄為謗耳帝以為然及還邉將征交趾出其境王戒曰無擾吾民有奪民魚菜者杖其千夫長一軍肅然乃上奏曰往年逺征無功民瘡痏未蘇乃復有事非國善謀也又發湖南湘之富民屯田廣西為圖交趾計王以徙民瘴鄉事固難成易致怨叛遣使密奏吏抱券請署不答俄使還報罷民大悅已而廣西元帥府請券南丹户五千屯田襟要謂士不死瘴癘餽餉有餘蓄實空荒之地為雍管之蔽制諸蠻控交趾其利有六王喜與之牛種農器置長統焉聞諸朝到于今便之湖廣舊無夏稅柄臣援唐宋末世為徴王曰衰弊之政聖朝可行邪竟奏罷常澧辰等州大水漂民廬多死者王亟發廩為之賑慰凡災皆如之甲午春正月世皇登遐王謹斥候戒不虞境內寧肅大德戊戌九月朝成宗皇帝于上都帝嘉其績授光祿大夫左丞相行省江浙視政凡七日綱舉七十餘事民風吏習翕然為變入為中書左丞相加銀青榮祿大夫杭之耆庶伏地攀泣馬不得前王既當鈞軸益以天下自任每退食延見四方賔使訪以物情得失吏治否臧人材顯晦年穀豐歉采可行行之凡論議先以國典參以古制揆以時宜必當而後已其可否事猶元化之運順無留滯惟不言利不喜變更一以節用愛民重名爵為務京師先未有孔子廟而國學寓他署王喟曰首善之地風化攸出不可怠乃奏營廟學嘗躬為臨視既成朝野瞻聳選名儒為學官奏遣近臣子弟入學而四方來學者益衆又郊禮久未遑王總羣議奏行之辛丑同列以或者議倡言世祖皇帝以神武開一統功蓋萬世陛下未有伐國拓地之舉以彰休烈西南夷八百婦國弗率可命將往征王謂山嶠小夷去中國遼絶第可善諭向化苟將非其人未見所利弗聽竟奏發湖廣兵二萬人丁壯役餽挽數十萬將失紀律果無功而還諸蠻要擊飢疫相仍比至將士存者才十一二㑹赦有司議釋將罪王曰徼名而首釁陷失士馬非常罪比不誅無以謝天下奏誅之癸卯秋拜中書右丞相加金紫光祿大夫王嘗言治道先守令至是選掄益詳時號得人定官吏贓罪十二章及丁憂婚聘盜賊等制禁獻户及山澤之利每歲春大駕幸上都王必留守其重可知已時帝疾連歲權移中闈羣邪交扇勢焰翕忽王以身維之姦不得逞事以無撓丙午加開府儀同三司監修國史置僚屬奏修三朝皇后及宗室功臣傳冬十有一月帝弗豫王入侍醫藥出總宿衛且理幾務諸藩王欲入侍疾王拒之丁未春正月宸御晚駕時武宗皇帝撫兵居北王封府庫稱疾卧闕下理幾務如故中闈以姦臣謀絶北道驛欲行祔廟禮王格其事密記授使間走踰兩驛始得傳馳報武宗諸懷詐者數欲害王王不為動內外凛凛視王以安㑹今上皇帝皇太后至自懷姦臣希中㫖謀為不軌三月王贊今上皇太后擒滅其黨發使迎武宗四月今上皇太后如上都王繼往五月武宗即大位加太保開府儀同三司録軍國重事中書右丞相監修國史賜以憲廟所御白貂裘寶帶未幾加太傅賜第令其子托歡近侍和林控北邉始置宣慰時諸部落降者百餘萬口乃罷宣慰詔王以太傳為左丞相行省事賜楮幣十五萬緡黃金贏十二鎰白金二千五百兩帛四百端乳馬六十匹皇太后賜楮幣五萬緡帛二百端至和林獲盜米商衣者即斬以徇攘竊屏息行旅為便分遣使發廩賑降口復奏請錢七千三百萬緡帛稱是易牛羊給之又給網數千令取魚食逺者厄大雪金山命諸部置傳車相去各三百里凡十傳餽米數萬石牛羊稱之又度地立兩倉積米以待來者全活不可勝紀有飢乏不能達和林往往以其男女弟侄易米以活皆贖歸之和林歲糴軍餉恆數十萬主吏視利繆出納囊橐滋弊久矣王立法以遏其源沿海屯田廢弛重為經理歲得米二十餘萬斛益購工治器擇軍中曉耕稼者雜教部落又浚古渠溉田數千頃穀以恆賤邉政大治至大改元戊申帝賜大帳如親王制諸藩禀命戎事則以宴之仍賜酒米百斛皇太后今上咸有賜焉天下傾耳以俟復召是冬十一月遘疾召其屬曰吾不起矣不得報國矣汝曹各自勉此問金穀勿貽朝廷慮其屬以聞帝驚愕命醫偕其子托歡行以閏月某日薨于和林所居之正寢春秋五十又二天雨木氷連日帝大傷悼遣近臣慰諭其子賜賻錢五萬緡今上賻錢二萬五千緡勑大興尹買葬地昌平陽山之南原曰使天下後世知吾賢相耳乃胥議為石塜柩至以是月二十有九日葬近而朝著逺而士民以及四方慟哭流涕嗟悼懷慕及奠于冡者無有已也明年乙酉八月有封諡之命先配遜都氏繼室札拉爾氏卓哩雅氏札拉爾氏奇􅚕氏並追封順德王夫人一子即托歡由近侍為太子賔客今上御極遷御史中丞進大夫官榮祿大夫襲號達爾罕博貫經史特立正言得風憲體皇慶改元壬子制加王曽祖考而下三世爵諡大夫之母諤勒哲依氏封順德太夫人王為人神宇靖偉簡重寡言不見喜愠望之儼然知其為公輔器其在宗正也從世皇北巡平宗王亂初入叛境王率三百騎猝與敵遇徐整騎突出敵背連彀矢殪數人敵披靡遁帝壯之其在中書也引儒生討論文典至堯舜禹湯文武之為君臯䕫稷契伊傅周召之為臣歎曰人生不知書可乎乃館士教其子學由是而觀王之文武志略本乎天性奮身逢時發於至誠故其事業之見於世剛眀正大巋巍煒耀如此嗚呼古所謂大臣者王為無愧矣臣既述其事乃繫之以詩曰漢有文成難制將變元有忠武患去未見掖聖承天偉績共貫忠武有孫維王忠獻維嶽降靈維王以生雲風類從近列以升穆穆世皇羣材權衡孰大豫任王于是稱利器所施宗正焉始挺然鶚立獄平政理朝有巨姦王不以齒有媚不答姦氣為褫帝念湖廣控馭匪宜陟之鼎司曰汝往釐霜肅露濡化行若馳島蠻海夷悅服熙熙移杭未旬入總大政民有怙恃事有龜鏡惡者自懲善者相慶百度亹亹咸統于正成宗上仙回邪譸張勢挾中闈搆謀非常王翊潜龍置彼斧斨伊霍之重賴其胥匡武皇嘉之康錫三接朔方往撫有聞赫赫一夕隕星山圮棟折遄歸之望竟莫爾愜天子曰嘻斯何人斯何紓豫思其碑而辭大書深刻九逵是向尚千萬年監此良相勑贈益都行省伊克札爾固齊贈推忠宣力功臣諡忠襄薩木丹公神道碑銘皇慶初元歲壬子冬十有二月大司農卿臣穆爾托噶王某參議布哈奏吏部郎中雅克特穆爾洎姪章佩太監圖卜特穆爾言由臣父而上大父曽大父皆以服勞矢石制贈官勳爵諡恩寵優渥願得勒之堅珉庸示不朽上可詔臣敏中撰文臣謹按太尉忠襄公朔方人族薩木丹氏小字沙札該吏部大父章佩曾大父也資恢特便騎射驍勇罔儔太祖龍飛備宿衛從征不庭芟迪延蹂回鶻拔唐古著勞嵗庚寅太宗稔公英果令督阿穆爾攻信安下之明年為監戰萬户同萬户阿爾鴻和爾破汴癸巳賜金符授益都行省都達嚕噶齊勑諸部兵百取卒二卒具馬三牛二以從又益領通事户沙克嘉巴圖爾等軍尋偕達春諾延統二萬騎收國用安于徐丁酉遷京兆省至懷屬大疫士不利行有㫖就鎮懷孟又代察罕總軍河南復官于懷時草創庶事擾攘公以撫養為專務戢姦禁暴民翕然安生已亥同官王榮韜禍心專恣不法一日執公將置于死其黨請于榮曰公未嘗毒吾人願勿殺榮言是善驛騎不殺必遽聞復力請榮乃閉公佛室中劫衆保大行暖帳寨以叛夫人實里巴氏聞亂手擊鼓召兵至榮宅窺牖破户得公則面縛帛抹口兩足跟斷矣公不勝忿翼以二子褁創馳旁郡請兵彰德郡將蒙古博爾濟兵破其寨獲榮戮之上聞遣詔使以榮妻孥資産畀公黨惡者皆誅於是出民萬餘于郊哭聲沸天公言諸使者王榮已戮惟是脅從皆吾民若誅顧空城奚為儻朝廷罪不殺我執其咎盡釋之又言榮妻孥不幸至是可哀悉檄遣歸民籍其第舍為驛館一無所取創平入覲上憫其勞寵賚優渥踰年薨和林勑葬山陵之旁聖天子御極贈推忠宣力功臣金紫光祿大夫太尉上柱國溫國公諡忠襄夫人哈屯和斯哈喇沁實巴爾哈喇沁實喇巴爾並溫國夫人子男八人達吉達春濟嚕海阿拉楚勒罕丹達里埒里圖嚕齊達春總管丹達里宣尉使萬户贈榮祿大夫平章柱國溫國公圖嚕齊宣差孫男十八人曾孫二十二人𤣥孫六人女三人塔倫奇塔特章巴喇衮皆適名族其諸孫輩行名官刻之宗派圖竊惟兵凶器能戕人殺人而善用者能活人何哉蓋其為心休休焉必有以本其不殺而後能濟人之厄若公之力請王榮脅從之衆踰萬人是豈不本諸其素無殺人之心而能乎矧又能愍其仇人妻孥不納諸已仁矣哉語曰活千人者子孫必封公贈太尉上公子若孫皆平章三世爵溫國議者以侔漢之耿鄧有以矣夫銘曰為將之略芟亂翦凶以殺止殺仁存厥中顯允太尉才雄氣鋭依乘風雲成勳不世始之朔漠繼而炎荒蒞閫中夏營丘太行逆榮懷毒變生肘腋彼雖吾戕此不汝逸能戕我足靡戕我心顧未旋踵汝為我擒脅從萬命一語以貸懷民百年莫報永賴榮妻榮孥惟所當有而不有之德孰與厚桓桓上公以貴以榮太尉兵柄柱國顯封祖孫相望三世大國曽仍衆多益昌以熾分圭華衮惟公之勳侯重將纍繇公之仁大刻穹碑俾永是式於昭令名天壤罔極敕賜鎮國上將軍福建道宣慰使兼鎮守建德萬户贈榮祿大夫平章柱國溫國公諡恭惠薩木丹公神道碑銘為將之道有三曰智曰勇曰仁蓋事變之來知足以達其機勇足以應其㑹仁足以濟其成非夫髙明博暢冥乎神運大有以過人者不能也觀榮祿公之在襄漢請命入城勇也諭大義以褫敵之魄智也省百萬之師而活其生靈仁也濟江而後百戰百克一以是道噫古所謂良將者公其是歟公諱丹達里朔方人姓薩木丹益都行省推忠宣力功臣金紫光祿大夫太尉上柱國溫國公諡忠襄沙札該第六子生穎慧不羣儀觀峻整太尉公異而愛之少長從太尉諸道征進多謀畫之助中統初兄達春以管軍總管卒母夫人實喇巴爾攜達春子歡塔暨公入見有㫖令公襲職公言姪歡塔俊邁練兵世官莫侄若上喜其讓别任公管懷孟軍鄂囉三年青冦平第功有白金之賜至元六祀大軍攻樊襄亘鹿門萬山築長壘闔圍之公以上千户佩金符晝督夜徼一軍倚重九年襄人乘夜隂晦以樓舫五百艘飛楫突出冀接援兵比出我先偵知密積薪水滸伺其過爇之其燭如晝公率所部以火攻先燔灼狼籍大軍縱擊無一兵一舫逸者公生致都統副將四人獲樓舫二十首將右丞相巴延左丞相阿珠遣公驛聞授密㫖而還偕先鋒默圖徇荆南斬首級千安陽灘之捷丞相録公前後戰功代奏之上大恱謂公世名閥朕所素知異日當大用賜之錦衣白金曰以是為識十一年樊既下料兵攻襄陽公言可遣辨士入諭當降否則攻未晚丞相謂公孰能棄生為吾行公言以聖天子洪福何患不行當達里願求偕行人翼日公與阿里譯史王貟外請行遣之及城守臣吕安撫出迓宴于詔樓公陳禍福諭曰天眷吾有元海外內罔非臣屬獨爾一隅漏王澤今天兵雲集帶甲百萬以中國之大供億無窮築長圍扼鹿門橫亘江路攻具之竒有西域機石飛三百餘步以是樊破無噍類爾嬰城固守六載為人臣義無不足如生民何聖朝上應天時下徇地利中察時變平宋必矣其審思之吕泣下曰容吾納欵盟而出後三日襄城降十一月有㫖議過江之舉公言當由漢水進然聞郢踞北岸城堅地隘師至此慮難丞相謂公爾知兵其再思以對公乃率千騎前視之至黃家原有渠盈溢闊數丈而下流渙散益淺不可舟逹漢江約十里歸言可以越郢衆謂無水舟萬艘何為公言破竹為席藉淖曳之可也衆又謂郢不攻如後患何公忿曰大兵規摹安事一城丞相如公言水陸並進郢人果絶隘為拒而我師入漢矣丞相喜謂公過郢爾力也當上聞郢將趙都統率萬兵躡吾後公為殿敗之取首級扺沙洋新城藴崇如京觀示城中人令俘髙呼不降者視此逮夜兵民往往踰城降獨二城不下攻破之近漢口公言敵皆巨艦吾舟十不當一且江勢大可徑過淪口速圍漢陽取漢口急分兵眀攻陽邏堡夜以徑卒疾船泝流搗虛南岸可得也從之詰旦果得南岸宋將夏貴孫虎臣悉衆來禦艨艟萬艘旌幟彌望丞相俾公諭諸軍我既有大江效忠滅宋在此一舉士皆奮交戰辰至申大敗之追北十餘里浮尸滿江水為之赤是後鄂漢壽昌黃蘄皆平范文虎以舟師絶江迎敵公戰走之留公暨萬户鄭伊克守蘄丞相喜曰以鄭之勇丹達里之智守是足矣㑹宋將髙安撫引兵攻蘄公謂可堅守勿戰鄭不然戰殁公徐平定之十二年丞相召公詣建康議征進下浙諸城降宋主公皆在十三年五月守建德禁兵毋下鄉保諭民懇廢田衆安其政十二月衢婺徽信處皆叛其守將孟總管等皆捐城來歸公言各奉命城守來何為拒不得入密布諸兵杭省於是宣撫索多萬户張𢎞範分道討賊又報婺賊唐太尉金曽三擁兵萬餘至三河白沙聲言先攻建德次取餘杭公時宴索多射圃擊毬為樂如不聞夜遣驍將引鋭兵鳴鉦樹幟奄出賊背賊驚潰勦戮殆盡郡人無聞知耆宿德公立生祠祝之公所家覃懷亦祠焉有活佛之目以其能濟衆也十七年賜金虎符授鎮國上將軍福建道宣慰使兼鎮守萬户是歲十月十九日以疾薨于建德歸葬于懷之某原夀年若干聖天子即位録舊賞功贈榮祿大夫平章柱國溫國公諡恭惠夫人瑪納多羅干並溫國夫人四子和卓總管妻錫琳耀珠伊克札爾古齊贈榮祿大夫平章政事溫國公諡懿靖妻實里巴封溫國夫人雅克特穆爾朝列大夫吏部郎中資廉正持銓平允先為監察御史河南副廉訪使以敢言知名配夫人通通和拉眀威將軍萬户政尚嚴恕兵畏民懷配夫人舒屯哈濟至大四年八月召將大用道卒詔賜楮幣千緡遣侄圖卜特穆爾驛送喪葬于懷三女長扎拉倫壻千户綽爾齊次珠溫智壻覃國公阿里封覃國夫人次托克托倫壻仲嘉努男孫八多爾濟世皇近侍有功北征察罕懷逺大將軍萬户圖卜特穆爾中憲大夫章佩太監托里察罕穆遜華善薩里未仕女孫七曽孫四皇慶改元冬十有二月詔臣敏中以公洎其父忠襄公子懿靖公耀珠之行皆銘于石從其子雅克特穆爾孫圖卜特穆爾之請也臣既叙公乃銘銘曰制勝有智吹生有仁仁以勇濟勇以智神偉哉柱國斯道其遵入襄過郢厥績日新龍韜豹略感㑹風雲揮斥敓漢鄂之渡咄嗟摧孫夏之軍大師帷幄公多對陳蓋無愧乎古先良將之倫折衝猘寇笑談尊爼按堵遺氓道路鼓舞生而有祠惟民之期殁而有諡匪公之私三世胙溫大邦賜履子能叶父孫亦襲子曠古幾人恩榮若此太行之陽黃河之湄大書穹珉趺龜首螭過者式之兹惟平章柱國恭惠公之碑敕賜輔國上將軍大宗正府伊克札爾古齊贈榮祿大夫平章政事溫國公諡懿靖薩木丹公神道碑皇慶初元嵗壬子冬十有二月大司農卿臣穆爾托噶王某參議布哈等奏章佩大監臣圖卜特穆爾洎叔吏部郎中雅克特穆爾言臣故曽大父大父父三世躬矢石服勞樹功制贈官勳爵諡恤典崇飾備至竊惟太常景鍾旌紀之義當勒石垂示永久上可詔臣敏中製銘自上二世敏中既托實濡翰謹按大宗正平章公事狀公諱耀珠薩木丹氏益郡行省贈推忠宣力功臣金紫光祿大夫太尉上柱國沙札該之孫福建宣尉使贈榮祿大夫平章柱國丹達里之子資朗慧沉毅有志略蚤侍宫闈至元戊辰考柱國經武大將軍拓疆南土母溫國夫人啓請公侍柱國以行凡築長圍破樊舉襄踰郢出漢水攻陽邏大江之捷蕩蘄冦蹂常拔浙諸城柱國所至公亦必至柱國策勳公亦有勳十七年大頒爵酬功公膺武略將軍上千户之命柱國薨以昭勇大將軍虎符萬户襲官本軍尋荷玊音慰諭爾祖沙札該事太祖征迪延回鶻唐古以及山東覃懷勤勞我家爾父丹達里佐巴延阿珠克襄舉宋功出人右爾惟胄嗣任父官為宜即授鎮國上將軍福建道宣尉使管軍萬户時江表初附多反側公率兵弭亂靖民卓有令聞更制改懷孟萬户府達嚕噶齊鎮國虎符仍前移守建德白馬洞冦擁萬衆以亂公討平戮其首惡脅從悉縱歸明歲婺陽振龍劫掠鄉邑橫甚公慮冦滋不可遏即出兵擒捕民賴以安㑹杭省責以擅征公直之以理弗屈竟不能罪二十七年處婺盜作偕平章史公平之原釋自新者以萬計二十九年髙參省入覲奏勞績有㫖耀珠朕所知即授輔國上將軍征行左軍元帥擢右軍在建德十年律下嚴無一卒橫恣民懷其惠天德二年丐老長子察罕襲職家食覃懷葺圃舍作菟裘計展優遊之樂七年召授大宗正府伊克札爾古齊抑邪植正宗親化之至大戊申十月七日以疾薨于官壽年五十有八上命其子圖卜特穆爾驛送喪于懷以禮葬焉辛亥上功贈榮祿大夫平章政事溫國公諡懿靖夫人實里巴封溫國夫人次室徹辰五男長察罕懷逺大將軍襲職萬户在官多異政使憲纍聞于朝妻夫人素格次即圖卜特穆爾中憲大夫章佩大監以謹厚明敏夙被知遇妻賈氏某官之女次托里察罕次穆遜次華善皆未仕五女托和朗壻安定千户徹徹爾罕壻沙喇亷訪使托克托鼐壻巴延布哈觀壽托摩掄未行銘曰將不三世孰云其然猗薩木丹氏益大以綿太尉金紫柱國榮祿洎大宗正上公維續是知以殺止殺有開必先太尉戕足且懷民之活柱國忘身竟襄城之全宗正勦擾攘之浙冦亦嘗宥脅從之億千當操戈援枹擁衆之際實存亡生殺司命之權陳師鞠旅惟仁為賢盛德百世薩木丹氏有焉世德謂何啓後迪前旌忠表勳豐碑是鐫重光流裕奚千萬年中菴集卷十五
