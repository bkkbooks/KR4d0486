body:
  text: 中庵集卷十元劉敏中撰題跋題趙氏族譜後傳曰萬物本乎天人本乎祖又曰君子以類族辨物於是有氏族之學焉所以明系統表疏戚殊貴賤别同異也故古者士夫之家莫不有譜及其世數之乆而譜之存亡廢興又有幸不幸者存乎其間兵荒水火之不虞子孫賢否之不常或燼墜而莫追或廢絶而弗續至有祖禰而上不可知支屬之别無所考者徃徃而是斯其不幸也可勝嘆哉今觀趙氏之譜自太師衛國公而下克敬中山君而上紀十有三代之逺厯三百餘年之乆既以無虞於兵荒水火之變而其寳藏而嗣修者實有頼於子孫之多賢而世濟也何其幸哉而中山君方特達若是子弟文秀繼出譜之傳蓋未艾也嗚呼去古益逺矣言氏族者益罕矣得見如趙氏者其可敬也夫劉某題題費尹傅巖卿孝感詩卷友人王平江伯儀歸自費言費尹傅君巖卿有孝行大徳丙午為安丘簿以仲春三日具三獻禮祀其先考於寢方設雨大至執事者皆憂惶巖卿獨盛服拱立以竢將事之際雨遽止俄而星漢爛然禮竟以成士夫聞之者咸以為孝感之應播之歌詩乃以歌詩示余且曰吾子可無一言於此乎嗚呼天人之相通乆矣善惡各以類至昭昭也故君子畏天或曰天之道逺善惡之來咸其偶然耳故小人不知畏天畏天者日以善感而善亦恒應之不知畏天者日以惡感而惡亦恒應之是之謂以類至者也然而善亦有時乎不遇善而得惡不善者亦有時乎免於惡而獲善是之謂偶然者也以類至者常也偶然者變也其常可知也其變不可知也不以不可知者誣其可知者惟君子為然是故君子務盡其在已者不計其在天者以是言之則傅君孝感之所在為可知也已播之歌詩宜矣吾且可以無言乎哉乃書以授伯儀以遺傅君焉至大己酉重陽中庵劉某書於繡江野亭書任氏三樂堂記後任君子善示余三樂堂記徴余言惟人子愛親之心一也愛無盡而天不可期故具慶者恒難古人言人生七十者稀洪範以康寧為五福故夀而康寧者亦恒難具慶矣壽而康寧矣而或昆季相戾而且貧賤則養不足故得養者又恒難於此三者或足其二而闕其一或有其一而乏其二盖比比焉吁其難哉今使去其所難而三者脗然皆備樂乎不樂乎君之父母皆年垂九十而神明不少衰昆季四人名宦俱達承顔養志孝友優優然三樂備矣其以命堂也宜哉傳云積善之家必有餘慶夫世之所難者一旦而備焉兹非餘慶乎嘻慶以善得故養慶莫如善任君其以君之昆季孝友傳之君之子姪若孫俾世守之以益其善則所謂慶且樂者當無時而已也書邵知事餞行詩卷後濟南郡治之東百里繡江之湄余别墅在焉大徳甲辰余有西臺之命而病不果行屏居繡江漠然與世隔獨聞郡幕有知事邵君文卿者聲藉藉然乙巳既臘余被召過濟南見邵君坦夷温郁而意甚謹余留一宿而北欵曲未暇也今年邵君赴調京師以其大尹東平瓠山王公僉憲廣平趙子温所贈序引詩什見示徴余言余謂邵君瓠山曩居内翰兼史職史筆無妄書子温簽外臺為執法執法無妄與二公皆謂君練事強力勤恪清慎贊佐有成則余之聞於繡江者為可驗矣二公之言可以信後世况吾人乎况有司乎吾見吾子之通達變化由今而後有不可量者雖然保其既徃而迓其方來礪其已能而謹其未試以無負二公之知者在吾子加力余復奚言哉丙午十一月既望書題金監司餞行卷後大徳丙午之春朝廷更化黜姦登賢於是平陽監郡金公通議入叅議中書時余方承乏集賢預議事之列見公坦然温郁綽有餘裕而其詳密慎静有不可及者其論事該而不繁簡而能周無害畏無名倖援本窮末必歸諸是而已余竊嘆曰偉人也哉集賢司直劉君仲傑其舊識也一日持平陽士民餞公篇什邀余題余得其為政之大者曰獄平而瑞雪降學勸而習俗革安地震之變而民生復完輟歸塟之議而王事是急去之日民無逺近旄倪攀留號呼嗟泣先後不絶如去慈父母余復嘆曰中書之議本乎此哉㑹聖天子龍飛繼極整飭内外乃叅知政事行省江西而江西方以饑告余又嘆曰公之此行其必闡中書之議擴平陽之政而活其人幸矣江西之人哉乃告仲傑曰夫升髙必自下有開必有先吾意天之所以任公者不獨為江西幸將為天下幸也然則清風遄歸之誦慶有日矣遂書於平陽卷末因為公贈丁未十月日題題杜東臯榆次詩卷後去年春余歸自京師居繡江之野屬嵗饑民閭蕭然余甚恐已而聞吾邑陽丘令李君惟肅梁鄒令完顔君澤卿長山令孟君仲賢淄川令田君真卿齊東令杜君濟川凡五縣令境相接相軋而譽相埒也察其為治雖其户庭蹊隧出入之不同而其大歸皆以廉勤勵已以忠利濟衆耳余私喜曰夫若是民有頼矣奚恐其四人者皆余舊知而杜君則未之識也一日杜君介其客張直卿過余容貌嶷然進退鬱然叩之語辭約而意誠殆古之所謂悃愊無華者為加禮焉君去直卿言吾令前為榆次有惠政民愛之不忘形於篇什乃以示余余曰嘻偉哉東臯之譽盖不可誣余足以識杜君矣因以一言告之古者君子之仕也曰吾以行吾志也官資之崇庳禄廩之厚薄吾庸知乎哉吾知吾所職而已是以官修而志行名立而身顯君今為東臯猶榆次也官修而志行矣可以進大官可以自立可以成名後世不朽雖然傳有之病加于小愈官怠于宦成願勉旃以無忘為縣令之日可也至大二年己酉清明後三日書題道者張明徳忍齋江左張明徳早歲失故業著道士服遊中州遇𤣥逸真人於京師𤣥逸方以老氏之法𢎞天下見明徳悦焉乃以忍命其齋明徳欣然受之以求言於諸公諸公固以為老氏之徒也予惟忍之為義有所弗堪而安之云耳老氏之法以虚無為歸自然為宗宜無所事忍然其徒者其習必去父母棄妻子離逖人境剗刮世慮遺形而居丐食以遊甚者入窮山幽谷冒虎狼蹈虺蛇與魑魅魍魉爭勝負齧草木以活凡寒饑恐怖愁苦詬辱人所不堪者皆備嘗而厯試過此然後庶幾可以求其所謂虚無自然者夫如是舍忍奚可𤣥逸之所以命豈以此耶然吾聞明徳本儒者雖其迹若此而於治吾術益專以其能教授以自給凡儒行益修顧獨未暇為老氏法也然則𤣥逸之所命者彼奚而取焉盖其窮達得失彼此異同變而不常者跡也其炳然常存而不可易者吾之道也君子不以跡而病夫道不得已寓之而已耳明徳之跡其亦寓之然乎則其所以忍之為取者晦而有待耳嘻若然者為老氏之徒歟孔氏之徒歟劉某題題法帖或者以章草起於漢章帝晉宋而下帝王徃徃能書至唐文皇與𤣥宗古法猶存其臣下在後漢則崔蔡開其端魏晉則鍾王擅其美李唐則歐虞精其能逮有宋淳化間集為十卷刻之祕閣臣下登二府者賜之間有出鎮者刻於州廟故有汝帖絳帖潭帖大觀間又有閣帖其潭帖係僧希白所模世謂最得其真今於陽煦門前民家發堀出石本十卷上有希模字驗得係與潭帖相同跋山東憲副王成甫所藏歐陽文忠公簡韓持國學士帖六一翁文章事業重于千古今覩字帖猶崑山片玉光價叵測可不謹藏櫝中邪題東坡喻荔支似江瑤柱帖東坡云僕嘗問人荔支何所似或曰荔支似圓眼坐客皆笑其荔支實無所似也僕言荔支似江瑶柱應者皆憮然僕亦不辨也昨日見畢仲游偶問杜甫似何人仲游云似司馬遷僕喜而不言蓋與曩言㑹也物固有類同而異類異而同者在人亦然若知其異同之所在惟識逺意得而達於理者能之東坡荔支江瑤之說子美子長之喻夫何疑公之書傑然自為一家徐校之諸家之善偹所謂識遠意得而達於理者斯又可以見矣題山谷帖凡技必學而能然非有天得之性雖終身學不能觀山谷此書盖率爾所出字僅三十餘縱橫變怪使人眩惑若不可測徐而察之規䋲脉絡皆不失其正而盡其妙非其天得能至於爾耶覽者以是求之可知也題山谷發願帖後伯航子文持山谷所書發願文徴言余謂字書無常體而有常理理者妙之寄也苟得其理而達乎妙則體無不善否則非體矣山谷之書筆勢瑰異卓然自為一家而與大蘓老米並驅爭先誠得其理而達妙者也然其書多贋本如此幅者絶少子文寳惜之子文雅嗜書故云大徳丁未三月既望題題山谷帖後書一藝耳苟學者皆能之然求其得法而盡其變化卓然有成以自立於世者盖百年之間僅不過三數人而已諸帖之行於今者可考也吁書亦難成矣哉今觀山谷此帖浩乎如行雲倐乎如流電如驚蛇如游龍意態橫出不主故常當使人心動目眩而莫知其然也静而察之無一畫之違於理嗚呼可謂能盡草書之變矣雖然非其胷中貫之以天下之書而充之以浩然之氣則亦安能至於是哉世之工書者嘗試以是思之至元乙酉六月朔題題蘭臺宫圖後凡畫宫室既極其雄傑壯觀形似之妙其表裏上下楹宇户堦曲折盈縮之度必皆與凖䋲合所畫雖甚小一一較之與巨構無異故比他畫為尤難昔尹繼昭郭忠恕號稱㝡工爾後罕及焉陽丘閻信道示予楚蘭臺宫圖觀其布置整嚴筆意精緻雖不能必其主名知其為近時佳筆得法者也旁有細字書宋玉風賦凡四百五十餘言方不及寸許尤為妙絶然恐是一手信道宜珍藏之至大己酉四月既望中庵題跋趙子昻畫馬圖凡畫神為本形似其末也本勝而末不足猶不失為畫苟善其末而遺其本非畫矣二者必兼得而後可以盡其妙觀子昻之畫馬信其為兼得者歟原注延祐丁巳之春三月中旬八日中庵集卷十
