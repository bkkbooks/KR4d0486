body:
  text: 中庵集卷四元劉敏中撰七言律詩代送宋廷秀員外妙年勳策不易得今日省闈君最優兩鬢春風山映秀一襟清氣水涵秋雲煙總屬坡仙筆魚鳥難留李白舟此去應將便民策皂囊封上解宸憂送韓御史彥髙賑恤西域仍用安思承御史韻好語飛傳迓使旌逺人先已動歡聲馬頭白草迷邉雪夢裏丹心繞帝京壯嵗勳勞君自得浮雲富貴世空驚歸期儘擬明年早從此金鑾識姓名至元丙子初赴上都赤城至望雲道中曉日曈曨過赤城原注地名有驛亭風煙遙接望雲亭原注亭名州事在焉亦名云亭好山解要新詩寫瘦馬能搖宿酒醒髙下野桃紅漫漫縈回沙水碧泠泠人家剩有升平象滿地牛羊草色青十三年秋次韻答友人余時掾西曹西曹事罷獨登樓塵慮紛紛更暮愁鄉國别來如昨日京華旅食又今秋簾垂夜雨寒燈細門掩西風落葉稠翠袖金鞭五花馬可能間伴謫仙逰清風白酒香滿樓我酌與子澆間愁西風遼海一片雪落日太行千仞秋達人自與衆人異俗事常兼官事稠安得談天漆園叟相期造物與同逰霍主事清甫留宿上都宣徽後亭是夜覔酒不得窈窕軒忩淨客心愛公朝市有山林清風急雨傳秋早淡月微雲覺夜深一榻清歡非宿約百年情話入幽吟幾時有酒來呼我剩與燈前細細斟為茅屋解嘲昌黎辛苦三十載始見京師有屋廬莫笑偏聫四簷草且圖容蓋一牀書寒叨暑虐應無慮坐誦眠吟已有餘明月不知分醜好一般清影照庭除東村寓興野水平坡數點鷗逺村髙樹一聲鳩出墻白簇蠶初老滿地黃雲麥已秋文舉自宜官北海淵明只合事西疇行藏了屬乾坤管一笑誰能獨倚樓冬至和彥博原注二十六年京師作僻巷無人載酒過小忩燈火自婆娑睡方到眼夢還短事不如心愁更多官栁野梅春欲動長庚殘月夜如何書雲定有豐年兆願學田翁擊壤歌送按察僉事趙國寶分司淄青名髙氷蘖湖南幕人避風霜憲府驄原注國寶先為湖南道經歷擢監察御史嘗前論事有不畏強禦之風論列不違天咫尺澄清還到海西東物情可見分休戚吏治難平是異同飢渴疲癃正翹首可能離别惜忽忽樂御史鴈塔題名接泰和聲華此日較誰多鐡冠獨立風霜表竹馬猶傳父母歌自薦英才歸大老肯容濁水亂清波神遊一去尋無迹惟見荒丘蔓薜蘿留别杜醉經侍御原注公到官不數日而某得請自京還濟南二十七年也侍御新班趨北闕野夫行李向南州清談不得一樽共苦雨空為三日留濟水波聲驚客夢太行山色動髙秋他時驛使如相問翠竹籬傍有白鷗呈杜侍御時余為臺掾一入霜臺白髮生且看如此欲何成四知自守神應鑒三語雖賢衆所輕月旦有評甘下客雪霄無路接羣英便須及此春前後歸買山田趂雨耕夀髙提學酒酣落筆寫新詩氣節依然年少時渭水久疏垂釣侣原注公年八十有六鏡湖新得放生池原注時上司始以大明湖為府學贍養地故有是句國人矜式尊黃髮後學服膺肅絳帷夀考康寧是天意祗應吾道要扶持吳興卜德甫自江左平失母求之四方過濟南以詩投余次其韻孝心行李兩艱難風雪長途海岱間一自亂隨青蓋出孤飛不見白雲間窮年淚盡三江水旅枕魂驚萬里山早晚春風舊桑梓肩輿重喜夀昌還次韻答鮮于伯幾見寄舞雩春暖記同逰一逐風塵各異州白髮青燈千里夢楚雲燕樹十年秋淵明寂寞惟栽菊杜甫飄零漫倚樓休為長吟廢沈醉只今懷抱不禁愁次韻答子昂見示三首自許羲皇逺俗情爭教光價重連城一官何異湖中隱三絶休辭海內名墜典遺音知有望明堂巨搆欲誰成不才愧我終無益白髮蕭蕭日夜生肯過窮簷愧素情可堪風雪對寒城東藩自合髙軒駐北渚慚非處士名山鬼來聽七絃作邦人傳誦一詩成沙鷗也要公相識只待眀年春水生遺情應未到忘情猶愛幽居僻近城夜夢是因寧有説太初生物果誰名人間白髮何年種世外丹砂幾日成獨自無言搔首坐篆煙銷盡暮寒生答趙明叔見寄耕有田園織有桑西臯遙接玉輝堂原注公新作此堂於長清牙籖濶展藏書架碧甃方開洗硯塘此老誰能測髙趣我曹何幸挹餘光近來聞説多竒釀幾日容教細細嘗次韻答衛山齋見寄有序表兄繡江公歸自華亭具言山齋先生之學之德之盛為之竦然徐示先生辱貺五詩及學易管見一編詩則深濶雄麗辭達而情稱博雅之言也管見則以象數明其體而達乎理變互伏肖竒正極其用而會於一易之藴盡矣嘻學成而人不知君子不為病玄經隱乎哉謹取五詩首篇韻述答萬一諒不以簡略罪故人説子我書空又見詩文有是公地拔孤峯衆山下源開一水四溟通雄章此日詩聲北古學何年易道東尚友猶須論千載相望何計馬牛風湯泉詩錦州之治西南百六十里海邉有廢城如塊今謂之桃花島吏民數十家巡檢司在焉出北門少東城足再舉武平地湯泉湧出西東凡三池相去丈餘而西池獨盛石甃八角輪廣僅三丈泉出如貫珠然流而常盈人云天下如此泉者蓋多恐不至是烈也常投生臠試之須臾可食近池西北為屋屋中為木池連石渠引水以浴非濟以他水則指不可下屋背即臣河深澗流泉暨浴水泄焉河自北來至泉所折而東逝亦名湯河因泉也余頃年為風瘙所苦諸藥莫驗或言得湯泉浴之當已求之未暇也大德癸卯春以奉使宣撫山北遼東道六月至廣寧所苦復作未幾遇是泉甚喜會百姓訴水害乞食為料理留數日凡三浴而去比再浴疾已失矣嗚呼誠有德哉乃作詩書呈同浴奉使達實公郎中蘇君彥輝韓從義張禮卿兩外郎以無忘泉德且以貽巡檢房中使時修之不致居人過客他日有汚廢不治之歎亦無窮之利也房資幹敏吾言當不負云是月望後五日濟南劉中庵題地底誰將土鑊然靈源一沸自何年引來餘暖心仍畏滌去沈痾骨欲仙日浴滄溟暗通氣舟焚赤壁悄無煙厥初若得京城出九市蘭湯不值錢奉朝命釋囚東山暨提刑霍君清浦同登登州蓬萊閣半夜潮聲撼客床起瞻紅日上扶桑一天雲景相明滅萬古仙山隔渺茫海市不償詩眼債驛塵空點鬢毛蒼且乘萬里長風底捲取滄浪共此觴何右丞夀日兩朝恩禮未應疏四海勳名不自居倚重今方在元老雍容時一到中書黃封敕酒詩成後寶篆凝香客散餘閲盡羣言無可讀却從三畫究盈虛原注公博極羣書於易尤邃自先朝以右丞商量中書省事上都答耶律梅軒左丞見贈參戎初識文昌府衣繡重逢海岱邦尚記春波送南浦不忘明月上東窗相門出相人空羡家學承家世可雙遺我新詩慰牢落他時何處話灤江原注昔與公同事兵曹嘗有明月上東窗十詩頗當公意後每見公輒誦之海岱邦謂公提刑山東治吾州濟南時也公中書湛然之孫左丞相雙溪之子博學多能尤長於詩時行省髙麗至也是來朝會于上都故有是詩灤江上都水名送楊彥寬廉訪致仕歸黎邱原注君行四方志其山川風土為書藏於室號四逺堂云早年鞍馬事弓刀晚節風霜凜俊髦四逺向來名已重一間今去迹尤髙老當益壯真吾事存不知亡豈若曹想得鄉鄰候居處黃華白酒滿東臯原注時大德丙午秋九月也趙方塘挽章原注方塘諱與栗宋宗室也台州黃巖人江南始平以徴至闕下奏對切直稱旨授翰林待制遷直學士後為直學士嘉議大夫年六十二卒於官始終凡三十年歸葬黃巖塔山之原冠蓋當年起隱淪混同南北靜風塵一飛雲路九千里終老玉堂三十春德比圭璋能取貴言如藥石不醫貧魂兮剩有歸鄉樂夜赴黃巖月色新韓雲卿新居有序濼水上有樓曰江山勝槩樓下有泉曰無憂雲卿居有之吾又安得無言乎哉我愛西城韓御史新居樂事總相宜泉中就啜無憂水樓上間吟勝槩詩紅燭瑣忩秋晚後蒼山老樹雨晴時向來一念無人識説與沙頭白鳥知由湖亭泛舟扺華峰下作南洲未了北洲映東水乍分西水流不盡草花隨逺近相忘魚鳥自沈浮儒冠誰識蹉跎意杯酒真成笑傲逰日夕山風吹醉醒雪濤和月撼歸舟次某參議韻小院幽花晚自芳逺簷髙樹弄微涼深杯病後十分淺短髮秋來千丈長幾日夢魚占嵗稔當時騎馬趂人忙荷香不斷山如畫濼水源頭是我鄉恩州東陽驛廰壁有王黃華詩石刻用其韻悠悠馬首幾時東坐食官庖底計功失得豈逃當世論行藏終愧古人風十年往事驚秋鬢半夜微吟答候蟲遙憶草堂溪上路緑蓑煙雨正濛濛次郭安道韻二首城中無處避炎蒸雲水招邀别有朋移我繩床近髙竹脫君紗帽挂寒藤心便靜域全消酒齒冷新詩不嚼氷一朵芙蕖如雪白莫教容易點青蠅往年朝紱曳宫羅此日江村買釣蓑禪榻鬢絲人事少竹梢蓮葉雨聲多文章豈有潛夫筆嵗月空驚織女梭聞説今秋足豐稔作詩傳與老農歌苟正甫由監察御史出為南道勸農副使乘驛輦母還鄉作詩送之得失窮通豈偶然看君事業識君賢揮鞭蜀險三千里懷節江壖十六年歸路正當新雨後負輿還在使車前官銜未要嗟間冷忠孝天教此日全溪塘納涼二首晚天涼日淡籠雲髙栁清風便可人蓬蓽略無黃閣夢煙波舊與白鷗鄰松花影落圍棊局桂葉香飄漉酒巾憶著功名仰天笑幾多裘馬走紅塵平湖微雨落輕雲探做新涼借與人僻地蕙蘭芳自好空山猿鶴淡無鄰草堂甫舍忘言樂蓬髮何妨墊角巾莫便佯狂出門去門前蜀道滿風塵五言長律詩大舅魏知事夀畢萬初興晉穰侯復相秦蕃昌知有繼業履見彌新既學方從仕昭先務檢身才猷何藹藹文質更彬彬竭力扶公室推恩及國人典型資潤色政化賴經綸素厲松筠操端為社稷臣江陾識威武天闕達忠純餘慶歸蘭玉髙門踵鳳麟誕辰今日遇和氣一家春赫赫光華盛綿綿福祿臻只應忩下樹從此賀莊椿律詩二十六韻夀智先生積善家傳久違仁利靡貪肯堂真有力行道復無慚美秀人難並清純性雅妉瑶林春照日璧月夜明潭古學期終制前猷每細參多才追屈宋博物儷僑郯魑魅降嘲弄乾坤入討探銀鈎飛草聖玉麈亹清談對客開琴匣揮杯撫劍鐔英聲初外播茂實久中函昔在監司辟名非記室堪壯懷元落落衆目已耽耽情偽何勞識艱難亦備諳勇辭新仕版喜對舊書龕鑿徑疏清泚開軒納翠嵐幽蘭香馥馥修竹舞毿毿尚志希龍鳳何心顧雀䳺聖朝更化美遐域湛恩覃冠蓋詢遺逸山林起負擔鴛行思拱北鵬翼看圖南祿必鍾論萬榮須日接三子方秋介夀我有酒盈甔薄獻庸非敬多言實匪甘川流雖學海青出敢忘藍窮達聊雙遣歌呼共一酣異時能事畢携手訪彭聃中庵集卷四
