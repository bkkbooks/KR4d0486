body:
  text: 提要中菴集二十卷别集類四元臣等謹案中菴集二十卷元劉敏中撰敏中字端甫章邱人由中書掾歴官至翰林學士承㫖卒追封齊國公謚文簡事迹具元史本傳史載敏中中菴集二十五卷文淵閣書目作五冊不著卷數梁維樞内閣書目不載其名則是時官書已佚明人藏書之家惟葉盛菉竹堂書目僅著于録亦無卷數黄虞稷千頃堂書目雖有其名而獨作三十五卷與史不符盖虞稷所列諸書乃徧徴各家書目為之多未親見其本故卷數多訛存佚不確未可盡援為據也蘓天爵元文類中僅載其賀正旦表忠獻王廟碑二首其他作則不槩見今從永樂大典所載蒐羅裒輯以類編次尚可得二十卷則所佚者不過十之二三矣其詩文率平正通達無鈎章棘句之習在元人中亦元明善馬祖常之亞本傳稱其文理明辭備韓性原序亦謂其不藻繢而華不琢鏤而工户樞門鍵庭旅陛列進乎古人之作固不誣也史稱敏中為御史時劾權臣僧格為集賢學士時上書陳十事其文今皆不見集中殆已散佚集中有星變奏議皇慶改元奏議則為本傳所未及盖史佚之其金石之文如巴延廟碑哈喇哈斯沙扎該丹達爾耀珠布哈爾李唐諸神道碑記大智全寺碑罔極寺碑皆承詔撰述之作今考元史哈喇哈斯傳即用敏中所撰墓碑然不載其在宗正時從世皇北廵猝遇亂突出破敵事又不載其在中書省時每退食延見四方賔使訪以物情得失吏治否臧人材顯晦年榖豐歉采可行行之數語又度地置兩倉句兩字訛為内字沙扎該傳亦用敏中碑而其子丹達爾諭降襄陽取漢口破婺賊功不在沙扎該下而沙扎該傳末乃僅附其子昻阿喇名無一語及丹達爾事尤為舛漏盖元史倉猝成書疎脱實多不但重複割裂如顧炎武所譏則是集之存併可以訂史傳之訛異不徒貴其文章矣乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀原序聲音與政通而文詞者聲之寓也不觀夫大化之流行哉一元所寓衆彚有得色激者為霆散者為風騫者植者舒者吸者柔且縵者若金奏若萬鼓振而餘烏烏聲萬不同其生物一也春出而發之三時奉而成之嵗功以植元化以行然其機之發矢躍而輪運目不得瞬尚可摶而執之哉於是神瞽度律均鐘則其自然而寓之於數贊陽出滯修絜萬物始乎宇宙之間而伶倫之儔因之而不泯可謂盛矣若昔剏業之君體元出治千載之下洋洋乎如倡而復歎之不足非有寓扵文辭之間哉國家肇造區夏世祖皇帝昭顯文治若嵗之陽協風自應當是時􅋵觚簡奏技仗内者皆天下士所為文詞皆足以荅鈞天之球而譜雲和之奏後世歎息瞻仰以為不可及其乗風雲而流聲實者固已衆矣中庵劉公以文學受簡知致身通顯朝廷典册鉅公銘誄所著為多而集蔵扵家學者願見而不可得總管魏公公子壻也將刋以傳扵代余觀公之文不藻繢而華不琢鏤而工不屈折條榦而扶疎茂好户樞門鍵庭旅陛列進乎古人之作矣其所紀載足以裨太史之闕傳之後學傳誦玩繹得以審中和之聲而窺聖人徳化之盛教思無窮非其他别集所可擬也魏公俾性為之叙辭不獲謹誦所聞附扵篇端年月日韓性序
