body:
  text: 中庵集卷五元劉敏中撰五言絶句詩題盤谷圖何地求真樂歸盤樂未央潮陽應悵望不得共徜徉口號竹外花連屋溪邊栁映門㸔山無俗客邀月有芳樽海棠睡起怪猶懶沉香亭上時還憐玉蝴蝶香夣繞華枝王克紹所藏畵馬四幅書其上四首馳齧爭相先超忽戯兩龍君㸔盈尺紙上有千里風二駿馴一奚乘引不敢怒應欲天池回入備六龍馭一馬蹲欲卧意就一馬􅕁一馬顧且前所適同所願當年馳征戰汗血傷駿骨如今華山陽滿地春草碧題四皓圖上山白雲間下山紅塵裏天意方祚漢寧得辭一起干戈與賔客其用等安劉為問平勃功得似文成優梅蕭然林下姿獨伴山月冷無人踏雪去臨水㸔踈影題招隐亭詩成山花發琴弄𤣥鶴舞昨宵松酒熟一醉醒過午題少陵醉歸圖宗武扶醉眠宗文引羸蹇花栁暗草堂日落江橋逺題牧牛圖悲歌飯牛客歌苦牛亦飢愛此牧䜿兒無愁與牛嬉題畵馬鴻鵠摶霄漢蜩鳩狎草萊今㸔兩騏驥一洗萬駑駘題寒江獨釣圖江寒魚不食雪𦂳天欲暮蓑笠一絲風知音杳何處題陶潛歸來圖扇頭擕來萬里風踏破一輪月見公歸時興滌我千年熱題白雲扇頭原注為縣尹李公惟肅作白雲起山足無意自往還更羨山中人長伴白雲閒雲白山逾青茅屋松桂底幽絶何處境恍墮眀月裏題張生花牋扇頭屋顛樹亭亭屋下石礧礧門外蓑笠翁扁舟弄煙水紙上已有畵扇頭可無詩詩畫皆自然清風豈吾私七言絶句詩題杜孝卿所藏金顯宗手書甚哉孝之大也六大字卷孝無終始乃天倫貴在王家必有尊六字真書初率爾豈知遺訓付皇孫原注顯宗世宗子章宗之父也後以病不得立而章嗣焉小兒擊甕圖司馬公㓜與羣兒戯一兒墜大甕中羣兒驚遽公獨取石破其甕兒得免兒墜何知甕水深驚惶莫救亂青衿嚗然一擊兒無恙已見當朝拯溺心智無長㓜見臨時擊甕成仁一小兒却憶神州陸沉日清談諸老獨何為題孫氏恒齋卷倚伏紛更事已多恒齋柰此不恒何瞿塘怒激三千仭不害平流赴海波韓義和衞人國初為左右司貟外郎有才謀奏對嘗稱㫖俄棄家為道士自號逍遥子集諸驗方傳於世其姪徳旻為作歸隠圖求詩英才已許致時康勇退求仙亦異常猶覬醫方能濟世本來一念果難忘鄄城陳景新賑饑散千石得官不受入粟除官聞自古况於周急活斯民一輸千石辭官去今古如君得㡬人題最樂堂卷後最樂堂李鶴鳴名俊民趙江漢名復各有記元遺山有銘因為之詩鶴鳴江漢遺山筆寫盡筠溪最樂心寂寞髙風百年後令人興感一何深書楊庸齋挽章後四首徳業文章與嵗深郢人斤斧伯牙琴泰山北斗當時望賸馥殘膏此日心都言好客似田文未必田文得似君狗盜雞鳴非我用久將富貴等浮雲原注先生雅好客時人因為之號曰秀才孟嘗君正襟危坐謝塵縁脱去遺骸傳舍然世上誰能了生死㸔公如此豈非仙原注先生没時坐解故云當時膝上王文度才望如今第一流八表神遊老居士應騎白鶴過東州原注先生之子朝舜名遇字畫詩文皆佳名動一時時為濟南路判官書嘉善録後原注燕人李威卿集刑書四十卷名之曰嘉善錄李時為大都路推官細讀李君嘉善録可知虞舜恤刑書千條萬例終歸約一語欽哉用有餘孝婦詩孝婦布薩氏千夫長安西靖偉節之妻也夫死塟神禾原先塋其子良襲爵在戍塋垣圮婦取河壖石為垣周百丈素嵓賈賁為記來徴言書其後大徳六年壬寅族出華腴慶有源只今淑徳在髙門神禾最愛週遭石千載人傳孝婦垣題柴君正所畫江山春曉圖春曉江烟浩不收參差翠阜接重樓披圖喚起江南興誰具山隂萬里舟江浙釋總統雪嵓名沙喇卜西蕃人讀儒書喜與吾屬㳺嘗以名香㑹王秋澗傳初庵雷苦齋賈頤軒閻靖軒五老號清香㑹四老賦詩秋澗作序大徳辛丑由杭來京師將往秦凉二州葺其師塔臨行㑹諸公於君逵之家予始識焉求詩為書二絶句吴越名山已遍㝷秦凉孤塔動歸心乾坤萬里如來海却向詩人覔賞音飛錫臨將逺入秦囬頭一笑更情親定知許我歸來日也作清香㑹裏人元氏王仲賢先壟在滎澤廣武山之陽壬辰亂其兆域為有力者所有仲賢追訪辨訟盡復其舊諸公作詩美之韓從義為徴言書二詩於石遺老殷勤指舊阡孝心隕絶動高天侵田盡復當時域回首松楸一鬱然故壟還新祖考安中間經畫幾間闗遙知滎澤人能道孝行高於廣武山醴泉寺石溜淙淙出翠微層巒傑閣對巍巍不知寺自何年始老檜參天四十圍故鹽司提舉平陽徐進之妻邢氏事夫教子治家有法邢父亡迎其母養之終身為其弟娶妻生男使之成立詩以紀之盡全婦禮􅊚親禮都辦夫家父母家女子獨能到如此千年彤管有光華題商左山所書梁致逺字説後致逺乃左山同舎友故監察御史唐卿之子也始唐卿為御史未久以言不行而去人皆以是重之今左山以友舊之故名其子曰毅字曰致逺且云取論語士不可以不𢎞毅任重而道逺之義也嗚呼傳所謂忠焉能勿誨者其左山之心乎因題數字以勉之御史遺芳百世聞左山老筆萬金珎三言命爾平生了刮眼門風一再新題瘦馬圖俛首隨牽力不任隠然竒骨敵千金春風㑹綠平原草一振雲沙萬里心孝婦二絶孝婦者北京宋子正女也㓜有才行能詩適同郡張氏其姑寢疾衣不解帶四十餘日姑死攀柩長號一慟而絶明日與姑並柩塟焉時年十九嵗矣北京士人為作孝婦傳云才如蔡琰詩尤雅學若班昭義更深一慟從姑九泉下世間方識向來心私心既起不復公區區節義同一聾朝來忽見孝婦傳洒若執熱濯清風宣撫遼東歸至居庸闗遇雪聞酒禁開喜書暮春時節别長安臨到新春却入闗聞説城中酒如海不妨風雪送人還原注大徳癸夘十二月下旬崇真宫提㸃吳成季自號閑閑扁其居室曰氷雪相㸔以卷徴言為書三絶句閑閑誰道不閑閑身似蒼松耐嵗寒讀罷黄庭静無事一簾氷雪淡相㸔氷清雪白兩竒絶不救夜堂心内熱道人有道人不知暑天踏地皆氷雪氷雪䨇清自一奇洞然唯有此心知㑹經槁木寒灰起却在氷融雪釋時再題清都應不似人間玉草瑶林萬古寒説有飛仙無火食至今氷雪淡相㸔題南窻詩卷皇慶二年春京師作窈窕幽軒手自開百花都得向陽栽古人寄傲吾何敢且放雲山入坐來中庵集卷五
