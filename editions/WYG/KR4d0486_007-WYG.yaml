body:
  text: 中庵集卷七元劉敏中撰表天壽節賀表虛宿宵中正八月金行之氣斗樞電繞開萬年天子之祥凡屬生成咸知鼔舞恭惟陛下乘龍飛之景運嗣燕翼之洪圖乃聖乃神乃武乃文上帝有丕釐之命自西自東自南自北逺人無不服之思方且廓舜聰以納羣言敷禹勤而親庶政順宜適變執要御繁明同日月之照臨仁配乾坤之覆載恢制度而備綱紀述四朝列聖之心興禮樂而右詩書新一代太平之業漢室德隆之美適當此時周家刑措之功復見今日萬邦惟慶十載難逢方聖誕之載臨宜天休之滋至臣某等忝分使節出按侯藩觀九奏雲韶阻玉殿瑶觴之獻效三呼嵩岳均黄童白叟之懽又表下同心戴舜屬八方寧謐之時帝立子生商正萬寶収成之候頌聲並作協氣横流恭惟皇帝陛下睿智足臨權綱總攬治無先于戢亂故以武居外而文居中德莫大于好生故以教為本而刑為末穆然垂衣裳于九重之上巍乎収功烈于三代之前誕節載逢多福自至臣某等逢五百歲之昌期慚無少補上億萬年之聖壽庶達㣲誠中書省正旦賀表厯頒夏正大春秋一統之書禮謹漢儀受圖貢四方之賀歡均朝野慶洽天人欽惟皇帝陛下剛健體元寛仁育物董官常而敷聖訓炳照日月之臨恤民隱而降德音翕叶地天之泰至和斯應景福惟新臣某等夙被寵榮忝司端揆無尺寸效仰裨裁成輔相之功願億萬年永享伴奐優游之樂奏議星變奏議欽奉聖㫖以恒暘暴風星芒之變同御史臺集賢翰林院會議者切惟事有本末政有先後今摭其本與先者言之其畧有五一曰畏天二曰敬祖三曰清心四曰持體五曰更化具列于後一畏天天育萬物不能自理乃立君以主之故君者所以代天育萬物也惟明君能知天監在上赫赫甚邇凢一語動一政令罔不兢兢業業思合天則期當天心若論官則曰天命有德五服五章不敢乘一時之喜怒而輕予奪之也若論刑則曰天討有罪五刑五用不敢因一時之喜怒而輕出入之也凡事如此謹守勿失於是陰陽和風雨時而萬物育天相之也乃若政令之或爽天必出灾異以儆之而儆之者所以仁愛人君欲其乆安長治而萬物得其育也故明君遇此則必省躬以知懼昭德而塞違誠格政修天意乃得於是灾變弭而和氣復矣故雖堯湯之世不能無水旱而卒以無害者堯湯用此道也一敬祖自古帝王創建國家無不自艱難而得之而傳之子孫猶菑者之望播穫作室者之待堂構也夫固不易哉我太祖皇帝起自朔方身歴百戰収附諸國惡衣菲食櫛風沐雨何如其辛勤也世祖皇帝親歴行陣心籌計畫恭儉敬畏以有天下混一南北何如其辛勤也欽惟陛下以仁明天縱之聖紹膺景命蓋嘗以此存心思祖宗開基建業之不易而遇是儆也因益兢兢業業用一財則必曰此民力也自祖宗艱難而得之也豈可輕用官一人則必曰此國柄也自祖宗艱難而致之也豈可輕與動靜整敕每事如此則百司自然共職庶政自然修舉祖宗在天之靈必皆歡恱而天祐響荅福禄日臻邦基益固矣一清心心者一身之主萬事之本也夫目之於視耳之於聽口之於言手之於執足之於履皆惟心之所使心得其正則接物臨事之際視聽言動皆得其正而無有繆悮乖戻之患况四海之廣萬㡬之㣲皆仰治于一人而一人之所仰者非此心乎蓋水必止乃可以􅇽物象鏡必明乃可以别妍醜故帝王貴清心清者靜一不遷之謂若聲色之娱宴飲之樂所不能無尤當節適使不至撓吾心之清心清則四海之廣無不燭萬幾之㣲無不察光明洞徹不言而信讒諛不得施邪偽不敢前百官有司皆安其職無有撓格之患則法制流行紀綱振舉灾變息而天下治矣語曰本立而道生故帝王以清心為本實總攬權綱之要道也一持體事莫不有體體者得其要之謂耳人君任宰輔以馭百官守法度以信萬民斯其體也若乃任一小官罰一小過有司之事耳而人君親之則有司懼矣夫上下正政令一賦歛以時用度有節賞罰必信此天下之守也而朝行夕改守無所止則臣下恐懼皆思為已而怠其所職殃害及民怨讟不免而或召灾異故為君之道在乎持大體先有司裁制予奪必信必一則雍熙之治可坐而致何灾異之有哉一更化傳有之琴瑟不調甚者必解而更張之為政不行甚者必變而更化之今有所甚患者曰財用不足曰選法撓亂曰官府不治三者而已改絃更張此其時也盍亦思其所由乎財用不足豈非所入者有限所出者無窮歟選法撓亂豈非賢不肖混淆越格者多而非格者不少歟官府不治豈非賞罰不明而名節素不勵歟宜敕有司詳較一歳錢穀所入幾何若所出皆為當出則財之不足將無法可理若猶有不當出而可以已者如不急之營繕無名之賜予據其名件一皆止之則財用必足矣又詳較銓選除合格外越格與非格者幾何任廻量其根脚功過定奪仍原其所由跡轍一禁絶之則選法必行矣官府之制上下内外相維相資各有條理果皆得人何有不治然人材不齊善惡必有故賞罰立焉若善者當賞而不賞惡者當罰而不罰則善者變而為惡而惡者狃而益甚又如犯至不赦大罪也而或巧圖復用老病謝事常理也或戀而不忍去至有貪欺害民善於自蔽不即敗露上官不以審風憲不以察因習成風不知有耻治何由興宜嚴敕省臺公賞罰勵名節由京朝始則官府自治矣凡此三者更化之畧也三者果更民力必紓人材必多祥瑞必集國勢必隆然非更之之難行之之難也非行之之難守之之難也惟聖天子以畏天敬祖清心之德守而行之又何難哉又二事竊聞今之議者皆曰實惠不能及民欽惟聖天子即位以來詔令頻下未嘗不以崇本抑末興利除害恤孤賑乏為務實惠至矣然且云爾者有司不能奉宣德意而有以格之耳其甚者有二事列于後一察吏治官府之設本以為民然而民弗蒙惠者豈非任職之人廉正者恒少而貪邪者恒多歟恒少者宜培植而反摧抑之歟恒多者宜簡除而反擁䕶之歟何以知其然也夫廉正者仰不能恱上官而復或忤也憾怒蓄矣俯不能媚奸民而又常戢之而怨憎積矣故舉一事則沮於上行一政則謗於下奸人乘釁猾吏授計扇黨搆誣譁然訟之蓄怒者得以折辱求索鍜煉而成其罪夫以搢紳廉正之士一旦屈膝受誣置對於無頼之小民縱萬一得觧而風槩掃地矣彼貪者於上則先意以希合於下則越禮以求媚贓賄狼藉未至敗露憲司上司佯為不知安然秩滿給由而去乃且奔走權要徼取優等擇授美官是廉正者少而益少貪邪者多而益多也嗚呼所謂實惠者將孰從而致之哉夫源清則流清本治則末治宜端本澄源特發嚴令戒敕内外官吏皆當洗心易慮奉公為民所在憲司及上司衙門毋敢抑正容奸務要精詳察舉其治行超衆者増秩賜金如漢世故事貪鄙尤甚者黜竄不齒憲司或失察舉亦行論罪如是良吏日多奸吏日少官府立而政化行惠及民而灾變息矣一除民患公家百須皆民所出取之有法民不知病今夫夏絲秋稅乃其常賦和買和雇官皆給價宜無所病者然和買和雇名件不一駢至疊出責辦須臾故和買必至望户科著貪吏憸人得縁為姦易新鈔為爛鈔者有之給價撙除者有之繆指其物惡賂焉而受者有之預嚇以多買而取賂者有之受賂當買之户而移之下户者有之又有追呼停留費用過當民不勝擾矣其和雇則十車之運而為百車之雇有車之家合境追攝必賂而後免故和買和雇姦民之利而細民之病也今後一切和買和雇憲司必須密為體察仍許諸人首告似前犯者痛行追斷監臨有失防禁罰俸標過甚者降等憲司不察同坐今歳止於大都將年例和買段疋絲絹等物預期張立榜文各開色様幅尺麄細輕重添價収買仍許中買鹽引商旅四集旬月可辦不惟省減脚力防押官兵及免水火盗賊之虞實永絶姦人因公規利害民之弊若慮或有躭悮且可内外分買若大都果便來歳通行斯亦惠民弭灾之切務也皇慶改元歳奏議臣某等言蓋聞人臣以報國為忠効忠以進言為先况臣等以衰暮之年遭逢聖運首膺寵召過荷異恩不有一言將何以報竊惟天育萬物不能自理傳之天子天子理萬物不能獨為傳之中書中書所以行天子之令而裁理萬物者也其事權不可不專猶慮有闕焉於是置御史臺執憲以繩之繩之者所以成之也其紀綱不可不振苟中書之事權不分臺諫之紀綱不沮天下無難事矣故聖王無為無為者得其要也其要奈何省臺是已臣等前陳八事既嘗言之矣欽惟皇帝陛下聰明智睿出于生知寛仁慈愛發乎至性爰自潛邸至踐東闈再翦巨姦一匡宗社其規模注措固己有在矣即位之日尊述世祖皇帝成憲分降明詔播告天下丁寧切至聞者感動其於利民去弊之道至矣盡矣至謂除樞密院御史臺徽政院宣政院各依舊制其餘諸衙門及近侍人等敢有擅自奏啓中書政務者以違制論又至元三十年之後諸衙門改陞剏設并多餘員數非世祖皇帝之制者從省臺分揀減併降罷詳二條聖意之所以假權中書畀重憲臺者昭然可見何者急於圖治耳是以中外拭目欣覩太平然臣等愚繆過計猶有不得不冐罪為陛下言者夫欲得而患失與喜而奪悲人情之所同也今當分揀減降之始其患失而悲奪者為不少矣慮或萋斐之言伺便而入浸潤膚受謗歸省臺儻省臺一摇政本隨易必至上煩聖慮下紊諸司在於逺圖所繫甚大伏願陛下𢎞乾坤之量廓日月之明謹更始之方守已頒之制提綱挈要確然不移使㣲漸之萌宻遏潛弭則事權一而紀綱振庶政萬㡬不勞而理陛下雍容髙拱坐撫至治享無為之樂臣等之願也奉使宣撫囬奏疏近蒙都省遣差欽賫聖㫖奉使宣撫山北遼東道尊依廵歴回至大寧路乃以八月初六日戌時地震土人云本處自至元二十七年八月二十三日地震之後至今時時震動未己當時不以為慮數日訪之旁郡以及上都隆興皆然而太原平陽為甚九月復歴上都隆興等處其震不時復作未見止息欽惟聖上以聰明聖智之姿受天景命嗣守大位以來親擇相臣精選臺官蠲租宥過賑乏恤孤覆燾之恩洋溢中外比又遣使七道分行天下問民所疾苦雖堯舜博施濟衆之心不是過也然而地道愆常尚勤聖慮者靜思其故灼有由來良以有司不能盡體上心擴充至化况更張之始宿弊革而尚存新政欝而弗通積陰凝結陽氣上行不得宣達而為此變也何以言之凡理順為陽理逆為陰則是順理之政少而逆理之政多也君子為陽小人為陰則是君子少而小人多也公則為陽私則為陰則是奉公少而懷私者多也雖然陽進有元陰退有漸養其元需其漸陽進而陰退矣某輒敢不避僭越謹書管見所得凡九事一曰重省臺二曰明相職三曰清省務四曰正六官五曰慎賞罰六曰均榮辱七曰嚴禁衞八曰禁奢僭九曰勵學校固知迂闊無足采錄然皆進陽退陰拳拳之義也合行開坐具呈中書省照詳施行一曰重省臺天育萬物不能自理傳之天子天子理萬物不能獨為責之中書中書所以行天子之令而裁制天下者也其事權不可不專猶慮有闕焉於是置御史臺以法䋲之䋲之者所以成之也其紀綱不可不振苟中書之事權不分憲臺之紀綱不沮天下無難事矣曩者近侍諸衙門往往奏事干預朝政省臺未免沮抑事致紛龎近欽奉聖㫖節該諸衙門不得奏人做官開讀之日人情大恱愚見以為都省宜與御史臺同議聞奏更乞頒降聖㫖戒飭近侍及諸衙門除本管職務外凡關係有司一切合行政事毋得干預陳奏必有事須奏者亦須奏乞宣傳中書省或御史臺照依札撒施行仍許省臺詳事可否回奏不由省臺而輒奏行者有罪如此則事權歸一而紀綱振萬幾之務不勞而理矣二曰明相職凡諸司守職者皆不可私而宰相為甚諸司之私不過敗一事損一民廢一職殃一郡而己宰相之私小則害天下大則誤國家矣相可私乎宰相之私大率有四而貨賄不與焉或恃勢以臨下或固寵以媚上或苟安而不為或畏禍而不言恃勢以臨下則權必歸已請託行而朋黨分矣固寵以媚上則道不由公諛謟進而小人肆矣苟安而不為則百職不舉而庶政隳矣畏禍而不言則忠告不聞人罹其害而國事殆矣凡此四私不可一朝有也爰自至元乙亥之後老姦巨蠧繼踵用事所謂四私者極矣一二十年之間居官為吏者惟知賄賂關節可以進身憸佞薄刻可以得名正直者指以為狂謹守者嗤以為愚不知有禮義廉耻也即今吏弊連根株民病成膏肓實由宰相之私有以使之耳必欲痛懲斯弊莫如昭示無私宜先下令曰凡有傳稱諸相鈞㫖及假倚門下威福脅制諸司屬託公事者該管官吏隨時赴省稟首究治仍許諸人察舉御史糾彈若所管官吏不即稟首與屬託者同罪輒已施行違法者加等蓋身正則令從上行則下效將見百司悚畏善政流行風俗革而相職得矣三曰清省務中書省宰相之府所以臨百司統萬幾定謀畫出政令佐天子以安天下者也其地不為不崇其責不為不重然居崇有容任重有要容宜肅要宜簡蓋肅者衆所嚴而簡者繁之制也能簡而肅則所謂定謀畫出政令佐天子以安天下者可得而言矣至元初年丞相到省諸人無故不敢入外門外門不敢入得入省房者少矣不敢入省房得入都堂者絶少矣是時諸房省掾所掌惟一鈞㫖簿控制六曹而天下之事井井皆辦省中廓然望如神明得簡肅之道也厥後一二十年之間巨姦繼作相踵一途羣小乘時蟻聚蠅附莫不苟縁公事以濟私權如胥吏管庫之免除匹帛斤絲之出内皆須𤨏碎呈稟駁勘往來競以生事為能號稱用心出力文隨事具日積日繁由是撿舉困于兩司判署疲於八府終日倥偬特一繁劇大有司耳雖有䕫稷伊傅之賢其於贊襄調燮之功蓋有所不暇矣兹可謂簡乎又每旦諸相入省例引門下親信數軰諸人混入森立滿堂或僞或眞互不能辨内隱姦慝亦莫可知使郎吏啓覆於喧雜之中執政可否於厮役之後不惟泄漏政事實為虧損尊嚴兹可謂肅乎詳此二事初若甚㣲乆而相仍其弊實大宜令六部各具所掌事務名件及施行禮判委官分間凡有定例及涉細碎重複不必呈禀者悉皆削去一取至元十年以前典故遵依施行仍禁約諸人無故不得入省門每日諸大夫聚會親隨不許入後堂令有職役者一人輪直聽候命令知印通事省掾出入恒不過四五人如議事皆令廻避即有諸投下即諸衙門以事稟說者令客省使分間亦不過一二人得入如此省體肅而愈尊相職清而多暇其所以佐天子安天下者徐爾圖之宜無不辦四曰正六官按周禮六官以配天地四時蓋六官得其職則天地四時之氣可得而正也今之六部是已六部果得其職乎畧舉而言之吏部實為天官掌别淑慝平銓衡使賢者進不肖者退乃其職也今其法惟以日月為功不以能否為斷衙門欲併而不果冗貟方汰而遽停賢者果能進乎不肖者果能退乎則天官未得其職矣刑部實為秋官掌司威罰平獄訟使惡者詘而善者伸乃其職也今律令未見施行所掌分於宗正或乃不分輕重指名脱放罪囚惡者果詘乎善者果伸乎則秋官未得其職矣又如禮部之禮制無所定科舉未能設兵部之軍役不得均驛政不得間則春夏二官未得其職矣詳數事餘可類推天地四時之氣有所未正者或果出於此乎易曰后以裁成天地之道輔相天地之宜以左右民宜令六部條具所掌得失參酌古制定奪聞奏頒定新規刮去舊轍使之各得其職責以必成實裁成輔相左右萬民之大端也五曰慎賞罰古之有國家者凡能使一世之英傑奔走用命四海之人厭服而慕化者無他術焉賞罰而已矣故賞罰者國之大柄人主之所固執而慎施有司之所敬守而奉行者也故賞一善則使天下之人皆曰此宜賞也莫不躍然而喜為善罰一惡則使天下之人皆曰此宜罰也莫不悚然而懼為惡夫能使人懼為惡而喜為善則天下無事矣苟為善者不必得賞雖賞而有所未至為惡者不必得罰雖得罰未必得當及不應賞或以喜而賞之不應罰或以怒而罰之則惡者無所為懼而日益逞善者無所為喜而日益懈為善者懈為惡者逞而天下多事矣由此言之賞罰可不慎歟今後擬乞聞奏上位處分及都省諸司所行關係予奪升黜賞罰事理未行之間當該有司皆須詳審精究必皆當理然後施行即或理有未當得以駁舉辨覆更改不舉者有罪風憲衙門隨事糾彈究治大者聞奏六曰均榮辱近欽奉聖㫖頒降處决官吏取受條格十有二章既示其辱矣其所以榮之者宜亦加焉伏覩歴代盛時内外職官所受制勅皆有勲爵其父祖母妻隨其所受官資例有封贈誥命竊嘗思之蓋人主以恩禮假名爵之重以勵其為臣之忠人臣以忠力取名爵之榮以顯其為子之孝則是恩榮一致上下相資不易之典也且夫勸奬之方無如榮辱之切况人之至親至愛者至於父祖母妻極矣今使勲爵之華封贈之澤奉公守職則從而予之至親至愛者均其榮貪汚敗政則從而奪之至親至愛者均其辱其為勸奬孰切於斯宜令有司檢會前典定擬聞奏頒行不惟臣下深警榮辱之公而競效其忠實表聖朝太平禮文之備而大著其美矣七曰嚴禁衞古者天子之居必通籍乃得出入示尊嚴謹幾㣲也欽惟車駕所幸軒陛宿衞之下宜加嚴密至於作好事僧道各有寺觀亦不宜頻在宫禁諸色近侍及藝術承應人等皆宜定給符驗出入辨認更乞詳酌聞奏八曰禁奢僭風俗必不可使奢奢則僭僭則獄訟興姦邪熾傷財不論也今之風俗可謂奢且僭矣市道之間有一笠直百五十貫者有一靴直二百餘貫者踰常過費聞之駭人夫靴以衛足笠以庇首僅得完潔成禮足矣亦何取百五十貫及二百餘貫之貴哉豈非奢乎又如銷金鍍金之禁婚姻嫁娶之制雖嘗施行未見禁止富者恣欲而無窮貧者破産而不足如此等類蓋非一端古者車服器用皆有等差婚姻䘮葬各有品節宜令有司參酌古今定立各項制度聞奏施行如靴笠銷金鍍金等事一皆禁斷不惟風俗漸厚禮義興行實省財佐民之急務也九曰勵學校學校者風化之源人才之本也其勉勵之道朝廷已有累行條格頃年以來各處牧民之官競以修建文廟為事在於政蹟固為可佳然考其師生敎授之實人才作養之功百無一二是務其外而遺其内也是知其標而不知其本也終亦何益哉即今所歴府州司縣首領官吏往往不識字上司所下文檄有不會句讀㫖意而錯施行者中間實繫利害學校不興之過也今後合令各道亷訪司嚴行督責所屬凡學校之務須要用心整治期於必成所教生員名數及所業次第每季申報廉訪司以備閱試察舉生員入學者與免本身雜役能通一經者免本身差發通二經者及成功課者除免本身差役外本户雜泛全免三年無成者依舊當役其有學業精熟才行超異者廉訪司官體訪是實保舉量材區用其學校成否實跡提調官任滿解由内開寫如此庶望學校興行風俗美而人才衆矣大德七年奉使宣撫山北遼東十月回至宣德奉聖州具呈中庵集卷七
