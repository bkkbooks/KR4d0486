body:
  text: 中庵集卷十三元劉敏中撰記三陽丘孟氏希閔堂記人之道由近始近者父母昆弟之謂也於是孝悌生焉而人道畢矣故孝悌者人道之本也人誠孝悌以居家則理以與人則信以任事則立以事君則忠以臨財則廉以見義則勇以之處窮達歴險易顛沛造次無往不得其正者有本故也有子曰君子務本本立而道生孝弟也者其為仁之本與孟子亦曰人人親其親長其長而天下平謂此也夫自聖王之迹息而風俗壊如直躬以證父而取名鄭段以不弟而見克者紛然已於是孝弟衰而人之道不得其正矣孔子以聖徳出於孝弟既衰之後弟子之聞道者盖三千人而獨稱曰孝哉閔子騫人不間於其父母昆弟之言夫聖人所以稱之者稱其無間言耳無間言則孝弟之至也然則孝弟之至者唯閔子騫焉故凡為人子者如閔子則可矣閔子之行萬世之法也陽丘孟君慶样善人也有子四人焉政徽敬敏皆慥焉有孝弟之質而政為山東亷訪掾來言曰近為一堂以奉二親之養乞名於亷訪使河南陳公公辱以希閔命之而未有記先生幸終教焉嗚呼希之言慕也法閔子而慕焉勉之至矣余復奚言哉雖然騖其名而遺其實勤於始而怠於終人之所通患也孟氏子果能因名以效實由始以思終求其所謂無間言者心慕而力行之則孝宜日益隆弟宜日益著吾知其進而至於堂之上則其樂也融融焉退而止於堂之下則其樂也怡怡焉若是則於無間言也譬之適逺愈行而愈近矣異時行成而名立家肥而身榮使邑之人翕然化之曰閔子之行得孔子而稱之萬世以為法孟氏之堂得陳公而名之一邑以為勸兹不偉歟孟氏子勉之哉是為記尚志齋記士之所以異于人者在乎尚其志而已盖嘗論之心為志之體志為心之用故心一而志二光明正大虚静純一廓然無外者此天命人以本然之良心也及耳目之官一接於物則莫不有所慕有所慕則念必起於心念之不已則皆各從其所慕而之矣是謂之志也然後善惡分焉小大别焉故曰心一而志二也然則善者所以全其善惡者所以至於惡大者所以成其大小者所以止於小者莫非志也今夫為技者曰吾所志者技左凖繩右規矩利其器而致其力晝不得休夜不得息慊慊焉以求其巧技精矣猶以為未至乃徧即天下之為技者以折衷焉而天下之為技皆服其巧莫能過也斯其為志也至矣而閭閻之人能賤之曰彼技者也我得而驅役之為利者曰吾所志者利行則操鈎餌止則設機穽汲汲焉以求其富貴髙而至於山深而至于淵近而一國之内逺而四海之外凡可獲其利者無所不至焉利豐矣猶以為未至乃徧即天下之為利者從而較之而天下之為利者皆服其富貴莫能及也斯其為志也亦至矣而褐夫能賤之曰彼貪人也我得而凌慢之有一人焉曰吾所志者道晝而作夜而寐寒而衣飢而食休休焉無能為也責其巧與富曽不及向之為技為利者之萬分一然而宗族稱其孝鄉黨服其弟朋友與其信以之立廟堂臨民人出處進退無不可者與夫受役於閭閻見凌於褐夫者為何如哉嗚呼由一念之間而其善惡小大之相去如此則士之求異于人者其志可不尚乎昔王子墊問於孟子曰士何事曰尚志曰何謂尚志曰仁義而已矣此之謂也友人智仲敬築室而居之揭其名曰尚志盖取孟子之説也而求記於余余曰余與子游二十年矣知子之悉者莫如余子夙敏而有才好學而不倦實孝於親弟於兄信於朋友夫孝弟與信三者既立而曰仁義云者不在兹乎是子之尚其志也乆矣此區區之名焉耳古之人畏有名而無實今子實既修而名自從之矣何更為哉仲敬曰是不然靡不有初鮮克有終者愚智所不免故孔甲有盤盂之誠武王有衣鏡之銘懼弗克終也聖賢尚且如此而况我輩乎我恐吾志之漸弗克終去而不留也庶幾視此而朝夕自省察焉吾非為名也余曰子誠能若是則雖不欲異於人其可得乎故樂為之書審安齋記貴賤貧富進退存亡世之大節也而一人之身備焉以一人之身而處數者之變厥亦難矣哉然則處之有道乎曰安而已矣何為而安乎曰義而已矣義者宜也宜則安矣夏葛而冬裘飢食而渇飲如是而已耳貴而義則吾即安於貴賤而義則吾即安於賤富而義則吾即安於富貧而義則吾即安於貧進退存亡而義則吾即安於進退存亡義之所在安之所在也若此斯能無往而不安矣又何難處哉然而曰貴曰富曰進與存者吾之所欲也曰貧曰賤曰退與亡者吾之所惡也使其所欲者不可得而曰吾必安於是則固無是理矣其所惡者幸可以去而曰吾必安於是亦豈人之情也哉吾故曰宜則安矣衮衣繡裳不以為泰者周公之安也簞瓢陋巷不以為憂者顔氏之安也應三聘之禮起而不疑者伊尹之安也辭萬鍾之禄去而不受者孟子之安也召忽之死難管仲之事讎皆其所安也此其所安者不同而其義則一也友人劉仲澤築一室而自以審安命之日夕居其中雖饑寒切身未嘗不嘯詠自得而無慕乎其外休休然若将終身焉余竊怪之而未敢言也一日求文以為記余曰敢問審安之義曰淵明有言倚南窓以寄傲審容膝之易安子獨不聞乎余聞而愈怪焉曰審安之説在淵明則可在吾子則不可夫淵明之為此言者豈惡富貴而欲貧賤哉盖其不得已而安於義也淵明當晉室波蕩陵夷之際欲行其道而不得故絃歌未終恐為鄉里小人所恥於是拂袖長往賦歸去來以自況故其言云爾使之遇隆平之世則豈寧安於容膝之地而已哉方今朝廷清明天下晏然此誠有為之士以富貴自安之時也顧吾子獨以貧賤自樂安於古人不得已之地吾竊怪子惡其所欲而欲其所惡也豈所謂夏裘而冬葛饑飲水而渴食糜者耶由此觀之則子之安非義之安也雖然世固有名同而實異言在此而義在彼者傳曰君子安其身而後動又曰安安而能遷子能實此言也以往則異時功徳及於人聲名著于世雖居華屋而庇大厦饗膏粱而被文繡必泰然無媿矣兹之安與今日之安為何如也仲澤年方盛而才又甚俊吾懼其安於彼而遂忘于此也故不得不為一言以相告王氏孝敬堂記昔聖人著經示人以至徳要道曰孝曰敬兩言而已耳孟子述之曰人人親其親長其長而天下平盖天倫之愛父母兄弟一也故未有能事其親而不能友其兄弟者也未有不能友其兄弟而能事其親者也嗚呼能盡二者之道其唯孝敬乎商河王氏兄弟三人用遜弼能謹節勤劬相睦如手足左右以奉其父母之養無不如志本立道生家日以理用弼皆隠晦不仕遜受知周定夫先生及先生宣慰江東遂薦遜提舉漂陽課歴龍泉零陵二簿有恵政在零陵聞父喪歸喪除以知事佐道州路遂請老焉初其父無恙時訓用等曰毎見人家兄弟往往因貨財忿争傷其骨肉之義吾甚恥之今為汝曹異其産庶不致傷義也各以劵授之則皆戚不忍異卒不異而共被之情愈篤矣三人者垂白相從日以讀書力穡課子孫言笑怡怡然正家範於上諸子姪娣姒至僮妾幼穉服役共命容止斤斤然循禮節於下闔門盈五百指和樂肅共無有疏暱厚薄彼此之間又且三十年不衰如初君子異之曰去古逺矣其所謂徳色誶語慈子嗜利與夫䦧墻紾臂者草偃波靡耳而乃有王氏哉於是新泉楊祕書聞而嘆曰是可謂能孝敬矣以二字為大書遺之使扁其室焉遜之子繼祖由國子伴讀乞歸養來以記請余惟名實於善惡猶影響然有是實也則必有是名也有是名也則必有是實也王氏之於孝敬名稱實矣而名其室名其名也君子名其名可乎哉雖然古者盤盂几杖有銘座右有銘所以然者欲其朝夕出入恒得而視之以自警戒省察而不敢或怠也則兹室之名也亦若是矣凡曰王氏者固将朝夕警省加勉惟孝敬是崇日新而不窮無有始終則其實當益充其名當益隆可以激鄙頑開聾蒙鍾餘慶而大門風矣噫以是而名其名夫不可乎哉乃樂為之書用通甫遜仲謙弼仲輔其字云至大己酉冬十月既望記田仲珪孝敬堂記孝者人子之常分也有性存焉自親生之膝下以養父母日嚴夫誰使之然哉固有之性也雖然人之性不能無因習惰窳滅裂之害而固有之孝於是為矯名為悖徳淟焉失其所謂性者是以聖人本人性之初而教之曰生事之以禮死葬之以禮祭之以禮可謂孝矣又曰禮者敬而已矣故夫孝而能敬然後可以得其性乎燕山田侯仲珪於其母之墓所為堂名之曰孝敬請記於予予從而詢其故侯涕泗言曰仲珪不幸未成童而孤母常誨之曰方國家肇造汝祖安撫府君以醫得幸太祖聖武皇帝實掌太醫嘗以節行安撫事征西域戰沒汝父倜儻有氣節太祖愛之因賜名庫庫以父官居近幸從征回鶻密以方畧假數人擒其王蘓爾坦以歸詔復其家以旌其功尋授金虎符以提刑轉運使鎮朔方調兵食皇帝經略河南闗右為䕶軍雖在征伐以拯溺為主凡儒服若二教藝術者率招輯之所全活不知幾何人矣復還領太醫而天下諸醫𨽻焉奏請郡國立恵藥局以濟病者盡瘁兩朝徳業盛矣以汝藐諸孤懼弗克知無以致肯構肯穫之勤故以告汝汝其勉之仲珪敬佩於中感泣以思自甘㫖承奉之餘晨昏定省之隙兢兢業業弗敢自怠繄罔承母訓是懼以迄于今吾母為韓氏性尤静烈雅愛都城南家園嘗從容言曰吾觀燕俗尚墓祭而野常多風埃塵滿席鬼且弗享我百嵗後汝處我必於園中而加屋焉使如平居以適吾志也至元甲申春三月五日年六十有五以卒乃卜兆於園之中央塟而不封上為神座庇屋四楹户牖曠麗陛級亷峻繚以周垣表以崇門從治命仲珪旦夕奠哭嵗時薦享盖怳然如在庭闈之内而王鹿庵承㫖俾以孝敬名之張寓軒尚書題之未有記者然名堂之義吾何足知冀因吾子之文使妣之訓之志有所顯白以伸罔極之報耳予竦然曰有是哉上古塟而不祔墓而不墳秦廢家廟之制而漢世公卿乃為祠堂於墓所田侯之塟豈猶古耶嗚呼去古益逺矣固有之性能不為風俗所移者寡矣徳色於父而誶語於母者莫知其非矣能知其非矣有能奉甘㫖時定省兢業弗怠如侯之致養者乎能致其養矣有能致其哀塟不違志如侯之慎終自盡者乎能慎其終矣有能事死如生思其徳訓如侯之不忘而卒能有成者乎由是觀之則所謂孝而能敬者侯果有以庶幾矣名堂之義其稱也於是乎書侯字瑞卿嘗位於朝任事有能績宰相以聞世祖念之曰是田庫庫子也特以楮幣五千貫賜之今以朝請大夫為濟南少尹云元貞元年秋九月日劉敏中記中樂堂記樂其孰所從而樂哉不樂其孰所從而不樂哉知其可樂而樂不可樂而不樂而樂其可樂是必有道焉非望之富儻來之貴苟然之安孰不樂焉而吾獨不以為樂簞瓢陋巷曲肱飲水孰為樂焉而吾獨樂之非夫以義與道為之稱停了然有見於肝膈胷臆者其孰能之燕人蔡君顯卿曩為予鄉陽丘税因嘗際焉察其讀古書洞明古學聰辯有為以操履自勵嘆曰斯佳客也以是交益欵逮余來燕聞其藹然有嘉遯之譽知其自與余間闊之年未嘗復一日仕從而訪之則其氣充然其容粹然休休焉若有餘裕者余喜之曰子胡不仕古之所謂學道而有得者将若是耶君曰嘻余之厠跡斯世猶滄海之一粟余之仕宦猶大倉紅腐之粒米余之百年之光猶駒之過隙以粒米之官一粟之跡泛滄海之世駒陰㡬何乃區區膠轕固結紛拏騰擲於一市征之殿最與奪嘻造物之誑余也久矣余家都城賢豪之藪而貨物充盈從有歸市有得也余但起課僮𨽻作息間作歌詩銜杯鼔琴以自樂其樂凡世之危溢負乘巧倖攫攘憂喜得失之變無與焉吾止此而已又奚暇知夫學道之有得與不得者哉語未既則捧觴前曰適為一堂願吾子以終教我余竦然曰觀子之道可謂知其可樂而樂者聖人樂在其中之言庶乎無愧矣請遂以中樂命之可乎君謝曰非敢望也乃大書二字使扁之且為記云仰髙堂記蔡君季良取詩髙山仰止之義命其堂曰仰髙為之説曰山形之髙也人仰之賢人之髙也人企之然仰山者不能至於山而企人者可以及其人如知其人之賢而不知所以企焉者自下者也故君子因其仰山之髙則思企人之髙能企人之髙則人亦将企吾之髙矣賢而至於賢聖而至於聖用此道也而可以自下乎季良之命堂也其志逺矣中菴集巻十三
