body:
  text: 中庵集卷三元劉敏中撰五言律詩至元十一年清明遊舊都南塘呈黄威卿賈榮甫二知己三首忽到南塘路萋萋草已深鶯花逢晚景樓閣静春隂觸望空多感思歸只獨吟惟應愧知己欵曲百年心蜿蜿紅橋逺森森碧徑深遥山昏野色流水亂城隂燕去抄花舞鶯来隔栁吟如何行樂地獨抱故園心楊栁金絲亂桃花錦洞深偶經流水曲絶似故山隂竟夕窮歡賞歸鞍兀醉吟燕逰償不遂暫慰客中心春困二首長日兀如醉閑愁悄似禪暫来拈筆寫却又枕書眠落絮風餘態飛花舞後妍東樓懶回首雙燕正翩翩畵出愁中様如逃醉裏禪不禁花惱思㡬被鳥驚眠春事渾無頼晴忩强作妍多情雙蛺蝶為我舞翩翩卜平章夀讌早悟程張學遥傳孔孟心披雲捧堯日與嵗作商霖曠歩通賢路清隂滿士林中堂介眉酒浮動北山岑運泰風雲合年豐日月長入朝無滯事退食有清香社稷憂誠重詩書樂不忘所行惟所學夙意在虞唐題采水縣尹劉漢臣詩卷首章乃御史中丞仲公詩也令長承宣寄㡬權輔弼均一言開嵗喜百里作冬春圖治當今日馳聲有此人中臺品題在不負甑生塵饑安思承赴四川提刑副使憲府同班日原注思承與予昔日同為御史吾鄉㑹面時殷勤百年意感激寸心知遽爾參商隔居然嵗月馳聞君逺入蜀何用慰相思題張智甫牡丹讌集詩卷好古仍好客愛花尤可人栽全洛陽譜占斷濟南春國色徴吟筆天香襲醉巾相看惟老樹寂莫繡江濵贈鵬舉充鄂囉居簡仍多藝循華却古心律科髙史業詩學振儒林聖主昇堯日蒼生渴傅霖兵曺聊可遣努力在朝簪才鑑人難比文章筆有神㡬年頭角異三語姓名新去去摶風翼洋洋縱壑鱗他時黄閣上不似舊詩人同簽樞宻事張子恵於京師私第構一室扁曰西巖西巖指其鄉欒城西山而言示不忘祖先桑梓也以卷徴言為書四十字十年丙午六月也宻省騫孤鶚知君逈不凡九霄依北闕一室對西巖肺腑紆清賞松楸感至諴門風百年舊氣象日巉巉長蘆李仁甫母趙氏守寡三十年年六十三卒無恙時有為薦聞旌表者趙辭之仁甫兄弟二人求詩惟知所天重敢以此身輕苦節終完節辭名更有名青燈耿虚室白首㑹佳城欲報天無極哀哀二子情送王守道安撫之官威茂投筆風雲動揚鞭羽翼生青山送離别白日照精誠逺俗聞聲喜同逰羡爾榮慇懃一杯酒更為老人傾完顔士慶以安西理問至京師授四川省左右司郎中君請於宰相得覲省来濟南給傳赴官其行也詩以送之官程驚客夢驛騎又駸駸落日旗亭逺髙秋劍閣深天長望雲意嵗暮倚門心早晚歸歟好金杯重細斟寄西野尚書逺吹流遺響淒雲弄薄隂秋隨江樹老寒入草堂深多病頻妨飲孤懐漫廢吟流萍赴滄海何處問浮沉王秋澗哀挽學與天淵博名隨事業新文章早無敵字盡晚逾神㝠躅追前哲遺芳澤後人獨憐秋澗月猶照玉堂春挽王朋益偉器明時出英聲早嵗聞夜絃鳴白雪秋翮入青雲遽失千金璧空存四尺墳流風傳不冺猶足張吾軍送張希孟秀才赴禮部掾𡨕漠文章脉来從太極先欲求寧有得已絶豈無傳廓廓英華表悠悠土苴邉愛君千里馬為贈繞朝鞭禮樂春官府清時重選賢飛翔從此地昻聳㸔他年逺器含餘藴横波下衆川古人忠孝事耿耿要君全題楊朝舜挽章後朝舜先由濟南府判入為集賢待制除知孟州未至而卒玉樹瀛洲望甘棠厯下思千金求絶筆萬口詠新詩洒落何人似詼諧亦我師河陽不肯到空作九原悲送李伯渥監税潭州為别期三嵗征商效一官長沙憶卑濕楚甸入荒寒白雪知音少青雲得意難聲名隨處有努力莫盤桓春晚洞庭麗秋高湘水深感時傷逺客撫事費長吟鴻鵠九霄志驊騮千里心洪鑪百煉後精絶識良金挽尚書簡公詩原注字敬之大同人志學将期用輸忠可憚勞功成沙漠逺名出士林髙清禁承三接華軒映六曺中途欎遺恨不及友虁臯徐伯𢎞御史見過車馬瞻雲表茅茨自水濵繡衣迎漢使白首問堯民萬里風謡得三生臭味親忠勤有公等愧爾太平人原注以是時伯𢎞廵行山東諸郡和鵬舉冬日閑居五首賢哉魏夫子吟詠樂潜居筆有千鈞力胷涵萬卷書已評君若鳳無怪我知魚肯就陳蕃榻時過靖節廬白日無多事清溪静僻居陶情五字句寓目數行書敢望乗軒鶴或如困轍魚豈為兒女態瀟洒愧門廬開簾媚風日清寂若仙居匵有荆山玉家傳孔壁書形骸本麋鹿交友任禽魚回首蜀川道陶然愛舊廬棲迹城中市游心物外居篆煙時作縷蠧葉偶成書仕顯伏轅驥身閑縱壑魚峥嶸卿士宅瀟洒野人廬為病成幽隠如禪學静居心中惟慕道名不係除書林美来幽鳥淵深止巨魚執鞭如可富吾豈戀衡廬題燕處士劉實從義墓銘後一代耆年望千秋處士名眼中聊遣興身外乆忘情有子迪清範無人尋舊盟髙風在寥廓搔首愧平生原注從義之子彛授亷訪經厯不就憶鄭處士隠者俱承詔斯人獨避名文章成汨沒冠蓋絶逢迎食粥家人瘦躭書弟子清經旬不見面相憶每愁生濟南醫學教授王荆玉用内侍薦被召以詩贈之四海思齋老三年厯下城官聮頗閑冷技術自神明推轂當途事徴車此日榮即㸔宣室見端不負平生原注思齊荆玉自號范冰壺者故玉壺先生之子以方技進好學能詩来求言故贈之名學有餘力妙齡無不能貴聫金馬客清出玉壺氷射覆追方朔躭詩慕少陵長風九萬里刮眼看雲鵬聞智仲敬教授歸自曹南念汝三年别聞今千里歸闢堂鋪木榻植杖倚荆扉日夕行人歇天長去鳥微病懐渾欲豁回首轉依依明水張受益掾江淛省蓄古物甚富以博古稱自號古齋頃赴調京師除本省檢校過家其行也以詩贈之博古仍希古如君古亦稀識窮三代逺疑正百年非乆鬱披雲望俄瞻衣錦歸明朝又南北把酒一依依来繡江以麥送仲敬有詩見謝次其韻併簡趙文卿提舉昔擬攀龍客今同食鴈卿素懐寧易託良覿每難并遽枉驪珠重空慚兔首輕衰殘一如此那復問才名未能幽興惬空柰别愁牽悒悒隨耕稼悠悠度嵗年江山回白首煙雨滿青田想見壺中樂相携醉市廛髙唐監郡鄂爾多和托拉系出西域折節下士讀書樂善士夫稱之兄弟六人而君為季其父獨以君襲是職監郡凡三世矣作忠順堂居之因郡人元恒齋正卿来徴言贈以二詩系族来何逺文儒夙所耽白眉班在六皂蓋世傳三政體宜深得民情亦飽諳眼前忠順字元不是虚談順有當行理忠無不盡心一堂非麗搆兩字是良箴事業皆中出名聲豈外尋家門日光大益覺慶源深送石仲璋侍御赴河南肅政亷訪使原注大徳四年之冬十月矯矯秋天鶚蕭蕭憲府騘光聲滿河右良覿憶山東寥落客懐惡留連尊酒空相思有新句休忘北飛鴻次韻荅憲司張文絃經歴及其屬凡五人見寄之什地壓東藩重司分北户隂人材信灑落詩壘更髙深同作孤羆立相和五鳯吟須知正始作不為鄭聲沉出竒如曲逆多辦似淮隂峻削天根敻清連月窟深文章千古貴情性㡬人吟聲色雲霄外何虞古價沉竒貨驚寒目長風破夕隂神交一字重義盡百年深漫愧齊東語難㤀洛下吟不眠搔白首消盡博山沉中庵集卷三
