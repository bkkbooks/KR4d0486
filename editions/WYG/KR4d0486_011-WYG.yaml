body:
  text: 中庵集卷十一元劉敏中撰記一濟南府學至大四年大成至聖文宣王加封聖號記國家以神武拯斯民以人文𢎞治道凡戸以儒籍者世復其家民之從學者復其身中統至元以來通儒碩才並進迭出由是罷世侯更制度混一區夏臣服絶域典章禮文之懿罔不備具元貞大徳重熙累洽自京師達於郡邑廟學一新絃誦之聲盈於鄉井皇風煒􅂱郁郁乎治與古比隆矣大徳十有一年七月制加孔子號大成至聖文宣王播告天下又三年省臺檄令在所勒石紀其事於學今年春三月聖天子即位詔内外學校廢弛者監察御史肅政㢘訪司糾劾凡以崇人文謹成憲也濟南介齊魯間於今為劇郡為總府為東西一都㑹故肅政㢘訪司治於此資善大夫遥授中書左丞㢘訪使阿都古齊朝列大夫副使韓中奉議大夫僉事成格勒奉議大夫僉事董璧徴仕郎知事馮徳相興言曰在今吾屬以興學為職是邦孔子聖號猶未紀不亟圖如學何而總府葢嘗有成議未暇也至是益警懼奔走從事石具府知事耶律行簡學正李克允再抵繡江致亷訪總府命以鄙述見屬某郡人不得以淺陋辭謹按唐𤣥宗開元二十七年追謚孔子文宣王宋真宗大中祥符元年加元聖五年改至聖我朝大行皇帝加大成竊惟孟子集大成之言謂孔子聖徳之大成能兼夫伯夷伊尹栁下恵三子之聖也今即大成而言之抑又有大者焉夫小大之相形固也然小有盡而大無窮大而至於無窮大之大者也天穹窿於上地旁礴於下大矣然猶有覩也若夫截然而四時行蠢然而萬物生無兆眹無聲臭無端倪其所以變化斡旋綱維主張者可得而窮乎哉斯不亦大之大也歟天地生萬物聖人成萬物開闢而下聖人繼作二帝三王之世其道大矣然猶有待也葢堯待舜舜待禹禹待湯湯待文武周公文武周公待孔子周衰大道熄禮義無所措萬物不得其成而孔子生孔子乃獨刪詩定書繋易作春秋當是時也聖徳之藴發而為事業所謂彌髙彌堅瞻前忽後奔逸絶塵者矣孰能知其所以然而然哉逮夫剛定繫作而後人始曉然皆知如是而為天如是而為地如是而為君臣為父子為夫婦昆弟朋友如是而為善惡為吉凶為可為不可為亂為治為亡為存於是堯舜禹湯文武周公之道炳然矣意者天地之運以堯舜禹湯文武周公肇人紀於前以孔子握大中判得失於後而三才之極萬世之凖於是乎一定而無所待葢孔子之道也其曰成焉者可得而窮乎哉斯不亦大之大也歟以是觀之我朝之所以崇奉吾聖人者其可謂至也已矣嘻凡任持憲長人之責皆能惓惓焉昭盛典宣聖化傾至如是則見民從吏畏善俗日興使𤣥髫青衿之子黄髪鮐背之叟長育文明之澤而涵泳升平之樂誠千載一時也傳稱邦其永孚于休者不在兹乎嗚呼盛哉齊東縣學至大四年加封聖號記齊東監縣特黙齊縣尹孟遵道主簿張徳林縣尉王佐教諭馬某即某言曰先皇帝嗣位之三月制加孔子號大成至聖文宣王播告中外今敝邑將勒石廟學庸示永久念嵗月不可不謹願有述敢請竊惟大成之義載於孟子發於聖制者備矣至矣兹不敢贅姑特以吏治之切於得失者言之雨澤之降無間彼此而樹藝有榮悴之異者地或有腴瘠也然而地雖瘠人有以致其力則雨澤入而膏潤作悴可以為榮地雖腴苟其人力之不足則雨澤費而蕪穢熾榮且為悴矣王政之被無限逺近而方邑有治否之殊者俗或有美惡也然而俗雖惡吏有以善其治則王政洽而頑鄙革不治而至於治俗雖美苟其吏治之不足則王政格而巧弊生治且為不治矣故雨澤之降地無腴瘠人力致而樹藝無不榮王政之被俗無美惡吏治善而方邑無不治我國家以神武一海内以人文化天下聲教攸暨罔不咸理而東藩之邑其俗稱美者齊東其一也邑小而民阜貴禮而尚義長老有敦朴儉勤之範子弟有講學絃誦之習俗不既美矣乎而監縣縣尹而下謹於約身公於利民如塤箎之相龢耳目之相資也治不既善矣乎今其聖號之勒盛典之立也以既善之治而臨既美之俗固將究聖人之大道宣朝廷之美意推擴之鼔舞之慫惥之上好下甚渙然交孚若是齊東之治譬則因陵為髙由堂適奥耳夫不易且韙乎嗚呼廣大混融與天地同流為法於萬世者聖人之道也尊聖人之道示教於天下者天子之政令也行天子之令使其民同歸於理者長民吏之責也嗚呼凡任長民之責者可不慎乎哉濟陽文廟加封聖號記先皇帝始嗣位制加孔子號大成至聖文宣王頒示天下濟陽將勒石廟學其屬介邑儒故内翰損齋楊公之子去疾以鄙述見屬竊惟大成之義見於孟子之書孟子謂伯夷聖之清伊尹聖之任栁下恵聖之和孔子聖之時孔子之謂集大成而有金聲玉振條理始終之喻朱子釋曰孔子集三聖之事為一大聖之事如作樂者集衆音之小成而為一大成成者樂之一終書所謂簫韶九成是已斯葢大成之義也嗚呼大成之聖不可得而名矣孔子曰予欲無言天何言哉四時行焉百物生焉是知聖人之為道天道之同然也道與天道同可得而名乎哉雖然其曰小成大成云者推而求之猶有説焉二帝三王之典三綱五常之要載諸書傳諸萬世者則夫子可見之道也夫子可見之道行之一身則一身治由一身而至於一家治小成而大成也行之一邑一郡則一邑一郡治由一邑一郡而至於天下治小成而大成也行之一世則一世治由一世而至於萬世治小成而大成也然則大成之義庸有既乎國家列聖相承武威憺八紘文徳洽六合京師盛辟雍之制闕里崇祠祀之禮登賢翊善黜佞夷慝皇風清謐融融熙熙薄海外内學校林立然猶徳音屢降綸㫖迭出丁寧懇切未始不以興學奬士厲風教是急其聖號之加也天下之人抃舞道路改觀相慶咸知朝廷所以重道為民之意其至如此嘻奉朝廷之義布之政以及於人使其治由小成至於大成是豈非長民者之責歟濟陽邑齊魯間禮義之俗號稱易治繼今以往可以覩武城之弦歌而應夫虞韶之九成也邑大夫惟勉之章丘重修大成殿記孔子之道治人之道也六經載焉而治人者施焉故其事孔子之禮由京師達於天下郡邑之治人者一其紀祀夫治人之道也若其邑則又治人之近者歟治人之近者其祀宜益嚴其道宜益詳葢將使人曉然知其道之所在有以陶冶漸摩而必至於善然後治人之責塞矣苟其祀之或怠是怠其道也怠其道如治人何章丘邑山澤之交土沃而物饒其俗廣而不肆厚而易教治人者可以有為矣而其所以事孔子者顧未至有堂焉儉狹庳陋無以嚴大聖人之祀累政因襲葢莫之省而治人可知矣元貞改元之冬濵人趙君去私寔尹兹邑奠謁之際喟然歎曰是烏足展吾敬而行吾教乃因民力之暇諏工度材易堂以殿䆳其中峻其基崇其垝規制之雄十百其舊葢榱棟始敷而君以代去於是令尹大名尚君某嗣其事逾謹而監邑君濟南和囉海丞廣平張君某簿益都曹君某力相其成焉又以餘材新講堂起齋舍為庫為厨而兩廡七十子之居一葺完之既成尹率僚屬師生奉像設妥其位行三獻之禮以告則陛宇廓然神靈肅然尊洗豆籩秩而􅂱然葢降登有餘容而盥薦有加䖍焉邑之耆老壯稚則皆瞻聳改觀鼓舞咨嗟相謂曰大哉聖人之徳也其向化遷善之心葢油然於中矣實大徳辛丑春三月之吉鄉秀尚允中以衆議來京師請敏中為之記敏中邑人也而曷辭嗚呼一廟之崇庳在聖人固不足以損益葢禮不備則不敢以祭況於祀神治人之道者又可以後於禮乎雖然既備其禮矣嚴其祀矣而所謂陶冶而漸摩者果復何如哉其亦曰如是而孝如是而悌如是而忠信如是而禮義㢘讓如是而善如是而惡悃悃焉敷宣而告之警懼而導之導其始而要其終為防而待之其弗率者齊之而已耳二三君子尚有以致其力焉其若是吾知其政事日以醇民俗日以新而事吾聖人之效騐見矣異日有司考其能塞治人之責者其敢後吾二三君子哉故備為之書將得而徴焉且以諗夫來者庶其濟美而不已云蓚縣創建廟學記三代而下自天子之都至於國邑黨遂莫不有學所以右人文謹風教也唐始令郡縣廟於學祀孔子而學益重矣我朝以文治致太平故廟學之盛所在鬰然近古未有也蓚治景之郛郭有教官而無學葢以廹州學之故不復設其已久矣大徳十一年趙君徳謙尹蓚既視事嘆曰蓚劇縣也而學不設則教官何施吾治何資焉吾且視吾境學可為也州之東北四十里許有曰孫家鎮者民居阜繁為蓚名鎮古謂之仁風里先是里儒郭淵暨其徒為文㑹講習因營隙地為室位孔子行釋菜之禮趙君一日過之喜曰是可以立吾學矣淵等謝曰野人之力不足大聖人居令尹大之吾屬之願也君乃捐俸庀工蕆事益地度材而好學悦義輟已為助者不約而㑹於是為大成殿為神門為講堂為厨為垣嵗葢未周而丹碧煥然象設儼然矣廟之左為學凡師生講肄寢處之所罔不備具教諭臨邑季仲恭實主之而觀者皆曰乃今見吾蓚縣廟學也莫不駭躍瞻聳相慶今年夏六月仲恭持事狀謁余繡江致蓚人之言曰吾尹之至其創廟學也而吾人知禮義之勸其課農桑也而子弟無惰游之患其修河防也而居者絶墊溺之虞其築驛途也而行者免往來之艱其新公廨也而吏民起威嚴敬畏之誠至若抑豪右懾暴姦使民癘無所作皆尹之恵也而廟學為大願得公之辭紀諸石庸示永久且為我蓚民慰他日甘棠之思敢請余曰嘻斯風化之本良吏之政而輿人之言也可不敬書遂書趙君名思益燕人才傑士也余識之京城云濟南路總管府新署記天子以至公謹職官之制由師保六卿而下至於方伯守長皆所以待天下之賢才而與之共理者也故爵命品秩之數所以正其名禄廪奉養之給所以代其耕章服物采之盛所以示其貴公宇居處之泰所以明其尊凡為此者豈非以我為賢於人也豈非以我為能任斯事而長斯民也於是自重之慮深奉職之道公而忠利之政出矣又將使天下之人觀於彼者亦有以自思曰彼所以獲此者是誠賢於我也是誠能任斯事而長於我也於是覬覦之意消畏服之心誠而和易之俗興矣兹其為制不既公且謹乎而世之仕者徒以更代之數往往視公宇如傳舍乃或闕而弗舉廢而勿修安陋就簡以苟嵗月使下之人視之蔑如無以起敬仰畏服之心䙝慢弛肩而為苟且甚非所以為自重奉公之道也濟南總管府舊治國初郡侯張公因宋金故基所築後政因之至元六年始置監司焉葢曩為提刑今則為㢘訪矣府事則移於儒宫遷於驛館僑寓無寧所者殆十餘年總管楊侯安侯始相繼營隙地為廰事於監司之左復阻以委巷蔽以民閭儉陋湫隘無以稱大邦君之居人情堙鬰公私病焉逮兹又五終更矣三十一年秋中順大夫總管噶克察公始下車覩而傷之獨慨然有更新之志越明年政成嵗豐乃諮乃度得東隅故倉焉倉為二區北區具完出納足矣南區勿用寂寥欹危摧壊朽剥莫或顧者其地則蓬藜生之垢惡歸焉公曰嘻廣哉徒廢耳以更吾府其愈乎又謂厯城治西城之外録司混莊嶽之下因遷而一之可以便事既謀於同僚言於監司以聞於朝廷乃庀徒蕆事撤舊布新大廰門墻賔署吏廡咸位而序以録司居外門之左厯城居外門之右公帑囚廬附於側焉材因其舊而用不加費民役以時而人不知勞其規制無草率之陋無華侈之僭期於宏敞隆壯而已實經始於元貞元年之九月告成於二年之二月自即工迨訖役公旦暮臨視唯謹圬墁斵削之細皆其指授既成吏民拭目瞻竦以慶以躍於是闔府僚佐咸為公請文以記其事方役之興也衆議譁然以謂此庾雖廢成蹟也今署雖陋苟安也乃爾廢置動衆殆不可乎公弗奪為之益堅然監司是之同僚贊毗之廰事甫立而報可之命下故卒能有成如此嘻易廢庾為大府化棄壤為要地由暫勤而獲永逸之利以無用而成有用之功去庳陋而即髙明脱湫隘而登爽塏絶苟簡之習復尊崇之嚴司屬因之以便而吏民由之以悦一舉而數善得焉非賢而自重公而奉職者能之乎繼今以往使忠利之政相承於上而和易之俗相勉於下者當自公始是宜書遂書之同僚著於左云中庵集巻十一
