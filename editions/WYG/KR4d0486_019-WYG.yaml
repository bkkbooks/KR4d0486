body:
  text: 中菴集卷十九元劉敏中撰雜著劉彦輝字說東臯劉氏之子介邑儒生智甫見余繡水其容斤斤焉其辭氣侃侃焉問學曰讀書矣問年曰既冠矣已乃進而言曰小子未名且未字願公終教之敢再拜以請余異其秀俊而必其有立也名之以徳懋字之以彦輝懋勉也謂勉於徳則可以有輝也從而告之曰子知輝乎珪璧以琱琢之工而瑞軒冕玉之輝也鑑鐩以鍊冶之精而射日月金之輝也士君子以學行之修而昭事業人之輝也輝其苟然乎於傳有之曰宗族稱孝焉鄉黨稱弟焉非輝歟又曰一國之善士斯友一國之善士天下之善士斯友天下之善士非輝歟又曰立身行道揚名於後世以顯父母非輝歟其徳大者其輝逺其徳小者其輝近君子耻近而期逺謹小而務大嗚呼惟懼不能為鍊冶之金琱琢之玉也誠能之輝其隐乎勉之哉延祐二年重陽前三日中菴野叟書荅寓齋問寓齋主人問萬于中菴子中菴曰莫非寓也然惟君子可以言寓而衆人不知焉今吾子止一室琴瑟居左圖書在右古昔器物雜然前陳於以思古人考古道牖户之外無闗于心吾子之寓也吾子亦嘗端居宻坐周覧而泛觀乎天寓於運地寓于處其道以發生寓諸春以長養寓諸夏以揫歛閉藏寓諸秋冬日月之明寓諸晝夜風霆雨露霜雪隂陽晦明之氣寓諸變化惟物亦然山寓乎止水寓乎下草木寓于植羽鱗之屬寓諸飛潜人之道五帝寓諸無為三王寓諸仁臯䕫稷契伊傅周召寓諸得志兼善孔孟之道不行寓諸言為萬世法顔氏子寓諸簞瓢夷齊寓諸蕨薇其下阮藉陶潜劉伯倫之徒寓諸酒孫公和寓諸佯狂李白杜甫寓諸歌詩而皆終身焉故曰莫非寓也吾子徐而思之是其所寓與吾之所寓者為皆同乎不同乎不同而同乎其亦曰不同而同耳方其寓也偶然耶强為之耶不得不然而然耶其亦曰不得不然而然耳知其不得不然而然則其不同而同也審矣知其同也則特立兩間洞視千古而旁睨四海無羡無怵無怍無愧無餘無不足而吾子之樂有不可勝言者矣亦何止一室之内而已彼衆人者方倀倀焉眊眊焉顛酗于失得利害之塗求其心而不得庸暇知吾子之所為乎故曰惟君子可以言寓主人欣然曰大哉寓也微夫子言不聞請書之遂書以為答寓齋問主人姓張氏燕人諱綱文季其字云真止生士良傳敏中讀書困於暑虐因以已意取退筆管施竹其上以為扇用紙幎之既而取凉果勝他扇且又簡古輕便於閒中有甚宜者故戯為之傳實至元六年己巳嵗也觀虚子逰于黌山之下文水之陽見管城子卧于塗中蓬髪垢體變易形迹若耻于放棄者却顧有此君其形支離然倚户而立楮先生在側單獨虚薄無有處所乗風泠然如将仙舉者觀虚子環而相之聚而戯之曰吾觀子三人見棄于世離羣而索處者困亦乆矣今吾欲㸃化子等相附為一而為器使可乎三子忻然曰謹惟命於是使管城子去髪聳肩下立以主把握運動以此君鞠躬於上兩臂輪曲相接下麗其足以屬於管城子之肩若将為禮有所招徠者楮先生自後横以身掩蔽之為之承當容納以成就其事三子既為㸃化相附為一則輕𦂳圓健上下互用而天然一人莫知其為向之三者也觀虚子孰視而笑曰是足為吾軀處矣因携之以行俯仰動静惟觀虚子是聴微為指使則折腰再揖而清風凛然逼人世之飛蚊蒼蝇擾擾之徒皆潜而避去莫敢相近觀虚子大喜謂之曰爾可謂天下之最良者矣又以其相合而成也得止之義焉因號為真止生而名曰士良云士良惟惡寒且不喜見雨非是則觀虚子出必從以往士大夫之熱於中者見輙愛玩之惟貴家富兒弗顧也其後與東人齊紈西人白羽卿相遇二人素以紈綺自尚見士良竒古不常而賤辱之士良耻告觀虚子曰我以三人胥變而為他所不辭者亦庶幾因子以暢吾之風也今乃見辱於紈綺白靣小兒心甚悔焉願各陳其所懐去真止士良之目而復其初觀虚子許諾危坐而聴之管城子曰我之上世實為中書君厥功茂矣吾自毛髪時日記萬文其才鋒甚利竊嘗自謂凡今朝廷紀綱法度之典軍國號令符檄之言史氏紀録之策兵賦出入之籍其所摹畫者吾皆能為之惟其失勲伐故落泥塗中子不能洗濯以援我反易我於動摇之問而致我於非用之辱吾竊怨子矣此君曰吾禀性剛直不變寒暑雖足根在地而氣常凌雲然毎虚心待人人弗感其自有所存者期於風霜嵗寒摇落之後以致吾節耳今而零丁離析亦可嘆矣吾子顧無有平安曩昔之問乃更曲為矯揉唯吾子小器是利甚非所以待君子之道也楮先生曰吾性喜方而尚白自㓜下簾受書至於成章其行已未嘗有虧缺㸃染之失天下之載言紀事以播揚四方而傳言後世者莫我若也世不我用為兒輩所薄故翻覆無寧居偶遇子召故含糊而從子豈吾本心哉觀虚子聞之仰而笑俯而嘆扣管城子而言曰三子之所陳是矣雖然未聞道也子不見夫大塊之播物乎動者植者走者飛者小者大者愚者智者一受其成形而莫或易人見其若是也謂之固爾然而植者或徙之以行動者有不能以寸進飛者或失羽而走者忽假物以髙飛小者化而或大大者削而忽微愚者反有所成而智者或無為以終身是孰使之然哉亦其混淪於一氣之中忽變忽化自消自息而有以適然者矣夫松生於千仞之阿息之百年其大十圍人知其棟梁矣有為巨室者使梓人求大木梓人操斧斤以入山林則大木莫得有樗焉立於塗而其大適中梓人伐而取之山藻而文之歸以為巨室人莫知其樗也而松竟以逺見遺若然者果可以必其有用無用乎故凡求之而不獲為之而不成與不求而獲不為而成者皆時適然耳今以三子之才觀之則夫世之所謂髙爵厚禄者宜取之乆矣然其遇我於文水之陽也則流離覉孤孑孑中途顔色可憐而人無與為謀當是時也其亦已矣又豈知遇我之㸃化為一而且有真止之號與士良之名耶故三子之生而有才才而不用與今之遇我者皆時適然也又誰咎如悔其變已而為他則古人有為之者盖范蠡為鴟夷樗里子為囊傅說為舟楫為麯蘖為鹽梅而南郭子綦至於為死灰槁木盖委化而居乗變而行偶所以寓留者君子不恤也况今湯火炎酷之時衆人熬熬散處逃避子等方聚而為一飄飄然發豪爽於襟袖之間使夫汗顔而發赤者仰慕其清風斯亦足矣若夫見辱於紈綺小兒則亦寒士之常無足怪者適以見彼無良而我良矣何為媿耻憤怨而自悔耶三子於是瘖不復語退而為真止生如故云賛曰真止生士良之事得之於或人其怪已甚矣然觀虚子之言契乎理故傳而藏之觀虚子姓氏未詳亦不知何許人盖其有幻術知道者歟陽丘教諭張君贐行疏學者必有師師有束脩之報行者必以贐贐無百鎰之辭在禮則然從古如此張伯山才優命蹇道富身貧牢落儒冠半生螢雪蕭條學館三載虀鹽但弟子有進脩之功而邑人獲矜式之益今也及𤓰而代治任将歸探杜甫之嚢一錢何有睠昌黎之室五鬼仍随辦将數口饑寒往抗窮途嵗月困斯甚矣此時争得不傷心何以慰之我輩惟須大開手崇儒樂施一舉兩全此而不為所謂無勇明水長春觀重修三清殿募縁䟽物無不弊弊則新是名大道義有當為為必勇斯謂仁人居明水鄉長春觀曰孤雲子天逰寥廓既登衆妙之門嵗乆荒凉忍視三清之宇誓将完葺須藉扶持大凡羙服安居誰匪資於道廕不至傾囷倒廪何惜荅於神休聞必欣從來毋少後謹疏釋奠祝文宣聖惟王徳𢎞乾坤道昭日月闡百聖而無爽師萬世而有餘常祀之尊莫能以尚敬申遺典式薦微誠尚饗顔子惟公禀上智之資造聖人之域隐居求志知命不憂配食先師有光祀典仰希懿徳祗薦庶羞尚饗孟子惟公導王化之源救一時之弊開聖人之道破百世之疑業雖受子思之門功不在大禹之下宜配享禮丕播休風尚饗又釋奠祝文宣聖惟王道猶天之髙不可階而升也徳猶天之大不可指而名也百世萬世斯民頼以生也惟是菲薄所以展其敬而薦其誠也尚饗顔子惟公終日不言孰知其非愚簞瓢自樂孰知其弗癯惟聖人以為其殆庶哉而孟子謂之道同禹稷此其所以于今而配食也尚饗孟子惟公楊墨横流之際三綱五常幾于息矣公以浩然之氣卒闢而反諸正自聖人之道統言之公實為中興焉宜其配饗也尚饗至元恩澤頌并序傳曰惟天惠民惟辟奉天言王者當奉天以愛養其民也又曰宜民宜人受禄于天言為政而宜於民者天必佑之也故聖人有天下必以愛民為先務惻怛畏敬大明厥徳是以民人和於下天瑞應於上而天下治矣然而乾溢凶歉之變亦或不免而時有之何哉盖隂陽冥黙之運自有定數雖天亦有所不能已也茍為不然則堯之水湯之旱何從而至乎雖然聖人固知定數之不可違而憫斯民之實受其害更為畏懼形於思慮約已以禳之多方以救之未嘗以為當然而坐視也故堯咨訪於四岳湯自責以六事而周禮以大荒大札則令邦國移民通財舍禁弛力薄征緩刑是以民不失其所而灾害息天下之治固自若也主上以聖神文武天縱之徳嗣膺丕緒以為凡有此民天實付任在予予其祇承天意勿使失性周濟厥理故自即位専以徳教為治建官位事惟賢惟良民以不擾為靖賦役簡省禁網疏濶民以不蹙而裕是以風俗大和内外無患至於禮樂文物法度典章凡所設施粲然大備數年之間三光順軌風雨寒燠各以其叙而自古疏絶不臣之域皆鑿山駕海執其土物重譯而來朝咨嗟舞蹈願覩上國之風迓太平之光盖周之成康漢之文景唐之貞觀開元不足比其隆也自至元六年夏在所雨水滛溢秋大蝗旱冬煖無雪民騷然有凍餒流移之患其七月詔遣使决天下囚降其罪仍命户部視郡縣民灾之輕重减其租稅十二月復遣使發諸道轉運所蓄大賑貧乏至春始畢而雨天下之人同然一辭而交相謂曰我皇以奉天愛民既致太平矣今兹灾異特數之一定者天亦不得已而我皇能已之然則我皇之恩澤所以及我者吾庸知其淺深厚薄哉我生何幸適遘今日莫不感動交喜抃舞歡慶某以草茅鄙人猥占儒籍荷國厚恩報答無所覩此盛事不能黙黙竊述輿情作為至元恩澤頌一首雖不能盡揚洪休勒之金石而其所以歌詠聖時或可取也辭曰惟民之初孰鞠孰育既息而繁蠢爾有欲莫好匪逸莫惡匪危居得則喜在失則悲既無羽毛孰禦寒暑誰有爪牙物汝孰取腹爾必榖身爾必裳艱哉爾生罔攸胥匡天生聖人俾之司牧是噢是咻爾欲以足欲初弗獲厥惟不寧既獲其欲和樂且平赫赫我朝受天景命武威徳柔四方底定皇帝嗣服齊聖廣淵大徳大業復命於天天有顯道民爾時保皇惟靈承於赫有造我制我度我規我摹周旋萬幾惟天是符官惟予能爵罔及惡將臣相臣赳赳諤諤曰守曰牧暨羣有司恪恭朝夕莫或敢私惟是百官責同事異其同伊何惟民之為皇有公器曰賞與刑賞疑惟重刑疑惟輕亂蘖姦芽不威而息民心孔洽好生之徳皇咨爾民未厚厥生抑末崇本載薄其征皇咨爾民未寛其力省役休作優而不逼浩浩其澤優優其仁涵之如海煦之如春如天斯覆如地斯載民游于中莫究其大父子熈熈相寧以嬉我生固然其又何知至和薰融應感于上庶政無愆氣類交暢禮制樂作國儀是新聲教旁通聿來逺人大理雲南髙麗交趾珍怪萬殊薦我廟祀民于是觀皆曰太平誰其致之天子聖明皇曰匪予惟天之相匪予之相爾民是亮孰云此時乃有㐫災旱溢螟蝗三時不開民實困乏無有怨色云此有數我又何蹙皇惟哀矜以救以禳星馳鳥飛冠盖相望既决而獄水退于陸逮除而租蝗自竄伏民猶爾難旱猶爾常乃發我帑爰啟我倉大惠一出民忘其困膏雨繼之萬有随振惟時爾民有喜弗勝皷舞笑歡感泣以并民有頌言我饑既病今而飲食甘㫖斯盛民有頌言我寒莫支今而衣服單複具宜曩之我田燥不可治今則膏濡既耕既蒔民生不獲皇則佑之天災民罹皇復救之皇之恩澤浹民骨髓翼戴依歸何維其已邦以此固政以此成鯫儒作歌為民頌聲制心箴天有元氣萬物以生人之有心庶事以成是心之靈則天之經持之不回一利于貞强而不息是戒是懲廼致其一湛然而明施于五常五常以𢎞統彼衆務衆務以亨燭照臧否曰濁曰清始兹以終立身揚名茍墮于正遂汨其性天理既失百欲紛競乗釁而入莫之能勝罔然如矇眩厥視聴何仁何義棄賢與聖惟利是圖則害其命緬惟三才攸寧不病於惟君子克念克敬章甫冠銘并序盖嘗觀哀公問孔子儒服之說輙廢卷而嘆曰甚哉禮服之不可忽而徳業之不可不充也古者聖人制禮而寓諸器器所以藏禮也車服冠冕是已故器以明禮禮以象徳徳以守器有是徳也然後有是器也有是器也則必有是徳也是故君子無其徳不敢服其器服其器必思充其徳使徳與器交相養而不相悖則禮明而道尊然後可以立於世而免於咎矣哀公之問儒服也盖孔子服章甫焉曰夫子之服其儒服歟殆戯之也孔子對之曰丘少居魯衣逄掖之衣長居宋冠章甫之冠丘聞之也君子之學也博其服也鄉丘不知儒服乃特以儒行告焉按章甫冠文儒之服也公西赤曰宗廟之事如㑹同端章甫願為小相焉言欲冠章甫以相其宗廟㑹同之禮也郊特牲云委貎周道也章甫殷道也毋追夏后氏之道也而東漢志亦有委貎冠具文曰所謂夏之毋追殷之章甫也行大射於辟雍公卿大夫行禮者冠之則知章甫之用與委貎同也夫賛宗廟之事相㑹同之儀與行辟雍大射之禮非儒者之事乎故章甫得為文儒之服也而孔子之對云爾者當是之時大道潰裂聖人制禮之意不可復明而世之小人皆争竊君子之器而服之矣以下埒上以愚加賢以侈相尚以貴相髙顛倒混亂恬不知怪然其辱及于身而殃及于家者盖踵相接也於是不稱其服之譏見於詩而車澤人瘁之戒著於傳禮亡徳散至此而極矣雖有徳稱其服而服當其禮者孰能知之哉此孔子所以見戲於哀公也孔子之意以為問儒服而必以儒服對之則吾儒之道彼終莫能知也其心必且曰儒者之道如是乎則其辱又將不止於戱而已矣故慷慨激厲丁寧反復告以儒者之行聳動其心俾其悔悟知敬以明吾儒之道不徒在於服也故哀公聞之言加信行加義沒世不敢以儒為戲嗚呼以孔子而服儒者之服猶不免于不知者之戲然其聖徳在躬辭色之際有足以禦之矣後世為儒服者徳固不足於聖人而其不知而戲者復或甚於哀公然則所以禦之之道宜如何哉於是作章甫冠銘以諗吾同志庶幾知禮服之不可忽而徳業之不可不充也銘曰惟是章甫肇于殷兮名以義形章其身兮有光峩峩衆所觀兮世人不知或賈訕兮在我而服居然安兮厥徳弗充吾末如其冠兮寓齋銘并序人之好有甚異者察其意之所在而好可知矣陶潜愛琴不施徽絃曰但識琴中趣何勞絃上聲潜之意在乎識趣不在乎琴而寓之琴也支道林喜畜名馬人問其故曰吾自愛其神俊道林之意在乎神俊不在乎馬而寓之馬也燕人張文季有髙識晦迹自娯而惟古器古物是好真收偽黜日得日竒客至觀焉指示之曰此為夏為商為周此作于某代某嵗某氏則其喜躍然如生其時覩其人親炙其風烈而忘其千載之下也嘻文季之意在乎古矣器物云乎哉則亦陶之琴道林之馬耳秋澗翁以寓命其齋宜矣文季徴余言喜為之銘銘曰百年之寓形之役兮千古之寓心之適兮誰能以千古之適而忘其百年之役者吾與之匹兮退思亭銘為恩師作惟聖於道不思而得吾儕何人弗慮胡獲我亭以居將安我身此身甚微三才是均鞅與物處倐焉萬變酬酢應對詎能皆善善或弗充身何安為我休我亭静言以思向也所言若謀若事為得為失其非其是是邪得耶當復勉之失耶非耶必遽改之勉之所至滔滔莫禦改之所發挺挺斯舉善日以富身日以優以富以優職思之由行身有機思焉是繫能則為福否則為戾出而公家入而里閭拳拳爾思其曷忽諸竹糊扇銘二首抱節而鞠躬括外而虚中以質素為之彌縫噫當矯揉而不失其正此所以及我者凛然惟君子之風含糊匪子願屈曲随所遭請君挹清風乃始知其髙紙扇銘曲其握兮木之天圓其製兮竹之堅潔其面兮紙之瑩言其用兮物之賢得其天者吾知其不遷守其堅者亦能於自全終乎瑩者無由而可汚噫此其所以有清風之邈然也耶樗亭銘原注為回紇人作木材則伐而不才者全人賢而用而不賢者捐彼木無知材與非材者斯可與樗亭而同歸孝子贊元貞丙申冬之季月濟南經歴郭君澤民為余言此郡有唐宰相郭令公之後曰惟賔字敬輔者性篤孝其為志由身以外凡有為二親益者將無不為無不至也初其母疾百療無所效惟賔宻割肌和餌食之母食之良愈後數歳母疾復作劇甚醫視之皆拱揖而退于時惟賔知割肌已疾非典教所與乃獨齋戒泣涕致禱天地鬼神俄復獲勿藥之喜由是約以嵗之終始起十二月一日盡于正月之晦夜於庭中潔衣冠炷香仰天再拜以二親康寧夀考為禱嵗以為常如是者餘三十年而二親皆年踰八袠神明不少衰盖孝感之驗如此然其家素貧惟賔又能黽勉經理使無匱乏凡甘㫖之奉承事之節必皆適二親嗜好愛惡無不如意至元甲午有司以詔格状其行于朝已而命下復其役旌其門閭逺近翕然慕而化之明年其父卒盖八十又六矣惟賔痛絶哀毁幾至滅性以母故不得居墓側旦往哭諸墓返而慰其母羸疾不恤也於是惟賔之孝益著以聞顧所示後者非言莫可吾子能無意乎乃為賛云大哉孝乎萬化所根地紐天樞括乎人倫盖能不必學而致不待教而馴内不言於其利外不期於有聞乃當然固有之至理均一氣之絪緼蚩蚩者氓或亡或存聖人以是因嚴以教敬因親以教愛使不至於散朴而醨醇亦何憚夫表異之懇懇牽導之勤勤偉乎惟賔其孝惟純出入動静燠寒晨昏百為一念而惟吾親定省清温甘㫖日新苐致其樂孰知其貧二親愉愉偕軼八旬忻忻畢應惟孝感神擴兮天恩爾訪爾詢旌于而門復于而身俾觀者為之載躍載忻與夫潁考叔之錫類伊不狹而孔殷豈期天隕慟徹九原返以母慰里閭悲辛偉乎惟賔汝南之裔汾陽之孫遥遥世芬不乏其人咄君誠為孝子矣遺澤餘烈之所發後當復有名節凛凛忠義報國之臣乎慵齋贊至元甲申閏月余以事乗傳至林棠謁教授朱景文先生因詢其士大夫之賢者先生曰此邦之賢者衆矣文章某徳行某文而才者某有和君者所居曰慵齋自號曰懶翁是益賢矣余竊疑焉曰由聖人至於衆人雖其事業大小之不同而其所有不得不同者盖亦曰勤而已矣今獨曰慵豈理也哉是必自棄人也何賢乎翌日先生與諸君偕來指而謂余曰此某也此某也揖與之坐徐叩而觀之則儀状嶷嶷然辭氣蔚蔚然凛凛乎有不可近者嗚呼信乎其皆賢矣其所謂慵齋者盖亦不敢疑已居數日始盡得慵齋之為人乃嘆曰是誠賢者歟然則慵而疑之者名也非實也其自誣也賢而稱之者實也非名也其自晦也夫不求其實而疑其名可乎哉於是表其實而為之賛曰謂子非慵歟則名之屋廬稱其里閭不耕不蠶而匪陶匪漁偃蹇骯髒與世濶踈或捫蝨負暄而膚垢滿爪或脱巾對客而醉髪不梳䄂手而處蓬藋塞户而不理展足而卧水火及身而弗趨漠焉而倦鳥歸雲兀然而槁木朽株盖未嘗致一念於衣食之計况富貴與名譽此雖有天下之至懶吾知其子之不如謂子為慵歟則躭詩悦書憎俗好儒外若不足而内實有餘乍辯乍訥若智若愚徒見其家人嗃嗃弟子渠渠雖鄙夫與儇子薫其徳而善良者不知其幾人莫不致敬愛以交孚故知夫分别義理無遺錙銖作為文章優于楷模若是而子謂慵者吾恐子誣雖然吾亦知子者是不以天下之所利者而以易吾之性不以天下之所患者而以毒吾之軀知珍異難售故寧懐珠於布􅃭知薫沐之非榮故寧曵尾於泥塗是將潜聲匿耀以自逃夫一世之外而以全其天者乎吁亦賢矣夫㕘政張公先世行状大徳改元之春今㕘知政事張公由僉江浙行省入中書既五閱嵗告其邑人劉某曰某以一介之微猥緣遭際荷國厚恩禄寵之來皆出望外緬惟祖先之所以劬躬燾後者無所顯明用戚于厥心今將求大人先生文之貞珉為松楸九泉之慰吾子吾鄉曲也宜為我状其所以然乎乃取公之所紀暨敏中之所見聞者偹書之立言者可以考焉張氏世為濟南章丘人去邑郛東南十里而近長白之麓繡之東壖喬林間錯廣原如繪其鄉曰錦川者乃其居也逺祖諱汝礪有子曰義通而譜逸世次莫詳五世祖諱九思性朴實不事紛華用是家道寖隆以今朝普恩官進義校尉髙祖諱安上有孝友之行配喬氏四子鐸鑑鉉銳鐸之子曰瑾鑑鉉皆再世弗嗣銳即公之曽祖也為人謙謹操行如前人配孫氏三子長曰侁次曰伸季曰仲季則公之大父也皆嘗入粟佐軍興授進義校尉屬金末之亂所在惡少羣起為盜以張之饒於財且易其不武也屢剽刼之伯祖侁竟遇害次伯祖伸獨以得所依附而免大父盖幾不免虎口者數矣至首體無完膚由是避地遷徙無常處國初東州甫平亟挈家還故墟而丘壠宛然乃率諸子力穡為乆逺計張氏之興實始于此嘗指其所傷痕示諸子曰始吾家以謹厚勤儉致饒而且猶召此况不義之積乎財固不必多而謹厚勤儉不可一日輟也汝輩宜誌之㑹子琛從軍平河南凡所招來役屬之人即送之家大父憐之悉為之區處存撫俾各得其所而後已其俘獲男女皆配為良人使自便其治家尚嚴内外肅然方生理未就緒即置黌舍廪師儒于家踰二十年不廢里中子弟亦知相率就學土俗由之一變故質而有為仁而有量皆性之所自出鄉人敬焉享年七十有一而殁配喬氏早卒再娶李氏五子長曰琮仲曰玘喬出也次寳次珍次瑞李出也其仲為公之父生長亂離間盖嘗嬰多難而濟屯執賤役以幹蠱矧兄亡弟㓜百責是萃攻苦食淡以循所天其志行之卓異槩可見矣既素履艱辛尤尚節儉獨為子收書不厭雖甚貴不計其直至或輟用以酬見其子好學從文士游喜曰吾生不遇時常以不得讀書為恨爾今若是吾無恨矣毎炷香書厨前拜曰聖賢在此敢不敬乎其樂善又如此至元乙亥八月四日以疾終于家年六十有六妣齊氏内行純偹戚踈無間言卒年七十有九實元貞丙申十一月十有二日也三子長曰澄次曰斯和皆不仕季曰斯立叅政公也公之顯自行臺監察御史歴行省員外郎郎中户部侍郎叅議中書省事户部尚書僉江浙行省事官稱望隆遂叅大政而且夙夜祗畏先徳是思得立身揚名之義可謂孝矣初其㓜也頴悟絶人日記數千言不忘及為山東憲司掾益力學務為無所不窺而氣與義集志以學廣積于中形于外而人或未知知之或未盡也時我先人隠居濟南一日見公與之言驚謂公曰我常往來吾鄉覧其山川秀異謂宜有通博俊偉任重之才為盛時大用者生于其間求之盖二十年未見其人以今觀子子其是乎願子勉之聞者皆知敬公矣距今又三十年而竟如其言某獨悲先人之不得見也竊嘗思之傳稱積善之家必有餘慶夫所謂慶者豈非其有子孫而才且賢歟而才賢之生又非偶然其必待夫山川靈異之氣藴蓄融液而後為之歟山川靈異之氣藴蓄融液而生夫才與賢也又恒必在於積善之家也歟嗚呼今以張氏之始終觀之尤信謹状中菴集卷十九
