body:
  text: 中庵集卷十二元劉敏中撰記二靈惠祠新田記靈惠祠濟南龍洞山靈祠也濟南當山水勝絶之區民物繁阜甲於海右蓋昔為州治今為路置總府監司在焉城之南連延皆山東南距僅三十里鬱然隆秀者龍祠也山之麓陂陀掩互卷折而入山益深俄而崖壁四豁翠削萬仭仰視天宇如墮壺中東崖半空有巨穴黯黮如側甗父老傳云異時民嘗懸入避兵西南石洞穹邃如連厦可居有潭焉泓澄甘冽不溢不涸嵗旱禱雨雪輒應斯山之所由名而祠之所由立歟凡石刻四其一摧剝不可讀僅辨者大魏天平四年官爵四列亡其名天平東魏也其一宋元豐某年太守韓鐸以禱雪請封順應侯其一金皇統辛酉南陽韓公美禱雨靈惠公祠而不著加封之始其一國初濟南張侯新其祠募僧守之觀此山之靈其來尚矣皇慶癸丑夏旱中奉大夫肅政廉訪使阿爾斯蘭哈雅暨懷逺大將軍濟南路總管府達嚕噶齊布哷齊率所屬詣祠期七日雨禱焉禮成中奉謂懷逺君可留需而歸懷逺虔祝無夙夜未及期雨嵗熟明年夏又旱中奉公禱如前屬總管袁太中某俟雨夜未半雨大降嵗以又熟中奉念其祠宇弊圯命葺之煥爾一新又以守僧無所仰給屢荒懈以去有淨僧曰洪貴乃召以嗣守為圖其所以自給者適洪貴來以疏謁中奉欣然割祿廪以先於是由憲屬以及轉運總府皆如之而尚義慕善者多與之焉乃胥議買田若干畝劵於祠下府推李承直狀其事懇余記夫雲行雨施天地之所以育物也事神庇民王者之所以有國也而雲雨之出山川實司之神民之托有司實任之蓋山川必峻深而靈夫然後可以出雲雨以育乎物有司必正直而誠夫然後可以感夫山川之靈而民得以賴其雲雨之庇也乃或掊克以為能猜禍以為才髙下以害於公貪墨以濟其私政窳而不懼民困而弗憫水旱則循故事飾貌敬以從山川之禮若是者神固不答而災必不息嘻民之庇何望哉今中奉公以持憲之寄袁太中君以承宣之責連嵗致禱神應如響向所謂正直而誠者其素著可知矣矧又新祠宇以妥靈創田疇為久計則於事神庇民之道不既盡且逺乎是宜書故書大聖院記能人之所不可能者人必服焉知人之所不可知者人必希焉一介之夫為絶技竒巧詭聞異辨以自鬻於通逹闤闠之中人之觀之者必皆奔走疊足翹首羡嘆怵心而奪氣何者彼固不可能不可知也而况設不可能之法倡不可知之説以立教於天下者乎夫仰而父母俯而妻子家居而肉食人之至情也而浮圖之法則曰必去父母絶妻子毁形而獨處疏食而不殺若此者彼能之而我亦能之乎生而生死而死善而得賞不善而得罰人之常理也而浮圖之説則曰吾之道可以度生死消罪惡增福而延夀若此者彼知之而我亦知之乎惟其不可能故憚而服焉不可知故異而希焉嗚呼此天下之人所以風從景附輟其所有爭趨競赴也浮圖之法其果盛矣夫况於信能逹空有明戒律由自苦利人之念深入法海者出而輔其教則人之嚮之不益宜哉歷城之東五十里有山曰采石山之巔有曰大聖院者僧智坦實居之坦於經律邃甚為苦行旦夕惟一食羸形敗衲固然已院久弊當葺而其山皆石乏材水土取山下難之聞者欣然輻輳願役輦土挽材荷水而上無幾何二殿兩廡暨諸像設煥爾一新一日來求文為記且曰自唐貞觀間有僧號真覺者始居此山殁而多靈迹人以為聖院之所由名也乞併記之余獨嘉坦能有實行宜人之歸嚮也勉為之書陽丘琉璃寺興復記陽丘琉璃寺舊矣燬於金季之亂系派碑志散落具盡莫知所從始嵗丁未邑僧德越毅然嘆曰是惟古名剎不能復是忘吾教也吾其任之謁於有司許焉乃剪榛莽闢瓦礫堙坎夷阜鳩用庀材信念既孚施者響赴井竈爰啓垣墉聿興嵗未幾何而佛殿巍然蓋為楹者六為棟者九尋為東西廡如其楹而殺其棟之二帑廪僧室以次而序乃書故號揭之崇門於是琉璃寺煥然復興矣越率其徒日夕持誦講説事佛唯謹既而教大行學者益至故徒衆之盛他寺莫比今越以寺之本末來請曰德越經營此寺凡五十年其勤至矣同是勤者蓋法姪曰行興法嗣曰行順行滋行印今益老矣念所以付後人示久者非文諸石莫可敢以是託豫見之佛書西方有國曰身毒有佛曰釋迦牟尼言曰東方去此過十殑伽沙佛土有世界曰淨琉璃佛號藥師琉璃光如來是佛行菩薩道時嘗作大願念言願我來世得菩薩時身琉璃內外明徹光於日月燭諸有情一切苦厄罪業聞我名號以我福德威力咸得解脫其説云爾始之名寺者取於此乎嗚呼是説之傳也久矣世之人靡然捨其所有施施衎衎惟佛之為歸者甚矣夫所以然者豈非以佛之法果能救苦厄拔罪業有所利己而求歟然即而求其所以救拔之實則寂而不可得雖然佛豈欺我哉豫惟佛之説是特誘人向善之一法耳彼方之來也見吾之戒律之嚴願念之大智慧之廣悲捨方便之設施則其向善之心油然生矣故貪者思廉恪者思捨媢嫉者思正直而強暴者思柔良悲悔開悟日進於善而至於無有不善則所謂苦厄罪業將無自而至不幸而罹焉則亦不足以勝吾善救拔之實宜莫過此以是求之則佛之法能於利人也果矣而為其徒者宜思其戒律之所以嚴願念之所以大智慧之所以廣悲捨方便之所以設施勇猛精進念念在是以求佛之所以誘人於善者而致其利之之實以嗣其道以行其教斯可矣苟不是圗而習其人之歸已也以為吾法之固然徒以自利而乃無有以利人者豈佛之法哉豫既重越請而為之記又以告夫來者使無忘其師之勤不以自利而急於利人也越李姓大名人年十一祝陽丘嘗為縣都綱號淨行大師加號淨惠圓照大師至元丙子秋以千僧召至闕作佛事大殿人知其能云元貞二年秋七月既望記陽丘彌陀院記陽丘古名邑土沃物豐而山水之勝在邑郛田廬間出沒回互隱若繪畫斯固幽人過客之所顧瞻而徘徊黃冠緇衣之所願留而寄迹也有尼曰崇遇世女真始祝髮於某地號彌陀師屬嵗艱飛錫東邁悅兹邑止焉崇遇功德內充英華外見一邑之人翕然敬嚮今致仕武德將軍濟州尹張侯亨先府君某時為監縣獨輟邑艮隅地贏三畝施焉崇遇大書彌陀院三字揭於其陽茨而居之方圖為經營而崇遇逝其嗣曰妙玉謹於師承深入法海一日謂其徒普聰輩曰兹院之始我先師設念輸誠誓成勝剎上以祝釐天朝下以賴及民俗以無負張侯先府君惠顧之德志勿遂而沒我輩宜何如哉衆皆曰力焉可也由是相與黽勉從事無計嵗月為門墻為法堂為兩廡為釋迦馬鳴菩薩有室蜀將軍有祠厨庫齋舍次第具舉法相既崇戒律益嚴持誦祈祝無懈晨夕梵唄之音洋洋於外信善檀施日集踵來罔不作禮瞻仰美贊歡喜妙玉復語其徒曰今若是苟精進弗已則吾之志庶終有以遂乎無何妙玉卒而普聰嗣普聰念二師之勤介縣教王思哲以院記請嗚呼佛之道大率以斯世為夢幻能知夢幻者莫若心故因心以求道道得而然後可以脫夢幻之域而成佛何以言之心之體靜接於物而動曰情情之所向猶川決駟馳莫可制禦故雖能知夢幻之所在而能不為彼之所汨者幾希欲棄而弗忍既去而復顧卒落落焉陷於貪妄水火之中而不能相出是可悲已於是思有以制其情以降伏其心而先其難者乃去父母絶室家變形異服疏食而不殺苟可以汨我者皆種種斥去堅持密拒俾無所漏佚其名曰戒戒故能定定故能慧至於慧始能超正覺一空諸有攝諸法度一切光明變化無適而不可佛之道備矣嗚呼凡稱佛弟子者嘗亦有思乎思而至於斯其弗艱矣乎其弗甚矣乎余聞普聰蛻迹塵纍確然以苦行自修而徒益衆二師之道益宏能謹戒者也乃為之書靈泉庵記濟南大縣二曰陽丘曰鄒平鄒平之右陽丘之左有山焉其名長白聨亘南北巉然絶空邃鬱竒秀而中多勝迹若會仙有臺讀書有堂醴泉有寺衆仙有觀莫可殫舉山之西偏半腹有庵曰靈泉磴石盤紆嵓岫環合蒼壁削立泉出甚冽清泠潺湲無舍旦夕匯而為池導而為派啜飲浣濯灌溉不勞而足庵之所由名也泉少東曰流飛之亭亭西南曰三清之堂堂之背曰希真之室厨庾齋舍次第之後四旁壠畦千塍木果萬株髙下間錯如綺殆又勝之勝者歟厥初道士鄭志賢有勤行能以醫藥濟人其師曰時政約政約之師曰韓志具號巨陽子受學於玉陽真人志賢殁王德安嗣德安弟子曰焦賢止曰陳道綮曰張賢忠其徒僅四三人皆其淳靜虗邈與俗隔日惟參禮誦祝躬播穫種植為事休休焉于于焉一無待於外觀其為道蓋古之所謂自食其力者德安等念先師之勤以其庵之本末請余記嗚呼山之勝天地之所設也然覩而知其勝者鮮矣知其勝樂之而又安之者益鮮矣庸夫野叟窮年山溪間漁採而已動大者可濶三四尺而蠶經十五月即入荷中成繭形如斗自然五色國人繅之以織神錦故謂靈泉絲以下原缺既濟庵記初陽丘道士有曰石先生者居通真庵女郎山南麓自號堅然子以道術重邑中堅然子殁弟子德淳嗣德淳始事堅然子生十有二年性剛介靜一不屑與世俗接一夕歎曰吾師往矣吾聞天下名山大川多異人勝迹吾將觀焉於是由岱宗涉汶泗西陟嵩華瞰終南浮江窺五湖叩衡霍遵海濱而北倣徉燕趙之郊盡太行以歸布襦草屩片影一身其去泠然其來沖然人之重之愈於堅然子矣語其徒曰吾道以勤儉不懈為用頽弛無所事其可乎乃即通真之陽百舉武營隙地為祠宇為門墻為真武像别號靈應觀已乃又即郭西踰再里為石室居天地水三神焉葺庵其側以既濟名之揖余言曰凡興作有紀靈應未敢請願吾子記既濟也余疑而問焉曰在易離下坎上其卦既濟解者以為炊㸑之象隂符言食其時百骸理豈將謹烹飪時飲食以養其體以利其徒以及諸其人若是而為既濟者乎德淳漠然無言余曰否則豈將事龍虎鉛汞之説潄錬吐納使坎離逆行以久不死若是而為既濟者乎又無言余曰否則豈將化丹砂為黃金煉大藥餌之期飛升若是而為既濟者乎復無言余曰否則其將以自然為火以不息為水以冥漠為釡鬵綜衆妙混羣有與之鼓蕩融液翕忽變化自消自息各成其成廓兮契玄同逰無窮若是而為既濟者乎德淳矍然曰之言也子烏得而知之余曰庶矣乎曰庶矣乃書而為記德淳姓髙氏字清甫邑之臨清人其弟子曰道安申姓凡靈應既濟之地計共得十畝而既濟為六畝又半靈應可知已皆通真故業受之堅然子云至大二年己酉五月既望邑人劉某記神霄萬夀宫記濟之任城神霄萬夀宫女師所居也舊為神霄觀嵗己未師妙清始以州將蕭君請葺而居之妙清傳之守淨守淨殁傳之慧秀益能謹師承嚴戒律作於衆先苦於自修行髙而人益信凡觀宇之內弊者以更闕者以營嵗未幾何而殿廡一新儀像交輝道宏而徒益衆於是用長教玄逸真人命易觀以宫而加其名焉且假慧秀以提點之號使振其宫事實至元庚寅嵗也慧秀謂其徒其為我謀上有以侈先師之報下有以付後人之託者遂以其事走京師因翰林應奉馬君子敬修撰羅君叔逹請記於豫豫惟道家者流學為老氏者也老氏之言曰大丈夫處其厚不處其薄居其實而不居其華大約以禮制為薄而以智謀為華也故黜聰明絶巧利寡欲少私抱一守朴其究歸於無為而止耳而後之學者遂乃去有生之樂割天倫之愛遺形以求其道竭力以張其門甚者乃嵓棲野處衣草食木與麋鹿虎豹為朋儔百困而不反吁尤難能矣若是者豈其與向之所謂丈夫者又加愈乎雖然既曰丈夫矣能之可也孰謂女子而亦復能之乎易稱坤至柔而剛至靜而方語女道也夫苟能充其剛方之實則丈夫之所能者或亦可以至矣嗚呼凡女子之學為老氏者其皆剛方者乎慧秀之為也果能出於此乎其若是則二君之請與豫之從其請者將無不可矣乃為之書慧秀姓劉氏任城人大德壬寅夏五月記野亭記余既為含暉亭去含暉而北里許繡江之東壖余舊廬之陽十舉武有隙地焉因俯江流穹崖危絶有杏皆巨幹憑其危駢據而立東則桃李雜卉間列南北加之春葩亂發如綺夾江髙栁萬株佳禽異烏往來飛鳴俯見江中遊魚恆百尾跳躍上下可數江之西皆緑野盡西山而止南山翳長林乍隱乍見如翠屏見簾幃間霜秋木脫則峯騰谷踴千里一目早晏之際煙雲益竒昔嘗立其處顧而愛之曰兹於亭宜蓋志存而未暇也自去嵗由國子司業以病歸歷下今年春來繡江乃始治其地為亭於西偏近江故也既成坐其上而煙雲之狀山水之秀草木之縟繁魚鳥之飛躍則皆增竒益勝坌焉而來集若知有歸者焉余於是果知亭之宜也徐而思其名則曰邑外曰郊郊外曰野今為亭於兹焉斯野矣文勝質則史質勝文則野若余者質之尤乎滋野矣合二野以接乎物則夫向之所謂煙雲山水草木魚鳥坌焉而來集者皆野矣又方與野翁酌野杯為野談醉則縱野歌而和之以肆其真兹又野之野矣然而煙雲山水草木魚鳥與夫野翁皆悠悠焉自得相忘其野而不知野之樂而余知之余能知野之樂而不能集衆野而為一野之樂而亭能之然則野之至莫如亭乃名曰野亭而為之記元貞丙申秋八月朔書於壁余作二草亭以為村居往來遊息之所咸以謬作志諸其壁頃常與邑宰申君仲和甫諸公吟眺其上仲和甫絶愛之乃手為此圖軸而見貺且請以二謬作書於圖左目曰江亭往來圖遂從之為江亭云嵗十一月八日劉某書太初巖記繡江之源其泉曰百脈去百脈西南七八里皆淺山坡陀不可種藝而其下多石然未有識而取者頃年居人古齋張君受益始發之其尤者蓋取其三焉而人知欲之矣大德甲辰三月余歸自京師張君秀實為余言頃行百脈南土中有石得其膚竒焉志而取之未暇也願效諸子余使視之果竒而取之以四月三日引大車十五犗以北凡二十里置余繡江所居中菴之前隱然竒觀也其色黝如其聲鏗如其崇尋其廣厚半其崇其重以力約之為鈞者幾三百焉其狀正視之雄古嚴重如異人紳士廣袂大冠端嚴而立背視之昂藏突兀如立鶚驚麕欲去且止矯首而視觀其左則頽簷綻壁掩互呀豁窺其右則熊虎蹲跪怒將搏人腹有大竅如側甗復唇疊映宛轉如杯出其背衆竅貫之外逹中空側甗而下右偏則所謂膚者有文焉隱隱如龜兆如蛇腹如魚鱗或曰溜穿也其圻堮之亷隅孔坎之渾圓左右上下之顧揖殆若人為然石之出也居土僅尺偃卧而北首其四旁皆大石附而不屬土周隙間宛猶胞胎其屬者才數寸當其附之左抉其土斫其屬碎其旁石而竒觀出矣嘻石頑物也而其巧周密如是始之造物者豈誠有意於此耶一受其成形迄於今之出卒無玉焚之厄而有璧完之喜將復有神物護持之耶由結繩而後陵谷凡幾遷世代凡幾更雖強有力者曽莫之得而必我焉是歸又其數耶皆其偶然而然耶昔唐宰相竒章公嗜石玩之京都求於四方以江南太湖者為第一嗚呼石雖竒而好異勞人甚矣今是石之出不於四方而於家山不以勢私而以天全非逺而竒不求而至無好異之名無勞人之嫌余勝竒章矣復不知竒章之石與彼所謂太湖者果誰為第一哉或曰石不可無名因取稼軒山鬼謡語命之太初又曰峯巒巖岫各名其形於是四者石宜何居審視之宜巖遂定名曰太初巖云相是役者秀實古齋孤雲子三張君暨余族弟仲寬驛長趙君諸人也是月既望主人書浸竹記物之理無窮人之智亦無窮自兩儀之化三辰之運二氣五行之錯下而至於萬生萬物萬彚之别洪纎隱顯有常有變者理之無窮也自大聖之造大賢之為志士通人之作下而至於一夫一婦之見精粗逺近有能有否者智之無窮也惟其智之無窮故所知不齊故其理有得有不得者焉余性喜竹嘗取竹浸之瓶旋視其葉皆卷然而稿始未之恤也他日復為之復然乃異而歎曰凡葩卉至柔皆可浸竹復剛徑乃獨不可乎求其理而不得徒以竹為必不可浸也久矣張西全子京監郡建昌受代而歸也過余繡江子京以王謝故家好事博聞知名觴詠之次以浸竹訪之子京曰易為耳乃起獨以瓶水取竹置諸几前抵暮客散竹如故翌日弗改浹辰森然如生出而察之蓋皆竹之旁枝取一節斷其上下僅留寸餘使橫浮瓶中而節間小枝才數葉而已徐思其理竹性中空而有節根莖皆然筍生節間節所以為根莖所以資節也今其一節之取水滋兩端則節間小枝猶筍之在根葉少而養有餘此其所以森然也歟若夫槩視漫取枝􅜩而植浸節格而水不逹葉多而養不足此其所以卷然也歟已而子京至以是審之子京笑曰得之矣嗟乎空洞六合翕忽萬有覿面隔山淵反手殊霄壤者多矣奚獨竹哉理智之果無窮也如此余因有感焉古之人以竹比君子彼君子者挺風霜之操負凌雲之氣而進之不以道接之不以禮則必韜光匿彩雖殺身不辱非竹之向也遇我乎及夫進之以其道接之以其禮則凌雲之氣必舒而為民瞻風霜之操必顯而為時用非竹之今遇子京乎嗚呼竹乎信君子之所取乎余既嗟理智之無窮又感夫竹果有君子之道也書以遺子京為浸竹記二石記小石二其一得之東里尼福辨隆中而員外反復若一若根括渾然徑寸有三分色黲白瑩潤如玉其一得之齊東張友賢初友賢過余見辨石几間驚謂斯吾石奚為在此為言其所從得嘆曰吾之石其斯石之匹歟當以為遺一日友賢之石至並置之色狀圓徑莫能彼此也權其重輕均六兩又半吻然不相踰異哉嗚呼二石在萬有中微之微者也而其異乃爾由是而觀物之理庸可盡乎延祐戊午季春三日志於繡江北堂中菴集卷十二
