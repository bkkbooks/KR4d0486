body:
  text: 中庵集卷一元劉敏中撰賦勵志賦余讀書既冠殊拙於生理其於求田問舍之事遼然不知也然給養之資日以艱窘恐以貧乏纍其志氣乃作勵志賦以自勉其詞曰吁咄哉何天之生我也悟然而有知既不能粹我以超然而智兮又不能愚我以朦然而癡自親生之膝下兮固亦知愛敬之日孜元氣假我以五常兮父母鞠我以恩慈逮總角之嬉戲兮導我以文字為學之規既庭訓之祇受兮亦學禮而興詩信聖之不我欺兮日是誦而是師知仁義之為美兮以忠信而自持紉秋蘭以為佩兮服薜芷與江蘺審先民之行為兮獨憤然而永思既踊躍以欣慕兮亦慷慨而傷悲彼皋陶之在上兮既帝載之克熙釋耒耜以天下自任兮永徽烈乎商伊辭傅巖以即相兮豈時運之或竒也哉夫何三閭之憔悴兮沈溺乎江之湄賈誼倐其軒舉兮忽長沙之棄遺嗟小人之紛擾兮莫不移世以阿時既靡靡以自安兮亦睊睊以相危恃其志之已得兮惟侈縱之日滋苟一時之榮耀兮實萬世之嗤也兹既通塞之異軌兮何清濁之不可力而推也蹇余生之不辰兮抱寸誠以孳孶企古人之悠邈兮喟遑遑其欲追擬修名之屹立兮以聖道而自期春與秋其代序兮日月忽其若馳翔世途以徘徊兮撫斯文以嗟咨時既與我齟齬兮事與我而相違學澶漫而未精兮形瘵弱其神疲顧生資之迫狹兮慮給養之莫支余既不能規規於田舍兮又不能求龍斷而登之望朱門而將進兮無愈色與妍辭願得羽翼如雲之我身兮余將薄六合而逺飛又欲浮靈槎於滄海兮泛崑崙以遊嬉乘天風以越閶闔兮訪王母於瑤池餌金砂以煉質兮潄瓊液以生肥跨鸞鶴以為馭兮襜雲霞以為衣亦知兹懷之不可必兮竟鬱鬱以安歸已焉哉蓋士於世也窮達否泰詎能極兮姑俯仰而隨宜幸孔門之可以倚依兮依顔曾以棲遲從衆人之相易兮保良心而靡移聽天命以升沈兮余終不能若兒女子之所為也東山賦東山者實長白山也自歷城觀之故言東山時吾友人智仲敬寓迹於兹山之左故作東山賦以敘相憶之意云耳歷城之東直望百餘里見雲峰之嶕嶤實曰長白傲然今古橫絶於層霄崖崩壁削嵐飛煙薄兮變氣候於昏朝麋鹿遊而猿鶴哀鳴兮木無風而蕭蕭念佳人兮此留度期會兮何遙想夫君兮安適抑余懷之罔極或登髙而望逺亦沈吟而太息窮仙臺之勝境訪黌堂之遺迹慨然長歌而悲嘯忽風驚而雲析山泉鳴兮筆雨寒山光動兮酒波碧發壯懷於塵世飛妙墨於石壁仰蒼穹兮何言撫丹心兮誰識頓騏驥之駿足戢鴻鵠之徑翮亦必能掃情而滌思聽其時而自得望夫君兮安至憂紛紛兮心醉知危樓之幾登越河橋兮再四目蒼波之東注恨白日之西墜每當渴君之德望君之顔兮空徘徊把酒挹夫東山之餘翠奉試俊民甸四方賦運啓明主時多俊民列庶位以咸若甸四方而有因偉兹間出之賢優加委任治爾攸同之域盡入陶鈞書曰民罔胥匡也賴君寵綏君不遍愛也須臣共理然英特之士弗得而用則治化之功曷從而起載惟此故任三俊以為先肇自于今甸四方而有以以爾瑚璉之秀楩楠之良抱經世之才者乃稷乃契明撫字之術者如龔如黃上果純於任使世可拱於平康藹藹盈庭覯爾雲集之士皇皇奠枕安于斗制之方夫何澤周人物之繁教被海隅之四外張國勢之隆盛內格邦風之純粹良由妙於選賢使之在位有文學有德行以次而升自南北自東西不勞而治惟賢臣乃能𢎞聖主之業而君子所以為邦家之基方國必欲甸也俊民其何舍之以見周任仁人國果聞於昌熾殷獲良弼邦自底於安綏是知民區甚逺也難遍於照臨事幾至微也孰知其紀統必求治效之克即可不人材而與共不然何以疏詳方朔云得士則乃昌傳質班生謂惟賢而是用已而公道無壅俊民必登忠殫兮力竭害除兮利興翕若四方之作乂截然庶績之丕凝如是下彰報國之勞咸伸素願上享得人之逸益介休徴大凡當世之安皆本真賢之進舜帝以是而大闢於仕路唐堯以是而克明於登俊方今網羅天下之賢才而甸夫四方功業逺超於堯舜臘粥賦原注戲為智仲敬作東里先生臘辰入學為諸生設粥以應故事方其為粥也戒竈厨之神潔錡釜之器屏黜異饌掃除邪味意以清而取竒物以多而為貴於是勑老庖役臺輿雞未鳴而先起咸受命而奔趨積薪若山貯水成湖大杓巨盎後列前敷淅長腰之玉粒瀉小豆之紅珠破霜粟之金丸屑山藥之瓊膚紛衆材之畢集俾效用於一區方相接其未久迹難混而猶踈逮夫坎離既濟之後庚癸相合之初翕和氣之回春一作雲蒸破臘寒於須臾乍蚯蚓之一鳴忽秋蟲之滿廬俄而怒風逺來萬竅號呼撼千丈之長松響十里之楸梧少焉則驚湍拍堤急溜鳴渠漸威聲之衰息方訟語之囁嚅復若泣以若叱亦或吹而或欨忽蓬蓬然告熟恍融蠟以凝酥品色香之殊絶賞至味之芳腴笑倉惶於公孫陋咄嗟於齊奴彼黃冠與緇衣方擊鐘以鳴魚雖大同而小異詎可企吾之清虛于時朝日升陽和舒烏丸炯兮映窗獸煤烘兮滿爐則有玄齡稚兒青襟小儒若驥之子或鳯之雛咸鞠躬而來思矜步武之襜如揖先生而登堂各齒列乎坐隅比粥令之一行皆攫碗以拏盂俄匕鳴而頰響驚齊譟於千夫類昆陽之戰酣捲百萬以如無先生熟視撫掌助聲勢而奮鬚謂吾黨之能事快雄俊之起豫顧童子其何知已鼓腹而奔衢矣先生於是餘勇未歇食思方騁取榖氣之精華喜漸入於佳境促孟光之舉案方緩帶而笑領鄙勺飲之孱懦空數杯於俄頃已而玉池之水生甘詩腹之雷不鳴和暢五神驅除三彭杜邪疾於他日養浩氣於平生彼東坡之玉糝與吳下之蓴羮較功用於錙銖蓋未許其同盟况乎周顗之炙孝儀之鯖皆潛伏於鴆毒亦何恤乎羶腥將奔避之不暇尚安敢嬰吾鋒而抗吾衡也先生乃曠然心平融然氣和舒然而伸悠然而歌歌曰以不殺而仁兮吾何憂既易得而易足兮吾何求諒此味之天成兮吾何以酬雖然無用山澤之癯兮猶可以為肉食之謀也騷思蘭辭二首并序大易稱同心之言其臭如蘭屈原著離騷以香草譬君子有滋蘭紉蘭之語則蘭之見重于世久矣吾黨張君智甫隱居好古取蘭江南植之家園月養嵗滋九畹可待且命其所居之室曰楚香食飲起居必與蘭對得君子同德之義若是蘭與人偕重矣然余徒知重其所重而蘭則未見也乃擬楚詞作思蘭吟二首貽智甫俟他日醉楚香堂歌以為蘭慰其辭曰蘭生兮猗猗其芳兮菲菲山空兮無人水濺濺兮石纍纍楚魂不歸兮夫誰與期儼髙潔兮自淑諒無待兮奚悲胡寸根逺播弗瘁而且宜兮曰美人禮我而不我疑同臭協德兮尚庶幾愛之兮不見悵余思兮眷眷蘭生兮修修其芳兮幽幽山空兮無人樹林隂兮猿猱愁楚魂不歸兮夫誰與儔儼髙潔兮自淑諒無待兮奚尤胡寸根逺播弗瘁而且售兮曰美人禮我而我息我遊同臭協德兮庶久留愛之兮弗得悵余思兮惻惻五言古詩送胡學士紫山去古日已逺正路多迷蹤衆説撓六經嘖嘖紛異同繁音笑雅頌冶容衒青紅風雲與月露一字誇餘工譬如膏肓疾不受砭劑功自非名世賢反正難為功寥寥幾何時得我中庸公公姿何神秀自是間氣鍾蔚蔚天上麟矯矯人中龍斯文入掌握造化盤心胸吐辭爛星斗落筆驅雷風傳寫聖人意祕奧咸開通竒偉出韓栁正大續軻雄垂紳玉堂上文風變區中賤子生陋壤志學不知宗北騖駕南轅失計為雕蟲居然守迂僻無由去顓蒙公來幸一見談笑及從容快意徒仰羡摳衣遽難從明朝驛亭外憑髙望飛鴻上吏部官潭潭六卿府從事須良能昭昭貢舉法四海拔精英邇來數嵗間羣才鬱崢嶸賤子乃何人鶚章辱再騰勉強從計吏北達天子京始謁髙吏部獻書頗為驚處以禮樂事為言案牘輕俄復移秋官眷顧亦屢承但惟棲宿卑不敢伸吭鳴頃聞更變議去留在權衡讀書三十年區區欲何成題禇真人畫像董兵部野莊請題至元二十年癸未嵗也神仙真有無恍惚初未知今看褚君像信有不復疑森然為起敬清風見須眉世固有甚難乃爾獨優為乾坤運華峰敻絶旁無基壁立三萬仞登陟誰敢希千年神巧在鐵鎖懸煙霏煙霏何冥冥目斷猿猱悲此老緣下上欲趂孤鶴飛窮冬冰雪合偃卧絶新炊三月餓不死出門愈光輝豈知老讀書左氏尤精微山空人響絶時擾虎與羆聖朝重遺賢必欲一致之稽首謝使者不肯踏京師此事世共見可見不可追諒惟飛仙骨有此傑異姿所向雖匪中貪懦足以規何用多變化坐貽聾俗欺張御史周卿雪中送詩以不一相過見責次韻答之二十四年正月君有山水癖一昔落湘浙浩蕩三年遊寒衝風與雪胸中太史筆萬怪入搜閲歸來一笑粲頗訝鬢髮白靜夜孤髙吟不覺燭燼滅矍然愈我病栗栗膽內怯雪寒豈相忘適有不速客遂非諒無補愧使面增熱賦田潤之經歷家臘月菊原注元貞元年濟南細菊含幽姿有約在晚秋金商下白露衆卉皆俗流胡復冒嵗寒爛熳方未休居然冰雪間乃與松柏儔清貞入苦節剛介出至柔諒知根性殊越絶獨爾尤念汝實後時蕭蕭亦何求三嗅成短詠因之以消憂野歌平生嵓穴姿憶昔落此間舉杯謝野客浩歌對青山絲竹協律吕清響雜哀彈焉知有至音無往亦無還原注大德二年戊戌歲也題鬭槲軒倐然兩虬龍怒戰一庭黑須臾風雨過兀爾蒼槲立吁此耳目觀世事何有極野亭野亭望西山一緑開晴蕪亭下江水流不亟亦不徐照見亭上人巾袂方舒舒勿煩顔成子區區問何居大德二年戊戌秋再用古風韻答杜彥明成伯謙見和遺音整絶絃墜典尋破壁頭白未聞道坐費嵗月歷一隨簡書命乃爾南復北鷙鳥乏修翎凡馬蔑餘力較技騏騄後效能雕鶚側所任非所堪何異火就濕惶回失故步勉強懷愧色偶然兩幽人瀟灑氷雪立欣然肯下榻新釀瀉秋碧傾倒見真賞欵曲多暇日微言洗我心妙理通翔集山田故應在幸不畏乾溢逝將返舊耕脫此外物役國恩無所報回望空怵惕彥明伯謙再和亦復和之紛紛蟻爭場繞繞蝸附壁十年塵土夢世味亦頗歷憶昨出京時始見征雁北荒陂入野逈春姿淡無力如今留他州坐閲斗柄側寒廳靜愁思暮雨黃葉濕諒微熙奮功顯有勞瘁色侵尋嵗聿晚瑣屑事叵立晨興倚危樓遙望故山碧相期有宿約定復歸幾日人生足離合樂事難并集旁有能詩仙氣若湖海溢揮毫灑玉屑俗纍非所役一笑傾酒壺為我洗慚惕貞婦和拉蒙古人寓濵之渤海其夫托果岱殁于軍誓曰夫天也天可背乎由是養姑撫遺息唯謹逮今四十年有司上其行旌其門閭二子長托克托穆爾次托克托皆讀書有立王瓠山有序至大辛亥六月二十七日題婦謂嫁曰歸從一乃天理奈何世降後不恤再醮恥徒觀三綱缺竟逐一波靡豈伊渤海鄉而有和拉氏精誠洞金石誓言感神鬼天其可背乎我惟未亡耳鞠幼無苦辛奉姑有甘旨黽勉達朝夕紡緝代完美悠悠四十載曾不異其始旌表固有常榮耀非所企偉哉未嘗聞三歎敬為起竒效尤可賀超卓見二子贈山東轉運使圖克坦伯寧我友安御史好善我不如胸中月旦評豫奪入錙銖自言與君雅説君日無虛我時欲識君君在外府居原注時同知山東轉運事愛而不得見搔首幾踟蹰前年天降屯還我水上廬君來相慰藉鬱鬱古丈夫所見逾所聞我友不我誣去秋辱新作磊落皆璠璵知君平生學禮義為根株時當九月尾上計朝王都課以天下最才名動鈞樞遂登使節崇復此魚鹽區到家春已深楊花正紛敷樂事吻相合掌中有明珠原注伯寧五十五始舉子朅來枉南軒謙光照寒臞舉杯為君夀謝去口不濡但稱聖恩優過荷非所圗國用實浩汗時節要供輸民物喜動搖低昻繫慘舒上欲國用足下欲民力紓上下各得宜此責誠在豫所以受命來不敢自怡愈我起再拜賀君豈尋常徒憂國斯謂忠愛民仁可孚秉忠而行仁奉職固有餘願君保此道終毋替厥初故園有青山嵗晚以為娛佳禽青林衆鳥集旦夕何喧啾倐來非豫招忽去胡爾留文采紛莫識宫商自相投大哉天宇間萬化良悠悠送蕭經歷山姿淡朝曦春動濟水道皇皇祖帳設冠蓋何縹眇有來衆如雲壯觀親翁媪洗盞拜道左行語遮復繞吾儕鄙野人公德寧易曉愛公衣冠偉面澤鬢髮皓時時北湖上僕馬間且皎但聞吏誇説幕府公甚好溫醇金玉資清耿冰雪抱不怒咸足畏不言信可保其重太山輕其容夢澤小居然袖手坐公事一已了却觀獄市中清肅如灑掃寧聞閭里間猶復有狂狡寒者日以溫飢者日以飽循循諸子弟孝友相勸導感公有如此向天默為禱公來既已遲公歸願無早乃今舍我去使我腸腹攪我情顧誠私言語亦擾擾官家事功業求賢甚求寶巖巖中書堂寧可無此老終知不得留行且澤八表惟有願且祝康寧復夀考殷勤書此言以備國史討雲中吳氏嘗為河東宣慰副使壬寅嵗嵗飢出粟賑鄉里李禪詩為徵詩皇慶二年三月二十五日書于大都寓居之西齋晉飢秦輸粟謂是泛舟役秦飢晉可忘乃獨閉之糴千年信史在其咎竟孰執有無等豐凶彼此猶旦夕聖人垂格言博施與周急吳侯何英特恥抱貪吝癖維時嵗艱食斗米凌尺璧毅然倒囷倉奔走傾郡邑人人舉手謝不死今乃得嘗聞活千人後嗣封可必終知天祐善書以為世則趙子昻惠胡椒以詩謝之胡椒生南海愈疾號神速悠悠風土隔所致或恍惚嗟豫抱沉寒嘔泄雷殷腹窮愁卧餘濕夢寐惟此物夫何長者賜猥此衰病辱圭撮未可謀磊落忽滿目輕圓蚌珠小玄瘦鼠李蹙外辛實英烈中淑乃溫郁緬懷君子風畏愛不敢忽既將諧吾藥又以進我餗邇來未幾日頗覺神觀復新湯火始然宿滯冰旋沒行當誇健飯庶比雪就沃大哉功用殊信乃銖兩足癡人固可笑安事八百斛我無英瓊瑶負感長愧恧王黃華以橫幅畫其父東海散人道巾野服坐長松下嵓石流泉韻致殊絶題其後翁本神仙人冝著嵓石裏髙風邈餘韻益覺世俗鄙寥然如素蟾淨照松下水黃華三絶手辦此一竒偉歎息不可忘是父有是子送何聰山侍御赴河南道提刑按察使才難聖所歎自昔從何知豈無甚盛世千年百年期我公實天生會此休明時公姿何犖犖想見皋與伊仰若泰山重莫能測髙卑望若滄海逺孰從得津涯先民有遺書爛熳無不窺所適在有用文章乃娛嬉八年御史府沉沉卧孤羆竟使公議定砥柱存綱維忽持使者斧謂言西南馳翩翩舊驄馬聊以寫我思公去不可留公歸亦無遲蒼生久懸望此責非公誰蓋希顔蛻齋物蛻蛻以迹人蛻蛻以心是心本虛寂欲蛻安所任豈知虛寂內而有利欲侵荏冉初未覺酒酣與淵沉所以為學者惟貴資道深涵養既有素本源詎難尋鑿石出美玉披沙得良金仙仙蛻殼蟬豁豁遺巢禽超然事物表無愧古與今此為蛻心説請為蛻齋針尚志堂安宅化隘陋正路成阻幽僕御痛瘏死婦姑勃溪憂惡濕更居下諱疾胡能瘳於此有人焉孤舟劈橫流築室方寸地隱若百尺樓下連九軌衢輕車引驊騮出入何坦坦獨坐囂囂遊勢利不得詘貧賤非所羞我起為三歎傑哉真吾儔道果不逺人努力追前修題梁鄒賈氏足樂亭乾坤有真樂在我不在物達者乃得之其樂所寓足賈生信佳士此理久自燭蕭然一茅亭氣壓萬金屋樂哉誠樂矣我本無所欲秋蟬堂并序選部主事襄垣李謙伯溫所居秋蟬堂乃其大父仲平君金泰和間所築後以兵圮伯溫營而新之仲平君好鼓琴以道自潔武安紫山胡公記之甚詳內翰潘仲德來為徴言余勉書百言于後厥初命堂之意庶或倣佛云白鳥竊膏血青蠅妬芳鮮擾擾蜂趂甘翕翕蛾就然觸眼輒敗意堙鬱安所宣空堂一隱几悠然聽秋蟬蟬聲何窈渺欲和膝上絃物生各異趣理契斯同玄蛻形已拔俗不食豈非仙以彼塵外姿廓我胸中天漆園乃可笑妄計小大年豈知彭澤翁獨愛晚菊妍石仲璋廉訪以避暑詩見示次韻答之出城遣歊煩灑若脫久疫平生丘壑尚重愛林野僻憑危時遐曕覽邃復逺適嗒焉忘憂樂迹與心俱寂日入元氣回穹影湛虛碧愛公如清風所至解民疫髙軒何容與不厭窮巷僻出處真兩忘鵬鷃同一適清詩八音作幽眠破虛寂欲往不能留佇立煙樹碧送范提領北風振林皋蕭蕭吹行客離觴淡無味志士肝膽裂朅來陽丘稅狼籍不盈睫本非蓬蒿人安事此屑屑鴻鵠臂兩翅萬里誰能掣别後讀此詩可洗心內熱比德泉潔固不可濁浚復能有容鑒物無爾私利人豈豫功偉哉泉之德敢不勉厥躬李御史清甫惠余以研乃端之紫石也肌理潤而形製甚古所惜者偏足耳然余以意度之使平用之無傷也詩以謝之旅食無與娛挂眼止俗物此生來端溪故人薦我屋枵然皤腹偃炯爾秀兩目夫何足不良有口叵自鬻想當適齊時忍垢蒙笑辱豈從獻王後抱石負深屈應慚失所衛憂色未肯復三歎復拭之文雅溫可掬終焉不正立臨几久危臬危瓦遂令陶泓輩妄意希見録物情固有殊終始豈敢忽殷勤為文辭毛穎尚可秃慎勿泄我墨獲誚同覆餗清甫見和復次韻答之君誠磊落士過眼不留物我亦偃蹇人衡茆等華屋夜寒抱遺編藜火耗兩目枯毫久不濕片瓦孰為鬻阿端畜君家一昔肯見辱誤傷爾非罪有價吾敢屈諒微希世珍兹貺未可復當窗試玄雲清泚手自掬登函脫巘嶮藉紙忘危臬危瓦豈徒光客居自足供日録緬思忝承乏報效蔑絲忽物用有不如坐愧雙鬢秃新篇誠過望莧腸飫珍餗鬱鬱澗上松為智先生夀鬱鬱澗上松靡靡松下草生平賴餘廕朝夕仰真操霜風脫衆木蒼然立如傲浩蕩涵雨露四時震枯稿所以徑寸莖銘荷不知報工師索梁棟弗逺登廊廟繫我植天墀千載為永好題武仲經平反卷仲經為提刑書史録安慶路囚出獄成寃者一十二人嘗聞雋不疑治獄多平反平反自喜多苐怨獄益繁情偽淵海隔孰能究其源請觀武黃岡所出皆其寃書吕幽谷哀辭後諱慎字誠之絳人也自號幽谷野人博學不仕以道自樂年八十終潔身利安貞盤礴在幽谷執謂幽谷中而有光自燭優遊八十嵗全歸無不足含毫想遺風其人美如玉書燕臺陳氏致樂堂卷諸子皆問孝聖人言各殊言殊理可尋是殆舉一隅孝無賤與貴而亦無終初此心即親心異體實相孚但使誠敬足自致樂有餘讀謝孝子傳太山謝正卿能盡事親孝父殯猶在室鄰火遽回燎原注左傳音去聲至孝通神明於此見諄告又嘗吮母疽適遘和扁療再病不可藥刲股得竒效風樹終身悲墓側六年報子職固有常如此豈易到旌異明典制所重在風教衰俗頽波委屹立有孤嶠移忠儻可期事業當逺耀張兵馬美成索幽香亭詩惟兹歷城南山水足佳麗若得髙士眼可作終老計張君誠不凡處心逺塵世誅茅起亭榭開徑樹蘭蕙衆芳亦第進紅緑雜巨細天風一披拂幽香杳無際眷彼幽香中而有君子致毋令俗物來又復敗人意山東有義婦一首山東有義婦夫乃秦之郎婦初適夫時羅襦照新粧夫家徒四壁出門無耕桑婉然安其室紡緝仍薪漿所要在百年黽勉同糟粳豈期官有役夫當戍襄陽襄陽大江表路逺波濤長即為死生别割裂五內傷載顧乳下兒孌孌六嵗強須史離君懷各在天一方君心非木石胡能勉憂防妾恨不出戶安知君存亡不如隨君往好惡同在傍慷慨束衣起挈兒遂戎行間關與險阻萬里涉風霜俄過鹿門山推車兒在廂邊雲下寒日林谷都茫茫夜黑道路絶潛息野草荒有虎挾隂風怒激河水揚嗥為震雷聲目作飛電光盤旋視三人意不滿一嘗突前搏其夫齧去如拾芒婦時不暇畏赴救何奔忙翻身曳虎足號兒刀速將拔刀走送母小兒亦非常一刺虎斷膂再刺虎墮腸探手摘虎心虎僨如崩墻妖血雜腥涎淋漓滿衣裳草木為震動天地為低昻社鬼及山靈肅肅來蒼惶脫夫虎口下招魂返營房肉以為夫羮皮以席夫牀氣義動三軍繞看皆倣徨勇者失其勇剛者羞其剛大官共嘆息賞賜傾槖囊奈何夫痛劇十日竟不昌快意在目前雖死已足償我始聞此事髮凛鬚髯張由來食牛威有臂誰敢攘怪此婦人手如磔鼠刲羊乃知精誠至萬物不可當世有臣子心能有此婦良長歌序本末尚兾覽者詳題都事于君所藏孫康映雪圗孤蟾挂松枝積雪壓茅屋夜窗不繼火晝食定無肉翛然雪中人把書窗前讀不須問勤學可洗萬古俗失題學際天人明理同聖賢語冨貴貧賤間守謙行所素居易物皆平持盈人免惡千里莫徘徊始終如一步中庵集卷一
